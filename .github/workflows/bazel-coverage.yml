# Bazel-based code coverage — the primary per-PR coverage gate.
#
# As of the Phase 7 cutover (docs/plans/bazel-migration.md) this is a required
# check and it drives the canonical per-service Codecov badges (flag=<pkg>). The
# Cargo coverage job (test.yml `coverage`) moved to a nightly safety net and now
# uploads under `cargo-<pkg>` flags as a cross-check.
#
# Why a separate workflow (not a job in bazel.yml): coverage needs a different
# toolchain (nightly) and a fully instrumented build graph -- a separate action
# namespace from bazel.yml's stable build/test. Keeping it separate means its
# (slower, nightly, instrumented) actions and its cache never perturb the
# build/test job.
#
# Properties:
#  * nightly toolchain + --cfg=coverage_nightly (see .bazelrc --config=coverage)
#    so #[cfg_attr(coverage_nightly, coverage(off))] on every `#[cfg(test)] mod
#    tests` block takes effect and test code stays out of the numbers.
#  * LLVM source-based instrumentation, first-party crates only.
#  * Runs `bazel coverage //...` over the WHOLE repo every time. Untouched
#    targets are cache hits (local disk + remote R2 cache), so their
#    coverage.dat is fetched, not recomputed -- every PR gets a COMPLETE report
#    with no cargo-rail narrowing and no dependence on Codecov carryforward.
#  * Uploads per-package lcov under the canonical `<pkg>` flags so the
#    per-service badges are Bazel-driven.
#  * Includes the BDD suite (--config=coverage flips the default tag filter to
#    -requires-cargo, see .bazelrc) so the service-binary integration paths are
#    covered; the spawned-binary coverage is collected via the vendored
#    rules_rust patches (see bazel-migration.md; effectiveness guarded by parity.yml).
permissions:
  contents: read
on:
  pull_request:
  # push to main primes the coverage action cache (write token) so PRs read
  # warm coverage.dat for untouched targets; also gives main a coverage baseline.
  push:
    branches: [main]
  # Nightly run from main keeps the coverage action cache warm during quiet
  # stretches (mirrors bazel.yml) and refreshes the per-service badges.
  schedule:
    - cron: "33 7 * * *"
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: bazel-coverage

jobs:
  coverage:
    runs-on: ubuntu-latest
    # Cold-cache headroom: the instrumented nightly graph is a distinct cache
    # namespace, so the first run (and post-eviction runs) rebuild it from
    # scratch -- and the instrumented BDD suite (rp ~150s warm) runs here too.
    # Warm runs are fast.
    timeout-minutes: 60
    name: bazel coverage
    defaults:
      run:
        shell: bash
    env:
      # Same trust model as bazel.yml: only push-to-main and the nightly schedule
      # (both default-branch events) hold the write token, so only trusted code
      # populates the coverage cache; PRs (including forks, which get no secrets
      # at all) read anonymously and never write.
      CACHE_WRITE_TOKEN: ${{ (github.event_name == 'push' || github.event_name == 'schedule') && secrets.BAZEL_CACHE_WRITE_TOKEN || '' }}
    steps:
      - uses: actions/checkout@v7

      # .bazelrc build:linux uses the lld linker.
      - name: Install lld
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lld >/dev/null

      - name: Setup bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        with:
          bazelisk-version: 1.28.1

      - name: Verify bazel version
        run: bazel --version

      # rp's BDD scenarios spawn the ASCOM Alpaca simulator. OMNISIM_PATH is
      # forwarded into test sandboxes by .bazelrc `build:ci --test_env=OMNISIM_PATH`.
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim

      # `bazel coverage //...` instruments + compiles libqhyccd-sys (qhy-camera),
      # so provision the proprietary QHYCCD SDK + libusb. Linux only: the action
      # stages the libs into /usr/local/lib (build.rs's env-free search path). The
      # qhy-camera bdd + conformu suites are excluded from coverage by
      # `--test_tag_filters=-requires-cargo` (they only BUILD here), so the SDK
      # init hang under the test runner is moot.
      - name: Install libusb (qhy-camera)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libusb-1.0-0-dev
          version: 1.0
      - name: Install QHYCCD SDK (qhy-camera)
        uses: ivonnyssen/qhyccd-sdk-install@v4
        with:
          version: "26.06.04"
      # zwo-camera links the native ZWO ASI/EFW SDK (zwo-rs -> libzwo-sys); the
      # coverage run is over the whole `//...` graph, so the SDK must be present
      # for Bazel to build/link/instrument zwo-camera. Linux-only runner here, so
      # this is the cheap INDI-mirror path. See services/zwo-camera/BUILD.bazel.
      - name: Install ZWO SDK
        uses: ./.github/actions/install-zwo-sdk

      - name: bazel coverage
        run: |
          set -uo pipefail
          REMOTE_FLAGS=(--config=remote-cache)
          if [[ -n "$CACHE_WRITE_TOKEN" ]]; then
            REMOTE_FLAGS+=(--remote_header="Authorization=Bearer $CACHE_WRITE_TOKEN")
          else
            REMOTE_FLAGS+=(--remote_upload_local_results=false)
          fi
          # --config=coverage selects the nightly channel + --cfg=coverage_nightly
          # + --combined_report=lcov + first-party instrumentation filter +
          # --test_timeout=900 (.bazelrc). --test_tag_filters=-requires-cargo
          # INCLUDES the BDD suite; it is also set by --config=coverage but pinned
          # here on the command line so CI is not sensitive to rc precedence
          # (command line always wins). --remote_download_outputs=all overrides
          # build:ci's `toplevel` so the combined lcov and its per-test .dat inputs
          # are materialised locally. --test_output=all surfaces rp:bdd's BDD-TRACE
          # breadcrumbs (ENTER / reset-ok / EXIT, tagged +Ns) even on a passing run
          # — parity with the BDD leg in bazel.yml. --spawn_strategy=local and
          # --remote_timeout=3 (the confirmed rp:bdd post-scenario park fix) are
          # inherited from `.bazelrc` test:ci/build:ci.
          #
          # `|| status=$?` keeps a non-zero exit from aborting the step and records
          # the code, so the classification below can distinguish bazel exit 3
          # (tests failed/timed out) from build/flag failures.
          #
          # observability (C): bound the run ~10 min below the 60-min job timeout.
          # `timeout --signal=INT 50m` interrupts bazel cleanly (it flushes the
          # in-progress test.log) with headroom for the always() capture step to run
          # unhurried, instead of a hard job-cancel at 60 min that flushes nothing.
          # --kill-after SIGKILLs if bazel ignores the INT. `timeout` exits 124 when
          # it fired (137 if it had to escalate to SIGKILL).
          status=0
          timeout --signal=INT --kill-after=2m 50m \
            bazel coverage --config=ci --config=coverage "${REMOTE_FLAGS[@]}" \
            --test_tag_filters=-requires-cargo \
            --remote_download_outputs=all \
            --test_output=all \
            //... || status=$?
          # Bazel exit codes: 0 = all tests passed (publish coverage below); ANY non-zero =
          # something did not validly complete, so we FAIL. Rationale: coverage from a run with
          # a failed/killed test (exit 3) — or a build/flag error — does not correspond to a
          # passing suite, so the number is misleading; we do NOT publish it (a non-zero exit
          # here skips the no-`if:` Split step, which is the intended behaviour). The always()
          # test-log capture step still runs regardless, so a failure is fully triage-able.
          # The rp:bdd post-scenario park that previously cancelled ~half of these runs at the
          # 60-min wall is fixed (3s --remote_timeout + --spawn_strategy=local, now in .bazelrc);
          # this job is a required gate as of the Phase 7 cutover. See
          # docs/plans/bazel-migration.md.
          if [[ $status -eq 124 || $status -eq 137 ]]; then
            echo "::error title=bazel coverage capped::Hit the 50-min observability cap (exit $status) — a test (almost certainly //services/rp:bdd) did not finish in time. Captured test logs are in the 'bazel-testlogs' artifact."
            exit 1
          elif [[ $status -eq 3 ]]; then
            echo "::error title=bazel coverage test failure::A coverage test FAILED or hit its --test_timeout (bazel exit 3). Coverage from a failed run does not reflect a passing suite, so it is NOT published. See the test logs below / in the 'bazel-testlogs' artifact."
            exit 1
          elif [[ $status -ne 0 ]]; then
            echo "::error title=bazel coverage failed::bazel coverage failed (exit $status — 1=build error, 2=bad flags, 4=no tests, 8=interrupted/superseded)."
            exit "$status"
          fi

      # Capture every test.log/test.xml out of the (symlinked) bazel-testlogs tree
      # so a coverage failure — including a timeout-cap SIGINT — is triageable from
      # the uploaded artifact. bazel only writes these when the action ends.
      - name: Capture bazel test logs
        if: always()
        run: |
          set +e +o pipefail  # best-effort: a find/tar miss must NOT fail the job.
          TESTLOGS="$(readlink -f bazel-testlogs 2>/dev/null || echo bazel-testlogs)"
          DEST=bazel-testlogs-captured
          mkdir -p "$DEST"
          # Copy out of the (symlinked) testlogs tree into a real dir so the upload
          # is clean and survives the symlink.
          if [[ -d "$TESTLOGS" ]]; then
            ( cd "$TESTLOGS" && find . \( -name test.log -o -name test.xml \) -print0 \
                | tar --null -cf - -T - ) | tar -C "$DEST" -xf - 2>/dev/null
          fi
          RP_BDD_LOG="$TESTLOGS/services/rp/bdd/test.log"
          if [[ -f "$RP_BDD_LOG" ]]; then
            echo "===== rp:bdd test.log tail (last 80 lines) ====="
            tail -80 "$RP_BDD_LOG"
          fi
          exit 0  # best-effort — must never fail the job

      - name: Upload bazel test logs (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bazel-testlogs
          path: bazel-testlogs-captured/**
          if-no-files-found: warn
          retention-days: 14

      - name: Split combined lcov per package
        run: |
          REPORT="$(bazel info output_path)/_coverage/_coverage_report.dat"
          echo "Combined report: $REPORT"
          if [[ ! -s "$REPORT" ]]; then
            echo "::error::combined coverage report missing or empty at $REPORT"
            exit 1
          fi
          ls -l "$REPORT"
          mkdir -p coverage-lcov
          python3 tools/coverage/split_lcov.py "$REPORT" --output-dir coverage-lcov
          ls -l coverage-lcov

      - name: Upload per-package lcov (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bazel-coverage-lcov
          path: coverage-lcov/*.info
          if-no-files-found: warn
          retention-days: 14

      - name: Upload to codecov.io
        if: env.ACT != 'true'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          # Fork PRs receive no secrets; skip the upload rather than fail.
          if [[ -z "$CODECOV_TOKEN" ]]; then
            echo "No CODECOV_TOKEN (likely a fork PR); skipping Codecov upload."
            exit 0
          fi
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x ./codecov
          # On pull_request events GitHub checks out an ephemeral merge commit;
          # override the SHA so Codecov maps the upload to the PR head.
          COMMIT_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "Uploading Bazel coverage for commit $COMMIT_SHA"
          # Canonical `<pkg>` flags: Bazel coverage drives the per-service badges
          # post-cutover. The Cargo job (test.yml) uploads a parallel `cargo-<pkg>`
          # set as a nightly cross-check. See .github/codecov.yml.
          for f in coverage-lcov/*.info; do
            [ -f "$f" ] || continue
            pkg="$(basename "$f")"; pkg="${pkg#lcov-}"; pkg="${pkg%.info}"
            echo "Uploading coverage for $pkg as flag $pkg"
            ./codecov upload-process \
              --file "$f" \
              --flag "$pkg" \
              --token "$CODECOV_TOKEN" \
              --git-service github \
              --commit-sha "$COMMIT_SHA" \
              || echo "Warning: upload failed for $pkg"
          done
