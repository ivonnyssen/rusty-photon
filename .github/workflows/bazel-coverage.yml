# Bazel-based code coverage, shadow mode. Runs alongside the canonical Cargo
# coverage job (.github/workflows/test.yml `coverage`) during the migration in
# docs/plans/bazel-migration.md. NOT required for merge.
#
# Why a separate workflow (not a job in bazel.yml): coverage needs a different
# toolchain (nightly) and a fully instrumented build graph -- a separate action
# namespace from bazel.yml's stable build/test. Keeping it separate means its
# (slower, nightly, instrumented) actions and its cache never perturb the
# shadow build/test job.
#
# Parity with the Cargo job:
#  * nightly toolchain + --cfg=coverage_nightly (see .bazelrc --config=coverage)
#    so #[cfg_attr(coverage_nightly, coverage(off))] on every `#[cfg(test)] mod
#    tests` block takes effect and test code stays out of the numbers.
#  * LLVM source-based instrumentation, first-party crates only.
#  * per-package lcov uploaded to Codecov so the per-service flags survive.
#
# Differences from the Cargo job (intentional):
#  * Runs `bazel coverage //...` over the WHOLE repo every time. Untouched
#    targets are cache hits (local disk + remote R2 cache), so their
#    coverage.dat is fetched, not recomputed -- every PR still gets a COMPLETE
#    report without cargo-rail narrowing or Codecov carryforward. This is the
#    headline win of doing coverage under Bazel.
#  * Uploads under distinct `bazel-<pkg>` flags so it does NOT alter the
#    canonical per-service badges while Cargo coverage still runs (shadow mode).
#  * Includes the BDD suite (--config=coverage flips the default tag filter to
#    -requires-cargo, see .bazelrc) so the service-binary integration paths are
#    covered. Whether coverage from the BDD-spawned service binaries is actually
#    COLLECTED is the open risk: cargo-llvm-cov gets it via a shared
#    LLVM_PROFILE_FILE + whole-target-dir merge; Bazel's per-test-action model
#    may not. Validate in run #1 (bazel-<service> vs <service>); see
#    bazel-migration.md for the contingency.
permissions:
  contents: read
on:
  pull_request:
  # push to main primes the coverage action cache (write token) so PRs read
  # warm coverage.dat for untouched targets; also gives main a coverage baseline.
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: bazel-coverage

jobs:
  coverage:
    runs-on: ubuntu-latest
    # Cold-cache headroom: the instrumented nightly graph is a distinct cache
    # namespace, so the first run (and post-eviction runs) rebuild it from
    # scratch -- and the instrumented BDD suite (rp ~150s warm) runs here too.
    # Warm runs are fast.
    timeout-minutes: 60
    name: bazel coverage (shadow)
    defaults:
      run:
        shell: bash
    env:
      # Same trust model as bazel.yml: only push-to-main holds the write token,
      # so only trusted code populates the coverage cache; PRs (including forks,
      # which get no secrets at all) read anonymously and never write.
      CACHE_WRITE_TOKEN: ${{ github.event_name == 'push' && secrets.BAZEL_CACHE_WRITE_TOKEN || '' }}
    steps:
      - uses: actions/checkout@v5

      # .bazelrc build:linux uses the lld linker.
      - name: Install lld
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lld >/dev/null

      - name: Setup bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        with:
          bazelisk-version: 1.28.1

      - name: Verify bazel version
        run: bazel --version

      # rp's BDD scenarios spawn the ASCOM Alpaca simulator. OMNISIM_PATH is
      # forwarded into test sandboxes by .bazelrc `build:ci --test_env=OMNISIM_PATH`.
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim

      - name: bazel coverage
        run: |
          set -uo pipefail
          REMOTE_FLAGS=(--config=remote-cache)
          if [[ -n "$CACHE_WRITE_TOKEN" ]]; then
            REMOTE_FLAGS+=(--remote_header="Authorization=Bearer $CACHE_WRITE_TOKEN")
          else
            REMOTE_FLAGS+=(--remote_upload_local_results=false)
          fi
          # --config=coverage selects the nightly channel + --cfg=coverage_nightly
          # + --combined_report=lcov + first-party instrumentation filter +
          # --test_timeout=900 (.bazelrc). --test_tag_filters=-requires-cargo
          # INCLUDES the BDD suite; it is also set by --config=coverage but pinned
          # here on the command line so CI is not sensitive to rc precedence
          # (command line always wins). --remote_download_outputs=all overrides
          # build:ci's `toplevel` so the combined lcov and its per-test .dat inputs
          # are materialised locally.
          # --test_output=all surfaces rp:bdd's unbuffered BDD-TRACE breadcrumbs
          # (ENTER / reset-ok / EXIT, tagged +Ns) even on a *passing* run — parity
          # with the BDD leg in bazel.yml. The default --test_output=errors hides
          # the per-scenario timing on slow-but-passing rp:bdd runs. NOTE: --test_output=all
          # only PRINTS a test's log when it COMPLETES; --test_timeout=900 (.bazelrc)
          # was meant to convert a hung rp:bdd into a clean FAILED-with-flushed-log,
          # but has been observed NOT to fire under `bazel coverage` (runs still
          # wall-cancel at 60 min with nothing flushed — PR #342). The timeout-bound
          # (C) below + the always() capture step (B) are what surface a hung run.
          # There is deliberately NO custom live per-scenario tailer: bazel sandboxes
          # the test, so bazel-testlogs/services/rp/bdd/test.log only materialises when
          # the action ENDS (verified on PR #342 — a tailer of it fired exactly once,
          # at interrupt). bazel's own "Testing //services/rp:bdd; Ns" progress line is
          # the liveness signal during the run; for live per-scenario output the tool
          # is a targeted `--test_output=streamed` re-run (which serialises tests).
          # Capture bazel's exit code. `|| status=$?` is robust whether or not
          # `set -e` is active (GitHub's default step shell adds `-eo pipefail`):
          # the `||` keeps a non-zero exit from aborting the step and records the
          # code, so the classification below can tell exit 3 (tests failed/timed
          # out — tolerated) from a real build failure.

          # --- observability (C): bound the run ~10 min below the 60-min job
          # timeout. `timeout --signal=INT 50m` interrupts bazel cleanly (it flushes
          # the in-progress test.log) with headroom for the always() capture step to
          # run unhurried, instead of a hard job-cancel at 60 min that flushes
          # nothing. --kill-after SIGKILLs if bazel ignores the INT. `timeout` exits
          # 124 when it fired (137 if it had to escalate to SIGKILL).
          status=0
          # --- observability (D): ATTRIBUTE the post-[Summary] ~40-min wall.
          # A 26-agent analysis (PR #342) MEASURED the LLVM coverage tools at
          # merge ~0.5s / export ~0.3s and the file count in the hundreds — so the
          # ~40 min is NOT CPU; it is a byte-proportional I/O wait, and bazel's
          # "Testing //services/rp:bdd; Ns" progress line MIS-ATTRIBUTES it on a
          # --keep_going run (the repo-wide --combined_report action and
          # --remote_download_outputs=all WAN-materialization of every per-test
          # coverage.dat keep that label ticking). --profile records every action's
          # wall-time so we can tell those apart; VERBOSE_COVERAGE makes rules_rust's
          # collect_coverage log "Spawning llvm-profdata/llvm-cov/Success!" so the
          # always() step sees whether the tools finished in seconds. Pure
          # instrumentation — no behavior change.
          # Live hang diagnostic: stream what's actually running every 30s
          # (tools/ci/bazel-hang-sampler.sh). Survives the timeout cap because it
          # is already in the streamed log — and unlike --profile (which records
          # only COMPLETED actions, so a hung-then-killed action is invisible) it
          # shows the running subprocess + CPU/load/mem during the stall.
          bash tools/ci/bazel-hang-sampler.sh & HANG_SAMPLER_PID=$!
          trap 'kill "$HANG_SAMPLER_PID" 2>/dev/null || true' EXIT
          PROFILE="${RUNNER_TEMP:-/tmp}/bazel-cov-profile.json.gz"
          timeout --signal=INT --kill-after=2m 50m \
            bazel coverage --config=ci --config=coverage "${REMOTE_FLAGS[@]}" \
            --test_tag_filters=-requires-cargo \
            --remote_timeout=3 \
            --spawn_strategy=local \
            --remote_download_outputs=all \
            --test_output=all \
            --test_env=VERBOSE_COVERAGE=1 \
            --profile="$PROFILE" --noslim_profile \
            --experimental_profile_include_target_label \
            //... || status=$?
          # Bazel exit codes: 0 = all tests passed (publish coverage below); ANY non-zero =
          # something did not validly complete, so we FAIL. Rationale: coverage from a run with
          # a failed/killed test (exit 3) — or a build/flag error — does not correspond to a
          # passing suite, so the number is misleading; we do NOT publish it (a non-zero exit
          # here skips the no-`if:` Split step, which is the intended behaviour). The always()
          # diagnostic + test-log steps still run regardless, so a failure is fully triage-able.
          # NOTE: honest-red, but NOT yet a required merge gate — the rp:bdd park is an
          # intermittent infra flake (~18-65%); promote to required only once it is confirmed
          # dead (3s --remote_timeout + --spawn_strategy=local). See docs/plans/bazel-migration.md.
          if [[ $status -eq 124 || $status -eq 137 ]]; then
            echo "::error title=bazel coverage capped::Hit the 50-min observability cap (exit $status) — a test (almost certainly //services/rp:bdd) did not finish in time. The next step classifies whether a SCENARIO hung or all scenarios passed and the action hung POST-scenario (coverage collection). Full log in the 'bazel-testlogs' artifact."
            exit 1
          elif [[ $status -eq 3 ]]; then
            echo "::error title=bazel coverage test failure::A coverage test FAILED or hit its --test_timeout (bazel exit 3). Coverage from a failed run does not reflect a passing suite, so it is NOT published. See the rp:bdd hang classification + test logs below / in the 'bazel-testlogs' artifact."
            exit 1
          elif [[ $status -ne 0 ]]; then
            echo "::error title=bazel coverage failed::bazel coverage failed (exit $status — 1=build error, 2=bad flags, 4=no tests, 8=interrupted/superseded)."
            exit "$status"
          fi

      # --- observability (B): capture test logs even when rp:bdd hangs/times out.
      # bazel writes bazel-testlogs/.../test.log when the action ends (incl. on the
      # SIGINT from the timeout cap), so this always() step surfaces the breadcrumb
      # trail inline + as an artifact, and CLASSIFIES the hang: a scenario stuck
      # (ENTER without EXIT) vs all-scenarios-passed-but-action-hung-post-scenario
      # (the coverage-collection case observed on PR #342: 265/265 passed in ~420s
      # of BDD time, yet the test action ran ~2802s).
      - name: Surface bazel test logs (rp:bdd hang diagnostics)
        if: always()
        run: |
          set +e +o pipefail  # diagnostic: best-effort; a grep miss or a SIGPIPE
          # (head closing the sort/jq pipe) must NOT propagate and fail the job.
          TESTLOGS="$(readlink -f bazel-testlogs 2>/dev/null || echo bazel-testlogs)"
          DEST=bazel-testlogs-captured
          mkdir -p "$DEST"
          # Copy every test.log/test.xml out of the (symlinked) testlogs tree into
          # a real dir so the upload is clean and survives the symlink.
          if [[ -d "$TESTLOGS" ]]; then
            ( cd "$TESTLOGS" && find . \( -name test.log -o -name test.xml \) -print0 \
                | tar --null -cf - -T - ) | tar -C "$DEST" -xf - 2>/dev/null
          fi
          RP_BDD_LOG="$TESTLOGS/services/rp/bdd/test.log"
          if [[ -f "$RP_BDD_LOG" ]]; then
            echo "===== rp:bdd BDD-TRACE trail (last 80 breadcrumbs) ====="
            grep -aE 'BDD-TRACE' "$RP_BDD_LOG" | tail -80
            STUCK="$(comm -23 \
              <(grep -aoE 'ENTER .*scenario="[^"]*"' "$RP_BDD_LOG" | grep -aoE 'scenario="[^"]*"' | sort -u) \
              <(grep -aoE 'EXIT scenario="[^"]*"'   "$RP_BDD_LOG" | grep -aoE 'scenario="[^"]*"' | sort -u))"
            SUMMARY="$(grep -aE '[0-9]+ scenarios \(' "$RP_BDD_LOG" | tail -1)"
            echo "===== rp:bdd hang classification ====="
            if [[ -n "$STUCK" ]]; then
              echo "SCENARIO HANG — entered but never exited:"
              echo "$STUCK"
            elif [[ -n "$SUMMARY" ]]; then
              echo "NOT a scenario hang — all scenarios reported: $SUMMARY"
              echo "If the action was capped/killed, the time went POST-scenario:"
              echo "coverage collection of BDD-spawned binaries (LLVM_PROFILE_FILE / child"
              echo ".profraw merge — see .bazelrc 'Child-process coverage' +"
              echo "crates/bdd-infra/src/lib.rs). Cross-check: bazel 'Testing //services/rp:bdd; Ns'"
              echo "wall-time >> the last BDD-TRACE +Ns means a post-scenario hang."
            else
              echo "Inconclusive — no stuck scenario and no cucumber summary in test.log; see tail."
            fi
            echo "===== rp:bdd coverage collector timing (VERBOSE_COVERAGE) ====="
            echo "(if 'Spawning llvm-*'/'Success!' appear right after [Summary], the LLVM tools are fast"
            echo " and the remaining wall is post-collector I/O staging, not coverage CPU)"
            grep -aE 'Spawning llvm-profdata|Spawning llvm-cov|Success!|Coverage runner|Not collecting coverage' "$RP_BDD_LOG" | tail -20
            echo "===== rp:bdd test.log tail (last 80 lines) ====="
            tail -80 "$RP_BDD_LOG"
          else
            echo "No rp:bdd test.log at $RP_BDD_LOG (target may not have started)."
          fi
          # Attribute the wall-time: top actions/phases by duration from the bazel
          # profile (tells rp:bdd's own action from the repo-wide combined-report
          # action and from remote-download/output-staging phases).
          PROFILE="${RUNNER_TEMP:-/tmp}/bazel-cov-profile.json.gz"
          if [[ -f "$PROFILE" ]]; then
            cp -f "$PROFILE" "$DEST/" 2>/dev/null
            echo "===== top 25 longest bazel actions/phases (where the wall-time went) ====="
            if command -v jq >/dev/null; then
              zcat "$PROFILE" 2>/dev/null \
                | jq -r '.traceEvents[]? | select(.dur != null and .dur > 1000000) | "\((.dur/1000000)|floor)s\t\(.cat // "?")\t\(.name)"' 2>/dev/null \
                | sort -rn | head -25 || true
            else
              echo "(jq unavailable; profile uploaded as artifact for offline analysis)"
            fi
          fi
          exit 0  # diagnostic step is best-effort — must never fail the job

      - name: Upload bazel test logs (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bazel-testlogs
          path: bazel-testlogs-captured/**
          if-no-files-found: warn
          retention-days: 14

      - name: Split combined lcov per package
        run: |
          REPORT="$(bazel info output_path)/_coverage/_coverage_report.dat"
          echo "Combined report: $REPORT"
          if [[ ! -s "$REPORT" ]]; then
            echo "::error::combined coverage report missing or empty at $REPORT"
            exit 1
          fi
          ls -l "$REPORT"
          mkdir -p coverage-lcov
          python3 tools/coverage/split_lcov.py "$REPORT" --output-dir coverage-lcov
          ls -l coverage-lcov

      - name: Upload per-package lcov (artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bazel-coverage-lcov
          path: coverage-lcov/*.info
          if-no-files-found: warn
          retention-days: 14

      - name: Upload to codecov.io
        if: env.ACT != 'true'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          # Fork PRs receive no secrets; skip the upload rather than fail.
          if [[ -z "$CODECOV_TOKEN" ]]; then
            echo "No CODECOV_TOKEN (likely a fork PR); skipping Codecov upload."
            exit 0
          fi
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x ./codecov
          # On pull_request events GitHub checks out an ephemeral merge commit;
          # override the SHA so Codecov maps the upload to the PR head.
          COMMIT_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "Uploading Bazel coverage for commit $COMMIT_SHA"
          # Distinct `bazel-<pkg>` flags keep the canonical per-service badges
          # (flag=<pkg>) Cargo-only during shadow mode.
          for f in coverage-lcov/*.info; do
            [ -f "$f" ] || continue
            pkg="$(basename "$f")"; pkg="${pkg#lcov-}"; pkg="${pkg%.info}"
            echo "Uploading coverage for $pkg as flag bazel-$pkg"
            ./codecov upload-process \
              --file "$f" \
              --flag "bazel-$pkg" \
              --token "$CODECOV_TOKEN" \
              --git-service github \
              --commit-sha "$COMMIT_SHA" \
              || echo "Warning: upload failed for $pkg"
          done
