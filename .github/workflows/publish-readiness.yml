# Publish-readiness checks for the four dual-homed FFI crates (qhyccd-rs +
# libqhyccd-sys, zwo-rs + libzwo-sys). These crates publish to crates.io on their
# own cadence (ADR-009 / ADR-010), so before a release they must satisfy the
# guarantees a crates.io consumer relies on — guarantees the in-workspace `check`
# / `test` jobs cannot verify (the workspace pins one unified MSRV of 1.94.1 and a
# single newest-version Cargo.lock). This workflow restores the coverage the
# standalone repos had and that vendoring dropped:
#   - MSRV + minimal-versions : each crate builds on its declared (lower) MSRV
#       with a direct-minimal-versions lockfile — run OUT of the workspace by
#       scripts/verify-publishable-crate.sh. See docs/plans/publish-readiness-checks.md.
#   - semver-checks           : the next version is a sound semver bump.
#   - docs.rs build           : the crate's docs build the way docs.rs builds them.
#   - find (advisory)         : reports the LOWEST MSRV each crate could declare,
#       so the floor can be ratcheted down ("lowest possible").
#
# Cadence: nightly cron + workflow_dispatch + paths-filtered PR/push on this file
# and the script itself. Like conformu.yml/pi-nightly.yml these checks are
# NON-BLOCKING for ordinary PRs — a minimal-versions break usually comes from an
# upstream release, not the PR under review, so gating every PR on it would
# red-bar unrelated work. The notify-on-failure job opens a tracking issue so a
# red nightly does not sit unnoticed. Discovery is dynamic: only crates carrying
# `[package.metadata.publish-readiness]` are checked — exactly the four FFI crates.
permissions:
  contents: read

on:
  schedule:
    # 02:30 UTC. Offset from plate-solver-smoke (03:30), install-astap (04:30) and
    # conformu (05:30) so the nightly suites do not contend for the runner pool.
    - cron: "30 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-readiness.yml"
      - "scripts/verify-publishable-crate.sh"
  pull_request:
    paths:
      - ".github/workflows/publish-readiness.yml"
      - "scripts/verify-publishable-crate.sh"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  # The four FFI crates are checked/doc'd/semver'd as check-only builds that never
  # link the native SDK; the build scripts honour these to emit no link directives,
  # so no QHYCCD/ZWO SDK is provisioned here (libzwo-sys still needs libclang for
  # bindgen — installed per-job below). Setting both is harmless for the crate that
  # ignores its sibling's var.
  QHYCCD_SKIP_NATIVE_LINK: "1"
  ZWO_SKIP_NATIVE_LINK: "1"

jobs:
  plan:
    runs-on: ubuntu-latest
    name: plan
    outputs:
      crates: ${{ steps.discover.outputs.crates }}
      has_crates: ${{ steps.discover.outputs.has_crates }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Discover publishable FFI crate families
        id: discover
        run: |
          # Every crate with [package.metadata.publish-readiness] — i.e. the four
          # dual-homed FFI crates and nothing else in the workspace. Emits the
          # wrapper name, its nested sys crate, and whether the family needs libclang.
          CRATES=$(cargo metadata --format-version 1 --no-deps | \
            jq -c '[.packages[]
                    | select(.metadata["publish-readiness"]["sys-crate"])
                    | {name: .name,
                       sys: .metadata["publish-readiness"]["sys-crate"],
                       needs_libclang: .metadata["publish-readiness"]["needs-libclang"]}]')
          COUNT=$(echo "$CRATES" | jq 'length')
          echo "crates=$CRATES" >> "$GITHUB_OUTPUT"
          echo "has_crates=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "Discovered $COUNT publishable FFI families:"; echo "$CRATES" | jq .

  msrv-minimal-versions:
    needs: plan
    if: needs.plan.outputs.has_crates == 'true'
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.plan.outputs.crates) }}
    runs-on: ubuntu-latest
    name: msrv+minver / ${{ matrix.crate.name }}
    steps:
      - uses: actions/checkout@v7
      # Nightly drives `-Z direct-minimal-versions`; the per-crate MSRV toolchains
      # are installed on demand by the script via rustup.
      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack
      - name: Install libclang (bindgen families)
        if: matrix.crate.needs_libclang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Verify MSRV + minimal versions
        run: scripts/verify-publishable-crate.sh "${{ matrix.crate.name }}" verify

  semver-checks:
    needs: plan
    if: needs.plan.outputs.has_crates == 'true'
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.plan.outputs.crates) }}
    runs-on: ubuntu-latest
    name: semver / ${{ matrix.crate.name }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks
      - name: Install libclang (bindgen families)
        if: matrix.crate.needs_libclang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: cargo semver-checks (wrapper + sys)
        run: |
          # Compares the working tree against the crate's crates.io baseline. A
          # crate with no published baseline yet (zwo-rs, libzwo-sys, and
          # libqhyccd-sys until its next bump) has nothing to diff — that is the
          # first-publish case, reported as a warning, not a failure.
          for c in "${{ matrix.crate.name }}" "${{ matrix.crate.sys }}"; do
            echo "::group::semver-checks $c"
            if ! cargo semver-checks --package "$c"; then
              echo "::warning::semver-checks did not pass for $c (no published baseline yet, or a real semver break — inspect above)"
            fi
            echo "::endgroup::"
          done

  docs:
    needs: plan
    if: needs.plan.outputs.has_crates == 'true'
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.plan.outputs.crates) }}
    runs-on: ubuntu-latest
    name: docs.rs / ${{ matrix.crate.name }}
    steps:
      - uses: actions/checkout@v7
      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-docs-rs
        uses: taiki-e/install-action@cargo-docs-rs
      - name: Install libclang (bindgen families)
        if: matrix.crate.needs_libclang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: cargo docs-rs (wrapper + sys)
        run: |
          # Build docs exactly as docs.rs would (nightly + the crate's docs.rs
          # metadata). Catches doc-cfg / intra-doc-link breakage before release.
          for c in "${{ matrix.crate.name }}" "${{ matrix.crate.sys }}"; do
            echo "::group::docs-rs $c"
            cargo +nightly docs-rs --package "$c"
            echo "::endgroup::"
          done

  find:
    # Advisory: report the lowest MSRV each crate could declare, so the floor can
    # be ratcheted down toward "lowest possible". cargo-msrv bisects toolchains, so
    # this is slow and best-effort — never fails the run.
    needs: plan
    if: needs.plan.outputs.has_crates == 'true' && github.event_name != 'pull_request'
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.plan.outputs.crates) }}
    runs-on: ubuntu-latest
    name: msrv-find (advisory) / ${{ matrix.crate.name }}
    steps:
      - uses: actions/checkout@v7
      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-msrv
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-msrv
      - name: Install libclang (bindgen families)
        if: matrix.crate.needs_libclang
        run: sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
      - name: Report lowest possible MSRV
        run: scripts/verify-publishable-crate.sh "${{ matrix.crate.name }}" find

  notify-on-failure:
    # Open or update a tracking issue when the nightly run fails, so a publish
    # blocker surfaces without someone watching the Actions tab. Skipped on
    # workflow_dispatch / PR so manual and pre-merge runs do not churn the issue.
    # `find` is advisory (continue-on-error) and intentionally NOT a `needs` here.
    needs: [msrv-minimal-versions, semver-checks, docs]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = `nightly: publish-readiness checks failing`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The nightly publish-readiness workflow failed for at least one of the`,
              `dual-homed FFI crates (qhyccd-rs / libqhyccd-sys / zwo-rs / libzwo-sys).`,
              ``,
              `Likely causes: an upstream dependency release broke the`,
              `direct-minimal-versions build or raised a transitive MSRV above a`,
              `crate's declared floor; a crate's source started using a newer std API`,
              `than its rust-version; a semver break; or docs.rs-style doc breakage.`,
              `These BLOCK the next crates.io publish — see`,
              `crates/qhyccd-rs/RELEASING.md and ADR-010's release runbook.`,
              ``,
              `Inspect the failed matrix legs in the linked run.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `Opened automatically by a failed scheduled run. While it stays open,`,
              `each subsequent scheduled failure is appended as a comment. Closing it`,
              `marks the failure handled; the next failure opens a fresh issue.`,
            ].join("\n");
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "publish-readiness",
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Failed again — run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["publish-readiness", "ci-flake"],
              });
            }
