# Builds one workspace package's release binary on a chosen runner and
# uploads it as an artifact. The pre-packaging validation path for running
# a not-yet-packaged binary on a real host (a Windows VM, the field rig, a
# Mac) — first used for rusty-photon-doctor's D2 host validation, useful
# for any service before its packaging phase lands.
#
# workflow_dispatch only resolves against the default branch, so a branch
# that introduces or edits this file cannot be dispatched — the push
# trigger (scoped to this file) covers that bootstrap: touching the file
# builds the default package on the full runner matrix.
name: build-binary

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package whose binary to build"
        required: true
        default: "doctor"
      runner:
        description: "Runner image (host OS/arch of the target machine)"
        required: true
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - macos-latest
  push:
    paths:
      - ".github/workflows/build-binary.yml"

permissions:
  contents: read

jobs:
  build:
    name: ${{ inputs.package || 'doctor' }} / ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ github.event_name == 'push' && fromJSON('["ubuntu-24.04-arm", "windows-latest", "macos-latest"]') || fromJSON(format('["{0}"]', inputs.runner)) }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-binary-${{ matrix.runner }}
      - name: Build the release binary
        run: cargo build --release --locked -p ${{ inputs.package || 'doctor' }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.package || 'doctor' }}-${{ matrix.runner }}
          path: |
            target/release/${{ inputs.package || 'doctor' }}
            target/release/${{ inputs.package || 'doctor' }}.exe
          if-no-files-found: error
# (touch: rebuild after the D2 host-validation fixes)
