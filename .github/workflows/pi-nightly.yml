# Nightly verification on a Raspberry Pi 5 self-hosted runner (Linux/ARM64).
#
# Coverage rationale: the workflows in this directory all target x86_64
# GitHub-hosted runners (ubuntu/macos/windows). The Pi 5 is ARM64, so this
# nightly catches arch-specific regressions (atomics, alignment, vendored C
# deps such as cfitsio) that scheduled.yml cannot. See
# docs/skills/raspberry-pi-runner.md for runner setup and security posture.
#
# === Security model — DO NOT WEAKEN ===
#
# This is the only workflow that runs on a self-hosted runner, and the repo is
# public. Self-hosted runners on public repos are dangerous specifically
# because a malicious PR can edit the workflow YAML and run arbitrary code on
# the runner during PR validation. The safety property here is that this
# workflow has NO `pull_request` and NO `push` trigger. Scheduled runs always
# execute the workflow file from the default branch (main), and only the
# repo owner can write to main, so PRs literally cannot influence what
# executes on the Pi.
#
# Belt-and-suspenders:
#   * `if: github.ref == 'refs/heads/main'` on the build job
#   * `ref: main` pinned on `actions/checkout`
#   * Workflow-level `permissions: contents: read` (the issue-writer job
#     elevates only what it needs, scoped to that job)
#
# If you ever feel tempted to add `pull_request:` to this file, do not — see
# docs/skills/raspberry-pi-runner.md §"Why no pull_request trigger".
permissions:
  contents: read

on:
  schedule:
    # Daily at 04:00 UTC. Slots between plate-solver-smoke (03:30 UTC) and
    # install-astap (04:30 UTC) so a Pi observer of the Actions tab sees them
    # in a clean sequence; neither of those workflows runs on this runner,
    # so the only real coordination cost is human readability.
    - cron: "0 4 * * *"
  workflow_dispatch:

# Don't cancel an in-flight nightly if a manual dispatch fires — losing a
# scheduled run is worse than running two back-to-back.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

name: pi-nightly

jobs:
  arm64-stable:
    # Hard gate against accidental non-main execution. `schedule` already
    # implies main; this keeps that property explicit and survives any future
    # trigger change.
    if: github.ref == 'refs/heads/main'
    name: raspberry-pi / linux / arm64 / stable
    # `raspberry-pi` is the custom label applied during runner registration;
    # the other three are standard self-hosted labels GitHub injects
    # automatically. Match in the same shape used during `config.sh
    # --labels raspberry-pi` — see docs/skills/raspberry-pi-runner.md.
    runs-on: [self-hosted, Linux, ARM64, raspberry-pi]
    # First run with a cold cache can build the full workspace from scratch on
    # ARM, which is slow on a Pi 5. 6h is generous; warmed-cache runs should
    # finish in ~60-90 min.
    timeout-minutes: 360

    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install Pebble
        uses: ./.github/actions/install-pebble

      - name: Install stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache namespace from the existing linux-stable (x86)
          # cache so the two architectures don't evict each other.
          shared-key: linux-arm64-stable

      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      # Provision the QHYCCD SDK without sudo. This runner is intentionally
      # sudo-less (public-repo defense-in-depth — see
      # docs/skills/raspberry-pi-runner.md), so it cannot system-install the SDK
      # into /usr/local. `install: env` extracts the SDK under the workspace and
      # exports QHYCCD_SDK_DIR; libqhyccd-sys's build.rs reads that var to find
      # libqhyccd.a (linked statically). This makes the runner self-healing: a
      # new native-SDK service or version bump no longer requires re-running
      # setup-pi-runner.sh by hand. Keep the version in lockstep with the x86
      # jobs (scheduled.yml / native.yml / bazel*.yml all pin 26.06.04).
      - name: Install QHYCCD SDK (sudo-free)
        uses: ivonnyssen/qhyccd-sdk-install@v4
        with:
          version: "26.06.04"
          install: env

      # The static libqhyccd.a still pulls in a *dynamic* `-lusb-1.0`, and
      # libqhyccd-sys's build.rs only adds `-L $QHYCCD_SDK_DIR` to the link
      # search (the SDK dir holds libqhyccd.a, no libusb). On a sudo-less runner
      # there is no libusb-1.0-0-dev, hence no unversioned `libusb-1.0.so` for
      # the linker to find, and the build fails with "cannot find -lusb-1.0"
      # (issue #402). Drop that linker-name symlink into $QHYCCD_SDK_DIR — the
      # one dir build.rs searches — pointing at the libusb-1.0 *runtime* .so.0
      # (the libusb-1.0-0 package installed once by setup-pi-runner.sh §1). This
      # mirrors install-zwo-sdk's sudo-free symlink for libzwo-sys, keeping the
      # runner self-healing and free of -dev packages.
      - name: Symlink libusb for the QHYCCD static link (sudo-free)
        shell: bash
        run: |
          set -euo pipefail
          : "${QHYCCD_SDK_DIR:?QHYCCD_SDK_DIR not set — the QHYCCD SDK step must run first}"
          rt=""
          if command -v ldconfig >/dev/null 2>&1; then
            # `|| true`: with pipefail, a failing `ldconfig -p` makes this
            # assignment non-zero, which under `set -e` would abort the step
            # before the directory-scan fallback below ever runs. Swallow it so
            # the fallback can still find libusb-1.0.so.0.
            rt="$(ldconfig -p 2>/dev/null | awk '/libusb-1\.0\.so\.0/{print $NF; exit}')" || true
          fi
          if [ -z "$rt" ]; then
            for d in /usr/lib/aarch64-linux-gnu /lib/aarch64-linux-gnu /usr/lib /lib; do
              if [ -e "$d/libusb-1.0.so.0" ]; then rt="$d/libusb-1.0.so.0"; break; fi
            done
          fi
          if [ -z "$rt" ]; then
            echo "::error::pi-nightly: libusb-1.0 runtime (libusb-1.0.so.0) not found. It is installed once at runner setup (scripts/setup-pi-runner.sh §1 / docs/skills/raspberry-pi-runner.md). Install it and re-run: sudo apt-get install -y libusb-1.0-0"
            exit 1
          fi
          ln -sf "$rt" "$QHYCCD_SDK_DIR/libusb-1.0.so"
          echo "pi-nightly: linked $QHYCCD_SDK_DIR/libusb-1.0.so -> $rt"

      # Provision the ZWO ASI/EFW SDK without sudo, mirroring the QHYCCD step.
      # zwo-camera links libzwo-sys, whose build.rs emits -lASICamera2 /
      # -lEFWFilter / -lusb-1.0 / -ludev unconditionally (even under --features
      # simulation), so the full-workspace build needs the SDK at link time.
      # `sudo: "false"` stages the SDK blobs under $RUNNER_TEMP, symlinks the
      # system libusb/libudev *runtime* libs to satisfy the unversioned -l names
      # (no -dev packages), and exports ZWO_SDK_LIB_DIR + LD_LIBRARY_PATH — no
      # /usr/local writes, no apt, no sudo. The clang/libclang (bindgen) and
      # libusb-1.0 runtime prerequisites are installed once by
      # scripts/setup-pi-runner.sh. Keep this runner self-healing: a ZWO SDK
      # bump only needs the action's `ref` updated, not a manual re-provision.
      - name: Install ZWO SDK (sudo-free)
        uses: ./.github/actions/install-zwo-sdk
        with:
          sudo: "false"

      # svbony-camera + the vendored svbony-rs/libsvbony-sys link the native
      # SVBony SDK unconditionally (no SVBONY_SKIP_NATIVE_LINK set below); the
      # full-workspace build below needs it on the link path (provision, don't
      # exclude) — same shape as the ZWO step above. Sudo-free mode mirrors
      # the ZWO/QHYCCD steps: the blob is staged under $RUNNER_TEMP, -lusb-1.0
      # is resolved by symlinking the system libusb-1.0 runtime (installed
      # once by scripts/setup-pi-runner.sh) into that same dir, and
      # SVBONY_SDK_LIB_DIR + LD_LIBRARY_PATH are exported instead of touching
      # /usr/local.
      - name: Install SVBony SDK (sudo-free)
        uses: ./.github/actions/install-svbony-sdk
        with:
          sudo: "false"

      # Pre-build all targets so nextest and BDD tests find cached binaries
      # without recompilation. Mirrors scheduled.yml's nightly job.
      - name: cargo build --workspace
        run: cargo build --locked --workspace --all-features --all-targets

      - name: cargo nextest run
        run: cargo nextest run --locked --all-features --all-targets

      # BDD tests use a custom harness (bdd_main!) incompatible with nextest.
      - name: cargo test --test bdd
        run: cargo test --locked --all-features --test bdd

      # https://github.com/rust-lang/cargo/issues/6669
      - name: cargo test --doc
        run: cargo test --locked --all-features --doc

      # Preserve OmniSim logs on failure for off-runner analysis (matches the
      # pattern in test.yml). Without this, the only copy lives inside the
      # runner's _work directory and is overwritten next run.
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-pi-nightly
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14

  notify-on-failure:
    # Open or update a tracking issue when the scheduled nightly fails so a
    # red ARM build does not sit unnoticed in the Actions tab. Skipped on
    # workflow_dispatch so manual debugging runs do not churn the issue.
    # Runs on a hosted runner — if the Pi runner itself is offline or broken,
    # this still fires and reports.
    needs: arm64-stable
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = `nightly: pi-nightly ARM64 build failing`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The nightly Raspberry Pi 5 ARM64 verification workflow failed.`,
              ``,
              `Likely causes: an arch-specific regression (atomics, alignment,`,
              `endian, SIMD intrinsics, vendored C deps such as cfitsio), a`,
              `change that breaks cross-arch feature unification, the Pi runner`,
              `being offline or low on disk, or an OmniSim/BDD flake. See the`,
              `failed job for the per-step log and the uploaded OmniSim logs`,
              `artifact (if the failure was in cargo test --test bdd).`,
              ``,
              `Runner setup and decommissioning: docs/skills/raspberry-pi-runner.md`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `This issue was opened automatically by a scheduled run that`,
              `failed. While it stays open, each subsequent scheduled failure`,
              `is appended here as a comment linking its own run. Closing it`,
              `marks the failure handled — it is never re-opened; the next`,
              `scheduled failure opens a fresh issue instead.`,
            ].join("\n");
            // Search only OPEN issues. While a tracking issue is open each
            // failure appends a comment; once it is closed the failure is
            // considered handled, so the next scheduled failure opens a
            // fresh issue rather than resurrecting the closed one.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "pi-nightly",
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Failed again — run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["pi-nightly", "ci-flake"],
              });
            }
