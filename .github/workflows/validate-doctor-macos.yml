# TEMPORARY (doctor D2 validation): exercises the brew-services inspector
# against a real macOS host state — taps the live nightly channel, installs
# two service formulas, registers one with brew services, and runs the real
# doctor binary end to end. Triggered by pushes to this file so it can run
# from the D2 branch (workflow_dispatch only resolves against the default
# branch). Delete once the D2 validation matrix is recorded on the PR.
name: validate-doctor-macos

on:
  push:
    paths:
      - ".github/workflows/validate-doctor-macos.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-binary-macos-latest
      - name: Build doctor
        run: cargo build --release --locked -p doctor
      - name: Install nightly formulas and register a service
        run: |
          brew tap ivonnyssen/rusty-photon
          brew install rusty-photon-sentinel-nightly rusty-photon-filemonitor-nightly
          # Registration is what the inspector reads; a start failure in the
          # CI sandbox must not fail the leg (status still lists the formula).
          brew services start rusty-photon-sentinel-nightly || true
          sleep 3
          brew services list
      - name: Run doctor against the real brew state
        run: |
          set +e
          ./target/release/doctor
          text_status=$?
          ./target/release/doctor --json > report.json
          json_status=$?
          set -e
          cat report.json
          echo "text exit: ${text_status}, json exit: ${json_status}"
          # The two formulas must be recognized as packaged units (the
          # -nightly suffix normalizes to the unit stem), and exit codes
          # must be diagnosis results (0/1), never a doctor error (2).
          grep -q '"mode": "packaged"' report.json
          grep -q '"service": "sentinel"' report.json
          grep -q '"service": "filemonitor"' report.json
          test "${json_status}" -le 1
      - name: Deregister services
        if: always()
        run: |
          brew services stop rusty-photon-sentinel-nightly || true
