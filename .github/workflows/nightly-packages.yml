# Nightly rolling-release packaging (docs/plans/nightly-releases.md).
#
# Builds installable packages from the HEAD of main and publishes them to
# ONE rolling `nightly` prerelease: the tag is force-moved to the packaged
# commit, all assets are replaced, no dated history. The tag deliberately
# does not match `v*` (that pattern triggers release.yml).
#
# Structure (the "shared spine"):
#   plan     — skip-if-unchanged (HEAD vs the published nightly tag) and
#              one version computation; each packager renders its own
#              dialect of "sorts after 0.1.0, before 0.1.1".
#   linux    — build + FULL lifecycle verification per leg, on hosted
#              runners (the N0 spike closed the self-hosted contingency).
#              Each leg builds the .deb AND .rpm set and verifies both:
#              the debs through the Debian container lifecycle, the rpms
#              through the Fedora one (which doubles as the proof that the
#              rpms' declared requires resolve — N2). Building without
#              installing is not a gate: nothing publishes unless every
#              enabled leg passed its verifiers.
#   msi      — the Windows suite MSI (ADR-015) with the nightly version
#              stamp; its verifier additionally installs over the
#              previously PUBLISHED nightly MSI, proving the
#              AllowSameVersionUpgrades in-place upgrade that release-tag
#              testing never exercises (phase N3).
#   macos    — per-service arm64 tarballs (the Homebrew formula payloads),
#              lifecycle-verified through real brew (install → services →
#              probe → uninstall) before anything publishes (phase N4).
#   repo     — the apt/dnf repository trees for pkg.rustyphoton.space
#              (phase N5), rendered from the linux legs' already-verified
#              packages and consumer-verified (podman clients holding only
#              the public signing key install through the real resolvers)
#              before anything publishes.
#   publish  — all-or-nothing across the enabled legs, so the release is
#              always one coherent SHA with a complete asset set. For macOS
#              it also pushes the regenerated -nightly formulas to the
#              ivonnyssen/homebrew-rusty-photon tap in the same job, so tap
#              and assets move together; the apt/dnf trees go to the R2
#              bucket last, content-first/metadata-flip/delete-stale-after,
#              so a client mid-update never sees a half-replaced repo.
#   notify-on-failure — tracking issue on scheduled failures, label
#              `nightly-packages` (same pattern as scheduled.yml).
#
# Thin workflow, thick scripts: the legs drive scripts/build-packages.sh +
# scripts/verify-packages.sh (shared with on-demand builds on the rigs),
# scripts/build-msi.ps1 + scripts/verify-msi.ps1 (shared with msi.yml and
# release.yml), scripts/build-tarballs.sh + scripts/verify-brew.sh +
# scripts/generate-brew-formulas.sh (shared with release.yml's stable
# Homebrew channel), and scripts/build-apt-repo.sh +
# scripts/build-yum-repo.sh + scripts/verify-packages-repo.sh +
# scripts/push-packages-repo.sh (the package-repo channel).
permissions:
  contents: read

on:
  schedule:
    # 05:07 UTC — after pi-nightly (04:00), before the 07:07 nightly cluster.
    - cron: "7 5 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + verify every leg but skip publish (validate a branch without touching the nightly channel)"
        type: boolean
        default: false

# Don't cancel an in-flight nightly if a manual dispatch fires — losing a
# scheduled run is worse than running two back-to-back (pi-nightly reasoning).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

name: nightly-packages

env:
  CARGO_TERM_COLOR: always

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.decide.outputs.skip }}
      sha: ${{ steps.decide.outputs.sha }}
      date: ${{ steps.version.outputs.date }}
      # The canonical +nightly string: the Debian version verbatim, the
      # MSI filename/ARP-comments string (build-msi.ps1 renders the MSI
      # ProductVersion from it), and the stamp build-packages.sh derives
      # the rpm ^ dialect from.
      nightly_version: ${{ steps.version.outputs.nightly_version }}
    steps:
      - uses: actions/checkout@v7
      - name: Skip if the published nightly already has this SHA
        id: decide
        run: |
          sha=$(git rev-parse HEAD)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          # The nightly tag is pushed lightweight, so ls-remote's hash IS the
          # commit; the ^{} peel covers a manually created annotated tag.
          peeled=$(git ls-remote origin 'refs/tags/nightly^{}' | cut -f1)
          plain=$(git ls-remote origin refs/tags/nightly | cut -f1)
          published=${peeled:-$plain}
          if [ "$published" = "$sha" ]; then
            echo "Nightly tag already at $sha — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing $sha (nightly tag: ${published:-none})."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Compute the version dialects
        id: version
        if: steps.decide.outputs.skip != 'true'
        run: |
          base=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -1)
          [ -n "$base" ] || { echo "could not read the workspace version" >&2; exit 1; }
          date=$(date -u +%Y%m%d)
          short=$(git rev-parse --short=7 HEAD)
          echo "date=$date" >> "$GITHUB_OUTPUT"
          echo "nightly_version=${base}+nightly.${date}.g${short}" >> "$GITHUB_OUTPUT"

  linux:
    needs: plan
    if: needs.plan.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    name: linux / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    # N0 spike: ~12 min cold / ~8 min warm per leg (arm64 slightly faster);
    # the Fedora rpm verification (N2) adds its container build plus a dnf
    # dependency resolution per service on top.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      # cache-bin (rust-cache's default) also keeps the cargo-installed
      # cargo-deb binary, so build-packages.sh skips the install when warm.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly-packages-${{ matrix.arch }}
      # Keyed on the script because it embeds the SDK pins: the cache
      # invalidates exactly when a pin (or the staging logic) changes,
      # keeping qhyccd.com off the nightly critical path.
      - name: Cache staged SDKs
        uses: actions/cache@v6
        with:
          path: ~/.cache/rusty-photon-pkg
          key: rusty-photon-pkg-${{ matrix.arch }}-${{ hashFiles('scripts/build-packages.sh') }}
      - name: Build packages
        # --rpm rides on the same release build; the script derives the rpm
        # ^ dialect from the canonical +nightly stamp itself.
        run: scripts/build-packages.sh --rpm --deb-version '${{ needs.plan.outputs.nightly_version }}'
      - name: Verify deb packages (full install lifecycle)
        run: scripts/verify-packages.sh --dist 'dist/${{ needs.plan.outputs.nightly_version }}'
      - name: Verify rpm packages (full install lifecycle, Fedora)
        run: scripts/verify-packages.sh --rpm --dist 'dist/${{ needs.plan.outputs.nightly_version }}'
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.arch }}
          path: |
            dist/${{ needs.plan.outputs.nightly_version }}/*.deb
            dist/${{ needs.plan.outputs.nightly_version }}/*.rpm
          if-no-files-found: error

  msi:
    needs: plan
    if: needs.plan.outputs.skip != 'true'
    name: windows / suite msi
    runs-on: windows-latest
    # Cold MSI builds on windows-latest run long (msi.yml precedent).
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      # Same shared-key as msi.yml/release.yml: all three build the same
      # CRT-static release set, so they share one cache lineage.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-msi
      - name: Fetch the previously published nightly MSI
        id: prior
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The release still carries last night's assets at this point
          # (publish replaces them later), so installing over this MSI is
          # the real nightly-over-nightly upgrade path. Only a genuinely
          # empty channel (no release yet / no MSI asset yet — the leg's
          # first runs) skips the seed; a failed query or download FAILS,
          # so a transient error cannot silently drop the upgrade proof.
          $names = gh api 'repos/{owner}/{repo}/releases/tags/nightly' --jq '.assets[].name' 2>&1
          if ($LASTEXITCODE -ne 0) {
            # HTTP 404 means exactly "the release does not exist"; anything
            # else (auth, network, rate limit) must fail the leg.
            if ("$names" -match 'HTTP 404') {
              Write-Host "no nightly release yet - skipping the upgrade seed"
              exit 0
            }
            Write-Error "querying the nightly release failed: $names"
            exit 1
          }
          $priorName = @($names) -match '\.msi$' | Select-Object -First 1
          if (-not $priorName) {
            Write-Host "nightly release has no MSI asset yet - skipping the upgrade seed"
            exit 0
          }
          New-Item -ItemType Directory -Force -Path prior-nightly | Out-Null
          gh release download nightly --pattern '*.msi' --dir prior-nightly
          if ($LASTEXITCODE -ne 0) {
            Write-Error "downloading $priorName from the nightly release failed"
            exit 1
          }
          $prior = Get-ChildItem prior-nightly -Filter '*.msi' | Select-Object -First 1
          "path=$($prior.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "upgrade seed: $($prior.Name)"
          exit 0
      - name: Build the suite MSI (nightly stamp)
        shell: pwsh
        run: scripts\build-msi.ps1 -NightlyVersion '${{ needs.plan.outputs.nightly_version }}'
      - name: Verify the MSI lifecycle (incl. upgrade over the prior nightly)
        shell: pwsh
        run: |
          $msi = 'dist\${{ needs.plan.outputs.nightly_version }}\rusty-photon-${{ needs.plan.outputs.nightly_version }}-x64.msi'
          $prior = '${{ steps.prior.outputs.path }}'
          if ($prior) {
            scripts\verify-msi.ps1 -Msi $msi -UpgradeFrom $prior
          } else {
            scripts\verify-msi.ps1 -Msi $msi
          }
      - name: Upload the MSI
        uses: actions/upload-artifact@v7
        with:
          name: msi
          path: dist/${{ needs.plan.outputs.nightly_version }}/*.msi
          if-no-files-found: error

  macos:
    needs: plan
    if: needs.plan.outputs.skip != 'true'
    name: macos / arm64 tarballs
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly-packages-macos
      # Keyed on the script because it embeds the SDK pins (same contract as
      # the linux legs): the cache invalidates exactly when a pin or the
      # staging logic changes, keeping qhyccd.com off the nightly critical
      # path.
      - name: Cache staged SDKs
        uses: actions/cache@v6
        with:
          path: ~/.cache/rusty-photon-pkg
          key: rusty-photon-pkg-macos-${{ hashFiles('scripts/build-tarballs.sh') }}
      - name: Build the per-service tarballs
        run: scripts/build-tarballs.sh --version '${{ needs.plan.outputs.nightly_version }}'
      - name: Verify via Homebrew (full install lifecycle)
        run: scripts/verify-brew.sh --channel nightly --dist 'dist/${{ needs.plan.outputs.nightly_version }}'
      - name: Upload tarballs
        uses: actions/upload-artifact@v7
        with:
          name: tarballs-macos
          path: dist/${{ needs.plan.outputs.nightly_version }}/*.tar.gz
          if-no-files-found: error

  repo:
    needs: [plan, linux]
    if: needs.plan.outputs.skip != 'true'
    name: linux / apt+dnf repos
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Download the verified packages
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: pkgs
          merge-multiple: true
      - name: Render the apt repository tree
        env:
          PACKAGES_GPG_PRIVATE_KEY: ${{ secrets.PACKAGES_GPG_PRIVATE_KEY }}
        run: scripts/build-apt-repo.sh --dist pkgs --site site
      - name: Render the dnf repository trees
        env:
          PACKAGES_GPG_PRIVATE_KEY: ${{ secrets.PACKAGES_GPG_PRIVATE_KEY }}
        run: scripts/build-yum-repo.sh --dist pkgs --site site
      # The consumer proof the manual curl-and-install path never gives:
      # podman clients holding only the PUBLIC key add the repo exactly as
      # docs/packaging.md documents and install through the real resolvers
      # (signature checked; both arches covered per flavor).
      - name: Verify as a repo consumer (apt + dnf)
        run: scripts/verify-packages-repo.sh --site site
      - name: Upload the repo site tree
        uses: actions/upload-artifact@v7
        with:
          name: repo-site
          path: site
          if-no-files-found: error

  publish:
    needs: [plan, linux, msi, macos, repo]
    # inputs.dry_run is a real boolean here: the typed `inputs` context
    # preserves workflow_dispatch input types (unlike the string-typed
    # github.event.inputs) and is empty on schedule events — so `!= true`
    # publishes on schedule and on non-dry dispatches only.
    if: needs.plan.outputs.skip != 'true' && inputs.dry_run != true
    name: publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      # Release assets and the repo site tree download separately: the
      # site is pushed to the R2 bucket, not attached to the release, so
      # it must stay out of the merged assets/ dir the checksum and
      # upload globs run over.
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: assets
          merge-multiple: true
      - name: Download the MSI artifact
        uses: actions/download-artifact@v8
        with:
          name: msi
          path: assets
      - name: Download the macOS tarball artifacts
        uses: actions/download-artifact@v8
        with:
          name: tarballs-macos
          path: assets
      - name: Download the repo site tree
        uses: actions/download-artifact@v8
        with:
          name: repo-site
          path: site
      # GitHub silently rewrites `^` to `.` in uploaded asset names (N0
      # findings), so the rpm filenames are dot-rendered HERE, before the
      # checksums — sums taken over the pre-rename names would never verify
      # against a downloaded file. Only the filename changes: the rpm
      # header keeps the true `^` version.
      - name: Dot-render the rpm asset names
        run: |
          cd assets
          for f in *^*.rpm; do
            [ -e "$f" ] || continue
            mv "$f" "$(printf '%s' "$f" | tr '^' '.')"
          done
          ls -1 *.rpm
      # One merged sums file across all legs, generated AFTER the renaming
      # above.
      - name: Merge checksums
        run: |
          cd assets
          sha256sum *.deb *.rpm *.msi *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt
      # Rendered from the merged assets (tarball sha256s + the manifest the
      # meta-formula downloads), pushed to the tap only after the release
      # assets are up — tap and assets move together, assets first, so the
      # formulas never point at not-yet-uploaded files.
      - name: Render the -nightly formulas
        run: |
          scripts/generate-brew-formulas.sh --channel nightly \
            --version '${{ needs.plan.outputs.nightly_version }}' \
            --dist assets \
            --url-base "https://github.com/${GITHUB_REPOSITORY}/releases/download/nightly" \
            --output nightly-formulas
      - name: Checkout the Homebrew tap
        uses: actions/checkout@v7
        with:
          repository: ivonnyssen/homebrew-rusty-photon
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Force-move the nightly tag
        run: git push --force origin '${{ needs.plan.outputs.sha }}:refs/tags/nightly'
      - name: Publish the rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ needs.plan.outputs.sha }}
          DATE: ${{ needs.plan.outputs.date }}
          NIGHTLY_VERSION: ${{ needs.plan.outputs.nightly_version }}
        run: |
          # Same rendering as build-packages.sh derives for the rpm headers:
          # the body must state the true `^` version because the dot-rendered
          # asset filenames cannot.
          RPM_VERSION=$(printf '%s' "$NIGHTLY_VERSION" | sed 's/+nightly\./^/')
          {
            echo "Rolling nightly build of \`main\`. Assets are replaced on"
            echo "every publish — no dated history; fetch \`SHA256SUMS.txt\`"
            echo "from this release for the current filenames. Install and"
            echo "channel semantics: [docs/packaging.md](https://github.com/${GITHUB_REPOSITORY}/blob/${SHA}/docs/packaging.md#nightly-channel)"
            echo "(Windows: [docs/packaging-windows.md](https://github.com/${GITHUB_REPOSITORY}/blob/${SHA}/docs/packaging-windows.md#nightly-channel),"
            echo "macOS: [docs/packaging-macos.md](https://github.com/${GITHUB_REPOSITORY}/blob/${SHA}/docs/packaging-macos.md#nightly-channel))."
            echo
            echo "- **Source**: ${SHA}"
            echo "- **Built**: ${DATE} (UTC)"
            echo "- **Nightly version**: \`${NIGHTLY_VERSION}\` (Debian version, MSI filename, and macOS tarball/formula version; the MSI's Programs & Features version renders as \`${NIGHTLY_VERSION%%+*}.<YYDDD>\`)"
            echo "- **RPM version**: \`${RPM_VERSION}\` (\`rpm -q\` shows this; the asset filenames render the \`^\` as \`.\` because GitHub rewrites it at upload)"
            echo "- **macOS**: don't download the tarballs by hand — \`brew tap ivonnyssen/rusty-photon && brew install rusty-photon-nightly\` (the formulas point here)"
            echo
            echo "| Asset | SHA-256 |"
            echo "|-------|---------|"
            while read -r sum file; do
              echo "| \`${file}\` | \`${sum}\` |"
            done < assets/SHA256SUMS.txt
          } > body.md
          if gh release view nightly --json id --jq .id > /dev/null 2>&1; then
            # Replace, don't accumulate: a package dropped from the set must
            # not linger as a stale asset, so delete everything first. The
            # brief empty-asset window is acceptable on this channel.
            gh release view nightly --json assets --jq '.assets[].name' |
              while read -r name; do
                gh release delete-asset nightly "$name" --yes
              done
            gh release edit nightly --prerelease --title "Nightly packages" \
              --notes-file body.md
          else
            gh release create nightly --verify-tag --prerelease \
              --title "Nightly packages" --notes-file body.md
          fi
          gh release upload nightly assets/*.deb assets/*.rpm assets/*.msi assets/*.tar.gz assets/SHA256SUMS.txt
      - name: Push the -nightly formulas to the tap
        env:
          NIGHTLY_VERSION: ${{ needs.plan.outputs.nightly_version }}
        run: |
          # Replace, don't accumulate (the asset-replacement reasoning): a
          # service dropped from the set must not linger as a stale formula.
          # rusty-photon-nightly.rb (the meta) matches the glob too and is
          # re-copied with the rest.
          rm -f homebrew-tap/Formula/*-nightly.rb
          cp nightly-formulas/*.rb homebrew-tap/Formula/
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula
          if git diff --cached --quiet; then
            echo "tap already current"
          else
            git commit -m "nightly: ${NIGHTLY_VERSION}"
            git push
          fi
      # Last of the channels: the release assets and tap are already live,
      # and the repo tree was consumer-verified in the repo job. The push
      # ordering (content, then the metadata flip, then stale deletes) is
      # what keeps a client mid-`apt update` safe — see the script header.
      # aws CLI (preinstalled on ubuntu runners) against R2's S3 endpoint:
      # the S3 API is the only one a bucket-scoped Object Read & Write
      # token can authenticate — see the script header.
      - name: Push the apt/dnf repos to R2 (pkg.rustyphoton.space)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PACKAGES_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PACKAGES_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: scripts/push-packages-repo.sh --site site

  notify-on-failure:
    # Tracking issue so a broken nightly channel surfaces without anyone
    # reading scheduled-workflow logs. Scheduled runs only: manual dispatches
    # are being watched by whoever dispatched them.
    needs: [plan, linux, msi, macos, repo, publish]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = `nightly-packages: nightly packaging failing`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The nightly packaging workflow failed on at least one job, so no`,
              `nightly was published tonight (the channel publishes all-or-nothing;`,
              `the previous nightly release is untouched).`,
              ``,
              `Likely causes: a build or lifecycle-verification failure on one of`,
              `the package legs, an SDK download failing its pin, or the publish`,
              `step. Inspect the failed jobs in the linked run.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `This issue was opened automatically by a scheduled run that`,
              `failed. While it stays open, each subsequent scheduled failure`,
              `is appended here as a comment linking its own run. Closing it`,
              `marks the failure handled — it is never re-opened; the next`,
              `scheduled failure opens a fresh issue instead.`,
            ].join("\n");
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "nightly-packages",
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Failed again — run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["nightly-packages", "ci-flake"],
              });
            }
