# Verifies the REAL (non-`simulation`) native-SDK build of BOTH native-camera
# services against their actual proprietary/native SDKs, on every supported OS.
# One workflow covers both because they exercise the same risk (real link + FFI)
# the rest of CI does not — but for opposite reasons:
#
# - **qhy-camera / qhyccd-rs / libqhyccd-sys** link `static=qhyccd`
#   UNCONDITIONALLY (no cfg/env gate). The rest of qhy CI builds with
#   `--all-features` (or `--features conformu`), which enables the `simulation`
#   feature and compiles the SIMULATED `Sdk::new()` — those jobs LINK the real
#   SDK but never COMPILE the non-`simulation` init path. This job builds with
#   DEFAULT features (no `simulation`, no `--all-targets` so the test-only
#   `simulation` dev-dep can't feature-unify back on) to compile + link the real
#   `InitQHYCCDResource` path. No `cargo test` smoke: qhyccd-rs swaps a mockall
#   mock for the FFI under `#[cfg(test)]`, so `cargo test` would exercise the mock.
#
# - **zwo-camera / zwo-rs / libzwo-sys** take the opposite approach: the rest of
#   CI (test/conformu/safety) builds the `simulation` path with
#   ZWO_SKIP_NATIVE_LINK=1 and never links the SDK at all. So this is the ONLY
#   job that links + loads the real ZWO SDK, and it adds a Linux runtime smoke.
#
# - **touptek-camera / touptek-rs / libtoupcam-sys** are like zwo (the rest of CI
#   skip-links via TOUPCAM_SKIP_NATIVE_LINK=1), but run in a SEPARATE `touptek` job
#   on Linux + macOS only: their SDK comes from the INDI mirror, which ships no
#   Windows blob (install-toupcam-sdk self-skips Windows). That job is the bring-up
#   gate for the real ToupTek link and ALSO runs at PR time (the qhy/zwo `build`
#   job stays nightly/push-only) so the action can be exercised on a PR. See
#   docs/plans/touptek-driver.md Phase F.
#
# (Bazel's real qhyccd-rs/zwo-rs variants build-enforce the lib halves; the Pi
# nightly covers linux-arm64.)
#
# Cadence: nightly cron + workflow_dispatch, plus a paths-filtered push to main so a
# real-link regression in either service's native code, this workflow, or an
# SDK-install action is caught when it lands on main rather than only at the next cron fire.
permissions:
  contents: read
on:
  schedule:
    # 06:47 UTC. Offset from the other nightlies (conformu 05:30, bazel 07:07,
    # safety 07:17) so they do not contend for the hosted-runner pool minute.
    - cron: "47 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/qhyccd-rs/**"
      - "services/qhy-camera/**"
      - "crates/zwo-rs/**"
      - "services/zwo-camera/**"
      - "crates/touptek-rs/**"
      - "services/touptek-camera/**"
      - ".github/actions/install-zwo-sdk/**"
      - ".github/actions/install-toupcam-sdk/**"
      - ".github/workflows/native.yml"
  # PR-time real-link check for the ToupTek bring-up only (runs the `touptek` job;
  # the qhy/zwo `build` job is gated off pull_request below). Scoped to the touptek
  # crates, the install-toupcam-sdk action, and this workflow so unrelated PRs are
  # unaffected and the expensive qhy/zwo legs stay nightly/push-only.
  pull_request:
    paths:
      - "crates/touptek-rs/**"
      - "services/touptek-camera/**"
      - ".github/actions/install-toupcam-sdk/**"
      - ".github/workflows/native.yml"
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: native
jobs:
  build:
    name: native link / ${{ matrix.os }}
    # qhy + zwo real link: nightly / dispatch / push-to-main only. PRs do not run
    # this job (the touptek bring-up job below is the only PR-time native leg), so
    # qhy/zwo stay covered exactly as before — the cron + push-to-main paths — and
    # a touptek PR does not pay the full 3-OS qhy+zwo matrix.
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Own cache keys, separate from test.yml's `--all-features` sim builds.
          shared-key: native-${{ matrix.os }}

      # --- QHYCCD SDK (qhy-camera) -------------------------------------------
      # static=qhyccd; on Linux the static lib pulls libusb-1.0 + stdc++, on
      # macOS libusb via Homebrew. The published action stages the SDK into
      # /usr/local/lib on Linux and into $GITHUB_WORKSPACE on macOS/Windows.
      - name: Install libusb (qhy-camera, Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libusb-1.0-0-dev
          version: 1.0
      - name: Install libusb (qhy-camera, macOS)
        if: runner.os == 'macOS'
        run: brew install libusb
      - name: Install QHYCCD SDK
        uses: ivonnyssen/qhyccd-sdk-install@v4
        with:
          version: "26.06.04"

      # --- ZWO ASI/EFW SDK (zwo-camera) --------------------------------------
      # The composite action installs the MIT ZWO SDK on every OS (and libclang
      # for bindgen; forwards LIBCLANG_PATH / ZWO_SDK_LIB_DIR where needed).
      - name: Install ZWO SDK
        uses: ./.github/actions/install-zwo-sdk

      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      # qhy: DEFAULT features (no simulation) + no --all-targets on the service
      # so the test-only `simulation` dev-dep can't feature-unify the simulated
      # backend onto the prod binary. The binding crates keep --all-targets to
      # also compile their real `src/bin` FFI probes (no sim-forcing dev-dep).
      - name: cargo build (qhy, real, no simulation)
        run: |
          cargo build --locked -p qhy-camera
          cargo build --locked -p qhyccd-rs -p libqhyccd-sys --all-targets

      # zwo: same shape — no simulation, no ZWO_SKIP_NATIVE_LINK, service without
      # --all-targets, binding crates with it.
      - name: cargo build (zwo, real, no simulation)
        run: |
          cargo build --locked -p zwo-camera
          cargo build --locked -p zwo-rs -p libzwo-sys --all-targets

      # Linux runtime smoke (zwo only): zwo-rs's non-`simulation` tests call the
      # real SDK (init, version strings, a 0-camera enumeration with no hardware),
      # confirming it *loads* and basic FFI works — not just that it links. Linux
      # only: the SDK is on the default loader path (/usr/local/lib); macOS/Windows
      # would need DYLD/PATH wiring this job does not set, and the link check above
      # already covers them. (qhy has no equivalent — its FFI is mocked under test.)
      - name: cargo test (real zwo-rs FFI smoke)
        if: runner.os == 'Linux'
        run: cargo test --locked -p zwo-rs --all-targets
        env:
          LD_LIBRARY_PATH: /usr/local/lib

  # touptek-camera real link — its own job because the SDK comes from the INDI
  # mirror (Linux/macOS only; INDI/INDIGO ship no Windows blob) and because it is
  # the one native leg that runs at PR time. Isolated from the qhy/zwo `build` job
  # so a ToupTek bring-up PR runs ONLY this (no qhy/zwo SDK installs to flake on).
  touptek:
    name: native link (touptek) / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # No windows-latest: INDI/INDIGO ship no Windows ToupTek blob, so
      # install-toupcam-sdk self-skips there and a real Windows link is not yet
      # possible (it needs a ToupTek vendor-SDK URL — see the action + Phase F).
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-touptek-${{ matrix.os }}

      # libtoupcam comes from the INDI mirror (the deferred-licensing footing — see
      # docs/plans/touptek-driver.md "Licensing (deferred)"). The action installs
      # libclang for bindgen and libtoupcam under the linker name `-ltoupcam`
      # resolves (+ libusb/libudev on Linux); macOS gets the universal `mac/` dylib
      # + an install_name fixup.
      - name: Install ToupTek SDK
        uses: ./.github/actions/install-toupcam-sdk

      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      # Real (non-simulation) link: DEFAULT features (no simulation), and the
      # service WITHOUT --all-targets so its test-only `simulation` dev-dep can't
      # feature-unify the simulated backend back onto the prod binary (same shape
      # as qhy/zwo). The binding crates keep --all-targets to compile their real
      # (non-simulation) tests.
      - name: cargo build (touptek, real, no simulation)
        run: |
          cargo build --locked -p touptek-camera
          cargo build --locked -p touptek-rs -p libtoupcam-sys --all-targets

      # Linux runtime smoke: touptek-rs's non-`simulation` tests call the real SDK
      # (Sdk::new, a 0-camera Toupcam_EnumV2 with no hardware), confirming it LOADS
      # and basic FFI works — not just that it links. Linux only: the SDK is on the
      # default loader path (/usr/local/lib via the sudo install); macOS would need
      # DYLD wiring this job does not set, and the link check above already covers it.
      - name: cargo test (real touptek-rs FFI smoke)
        if: runner.os == 'Linux'
        run: cargo test --locked -p touptek-rs --all-targets
        env:
          LD_LIBRARY_PATH: /usr/local/lib

  notify-on-failure:
    # Open or update a tracking issue when the nightly run fails so a real-link
    # regression surfaces without depending on someone reading scheduled-workflow
    # logs. Skipped on push and workflow_dispatch so manual runs do not
    # churn the issue.
    needs: [build, touptek]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = `nightly: native SDK build failing`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The nightly \`native\` workflow failed on at least one OS.`,
              ``,
              `This is the only CI workflow that compiles + links the qhy, zwo, AND`,
              `touptek crates' REAL (non-\`simulation\`) paths against their installed`,
              `SDKs. A failure`,
              `means a native-SDK link directive, a bindgen binding, or some`,
              `\`#[cfg(not(feature = "simulation"))]\` FFI code no longer compiles,`,
              `links, or loads against the SDK — the rest of CI builds the simulation`,
              `path and would not catch this. Inspect the failed job in the linked run.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `This issue was opened automatically by a scheduled run that`,
              `failed. While it stays open, each subsequent scheduled failure`,
              `is appended here as a comment linking its own run. Closing it`,
              `marks the failure handled — it is never re-opened; the next`,
              `scheduled failure opens a fresh issue instead.`,
            ].join("\n");
            // Search only OPEN issues. While a tracking issue is open each
            // failure appends a comment; once it is closed the failure is
            // considered handled, so the next scheduled failure opens a fresh
            // issue rather than resurrecting the closed one.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "native-nightly",
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Failed again — run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["native-nightly", "ci-flake"],
              });
            }
