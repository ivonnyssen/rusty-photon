# Verifies the REAL (non-`simulation`) native-SDK build of the three
# native-camera services against their actual proprietary/native SDKs, on
# every supported OS. One workflow covers all three because they exercise
# the same risk (real link + FFI) the rest of CI does not — but for
# different reasons:
#
# - **qhy-camera / qhyccd-rs / libqhyccd-sys** link `static=qhyccd`
#   UNCONDITIONALLY (no cfg/env gate). The rest of qhy CI builds with
#   `--all-features` (or `--features conformu`), which enables the `simulation`
#   feature and compiles the SIMULATED `Sdk::new()` — those jobs LINK the real
#   SDK but never COMPILE the non-`simulation` init path. This job builds with
#   DEFAULT features (no `simulation`, no `--all-targets` so the test-only
#   `simulation` dev-dep can't feature-unify back on) to compile + link the real
#   `InitQHYCCDResource` path. No `cargo test` smoke: qhyccd-rs swaps a mockall
#   mock for the FFI under `#[cfg(test)]`, so `cargo test` would exercise the mock.
#
# - **zwo-camera / zwo-focuser / zwo-rs / libzwo-sys** and **svbony-camera /
#   svbony-rs / libsvbony-sys** take the opposite approach: the rest of CI
#   (test/conformu/safety) builds the `simulation` path with
#   ZWO_SKIP_NATIVE_LINK=1 / SVBONY_SKIP_NATIVE_LINK=1 and never links the SDK
#   at all. So this is the ONLY job that links + loads the real ZWO/SVBony
#   SDKs, and it adds a Linux runtime smoke for each. svbony-camera additionally
#   has NO Windows leg at all (indi-3rdparty's libsvbony packaging hard-fails
#   CMake on Windows, and libsvbony-sys/build.rs panics unconditionally on
#   CARGO_CFG_TARGET_OS=windows before even checking the skip-link env — see
#   install-svbony-sdk/action.yml's header comment) and its macOS coverage is
#   x86_64-only (indi-3rdparty ships no `mac_arm64` blob; `macos-latest` is
#   Apple Silicon today) — both steps below are conditioned accordingly.
#
# (Bazel's real qhyccd-rs/zwo-rs variants build-enforce the lib halves; the Pi
# nightly covers linux-arm64 for qhy/zwo. svbony-camera's Bazel real binary
# stays `tags = ["manual"]` — see services/svbony-camera/BUILD.bazel — so this
# workflow is, for now, the only place its real SDK link is exercised at all.)
#
# Cadence: nightly cron + workflow_dispatch, plus a paths-filtered push to main so a
# real-link regression in either service's native code, this workflow, or an
# SDK-install action is caught when it lands on main rather than only at the next cron fire.
permissions:
  contents: read
on:
  schedule:
    # 06:47 UTC. Offset from the other nightlies (conformu 05:30, bazel 07:07,
    # safety 07:17) so they do not contend for the hosted-runner pool minute.
    - cron: "47 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/qhyccd-rs/**"
      - "services/qhy-camera/**"
      - "crates/zwo-rs/**"
      - "services/zwo-camera/**"
      - "services/zwo-focuser/**"
      - ".github/actions/install-zwo-sdk/**"
      - "crates/svbony-rs/**"
      - "services/svbony-camera/**"
      - ".github/actions/install-svbony-sdk/**"
      - ".github/workflows/native.yml"
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: native
jobs:
  build:
    name: native link / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Own cache keys, separate from test.yml's `--all-features` sim builds.
          shared-key: native-${{ matrix.os }}

      # --- QHYCCD SDK (qhy-camera) -------------------------------------------
      # static=qhyccd; on Linux the static lib pulls libusb-1.0 + stdc++, on
      # macOS libusb via Homebrew. The published action stages the SDK into
      # /usr/local/lib on Linux and into $GITHUB_WORKSPACE on macOS/Windows.
      - name: Install libusb (qhy-camera, Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libusb-1.0-0-dev
          version: 1.0
      - name: Install libusb (qhy-camera, macOS)
        if: runner.os == 'macOS'
        run: brew install libusb
      - name: Install QHYCCD SDK
        uses: ivonnyssen/qhyccd-sdk-install@v4
        with:
          version: "26.06.04"

      # --- ZWO ASI/EFW SDK (zwo-camera) --------------------------------------
      # The composite action installs the MIT ZWO SDK on every OS (and libclang
      # for bindgen; forwards LIBCLANG_PATH / ZWO_SDK_LIB_DIR where needed).
      - name: Install ZWO SDK
        uses: ./.github/actions/install-zwo-sdk

      # --- SVBony camera SDK (svbony-camera) ---------------------------------
      # No Windows leg at all (see the file-header comment) and macOS is
      # x86_64-only (indi-3rdparty ships no `mac_arm64` blob) — `macos-latest`
      # is Apple Silicon today, so this step (and the build step below) is a
      # no-op there until a verified Apple Silicon blob exists (see
      # docs/plans/svbony-camera.md "Packaging"). No libclang: libsvbony-sys's
      # FFI is hand-written, not bindgen'd (SVBony's header carries no license
      # to vendor under).
      - name: Install SVBony SDK
        if: runner.os != 'Windows' && (runner.os == 'Linux' || runner.arch == 'X64')
        uses: ./.github/actions/install-svbony-sdk

      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      # qhy: DEFAULT features (no simulation) + no --all-targets on the service
      # so the test-only `simulation` dev-dep can't feature-unify the simulated
      # backend onto the prod binary. The binding crates keep --all-targets to
      # also compile their real `src/bin` FFI probes (no sim-forcing dev-dep).
      - name: cargo build (qhy, real, no simulation)
        run: |
          cargo build --locked -p qhy-camera
          cargo build --locked -p qhyccd-rs -p libqhyccd-sys --all-targets

      # zwo: same shape — no simulation, no ZWO_SKIP_NATIVE_LINK, services without
      # --all-targets, binding crates with it.
      - name: cargo build (zwo, real, no simulation)
        run: |
          cargo build --locked -p zwo-camera
          cargo build --locked -p zwo-focuser
          cargo build --locked -p zwo-rs -p libzwo-sys --all-targets

      # svbony: same shape as zwo — no simulation, no SVBONY_SKIP_NATIVE_LINK,
      # service without --all-targets, binding crates with it. Skipped on
      # Windows (no SDK at all) and on non-x86_64 macOS (no blob) — see the
      # Install SVBony SDK step above.
      - name: cargo build (svbony, real, no simulation)
        if: runner.os != 'Windows' && (runner.os == 'Linux' || runner.arch == 'X64')
        run: |
          cargo build --locked -p svbony-camera
          cargo build --locked -p svbony-rs -p libsvbony-sys --all-targets

      # Linux runtime smoke (zwo only): zwo-rs's non-`simulation` tests call the
      # real SDK (init, version strings, a 0-camera enumeration with no hardware),
      # confirming it *loads* and basic FFI works — not just that it links. Linux
      # only: the SDK is on the default loader path (/usr/local/lib); macOS/Windows
      # would need DYLD/PATH wiring this job does not set, and the link check above
      # already covers them. (qhy has no equivalent — its FFI is mocked under test.)
      - name: cargo test (real zwo-rs FFI smoke)
        if: runner.os == 'Linux'
        run: cargo test --locked -p zwo-rs --all-targets
        env:
          LD_LIBRARY_PATH: /usr/local/lib

      # Linux runtime smoke (svbony only): svbony-rs's non-`simulation` tests
      # (`sdk_new_succeeds`, `camera_enumeration_returns_a_count`,
      # `sdk_version_is_non_empty` in lib.rs, plus camera.rs's own
      # `cameras_enumerates`) call the real SDK the same way zwo-rs's smoke
      # test above does — confirming it *loads*, not just that it links.
      - name: cargo test (real svbony-rs FFI smoke)
        if: runner.os == 'Linux'
        run: cargo test --locked -p svbony-rs --all-targets
        env:
          LD_LIBRARY_PATH: /usr/local/lib

  notify-on-failure:
    # Open or update a tracking issue when the nightly run fails so a real-link
    # regression surfaces without depending on someone reading scheduled-workflow
    # logs. Skipped on push and workflow_dispatch so manual runs do not
    # churn the issue.
    needs: build
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = `nightly: native SDK build failing`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The nightly \`native\` workflow failed on at least one OS.`,
              ``,
              `This is the only CI job that compiles + links the qhy, zwo, AND svbony`,
              `crates' REAL (non-\`simulation\`) paths against their installed SDKs. A failure`,
              `means a native-SDK link directive, a bindgen binding, or some`,
              `\`#[cfg(not(feature = "simulation"))]\` FFI code no longer compiles,`,
              `links, or loads against the SDK — the rest of CI builds the simulation`,
              `path and would not catch this. Inspect the failed job in the linked run.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `This issue was opened automatically by a scheduled run that`,
              `failed. While it stays open, each subsequent scheduled failure`,
              `is appended here as a comment linking its own run. Closing it`,
              `marks the failure handled — it is never re-opened; the next`,
              `scheduled failure opens a fresh issue instead.`,
            ].join("\n");
            // Search only OPEN issues. While a tracking issue is open each
            // failure appends a comment; once it is closed the failure is
            // considered handled, so the next scheduled failure opens a fresh
            // issue rather than resurrecting the closed one.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "native-nightly",
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Failed again — run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["native-nightly", "ci-flake"],
              });
            }
