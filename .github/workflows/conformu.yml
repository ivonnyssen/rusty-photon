name: ConformU

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  plan:
    runs-on: ubuntu-latest
    name: plan
    outputs:
      test: ${{ steps.rail.outputs.test }}
      infra: ${{ steps.rail.outputs.infra }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: loadingalias/cargo-rail-action@v3
        id: rail
        with:
          since: ${{ github.event.pull_request.base.sha || github.event.before }}

  conformu:
    name: ${{ matrix.os }}
    needs: plan
    if: needs.plan.outputs.test == 'true' || needs.plan.outputs.infra == 'true'
    runs-on: ${{ matrix.os }}
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.os }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os == 'Linux' && 'linux-stable' || runner.os == 'macOS' && 'macos-stable' || 'windows-stable' }}
          save-if: false

      - name: Install ConformU
        uses: ivonnyssen/conformu-install@v3

      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      - name: Pre-build workspace
        run: cargo build --locked --workspace --all-features --all-targets

      - name: Run ConformU tests (parallel)
        shell: bash
        timeout-minutes: 30
        run: |
          SERVICES=$(cargo metadata --format-version 1 --no-deps 2>/dev/null | \
            jq -c '[.packages[] | select(.metadata.conformu.command) | {name: .name, command: .metadata.conformu.command}]')
          COUNT=$(echo "$SERVICES" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "No ConformU services found, skipping"
            exit 0
          fi

          echo "Found $COUNT ConformU services"
          pids=()
          cmds=()
          for i in $(seq 0 $((COUNT - 1))); do
            name=$(echo "$SERVICES" | jq -r ".[$i].name")
            cmd=$(echo "$SERVICES" | jq -r ".[$i].command")
            echo "::group::Starting $name"
            echo "Command: $cmd"
            echo "::endgroup::"
            eval "$cmd" 2>&1 | sed "s/^/[$name] /" &
            pids+=($!)
            cmds+=("$name")
          done

          failed=0
          for i in "${!pids[@]}"; do
            if ! wait "${pids[$i]}"; then
              echo "::error::${cmds[$i]} failed"
              failed=1
            else
              echo "${cmds[$i]} passed"
            fi
          done
          exit $failed
