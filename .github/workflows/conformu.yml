# ASCOM ConformU conformance suite for every service that opts in via
# `[package.metadata.conformu]` in its Cargo.toml.
#
# Cadence: nightly cron + workflow_dispatch (manual) + paths-filtered
# PR/push on this workflow file itself. ConformU exercises the running
# Alpaca server end-to-end across three OSes, so it is the single most
# expensive workflow we have. Running it on every push and PR was
# overkill: conformance regressions are real but rare, and the faster
# `check`/`test` workflows already gate the unit-level changes that
# would most often break conformance. A nightly run catches drift
# without paying the matrix on every PR; `workflow_dispatch` covers the
# "I just touched the Alpaca interface, run it now" case. The paths
# filter keeps PR-time validation on edits to this workflow itself,
# so a YAML or github-script regression is caught before merge rather
# than only at the next cron fire. The `notify-on-failure` job opens
# or updates a tracking issue so a red nightly does not sit unnoticed
# in the Actions tab.
permissions:
  contents: read

on:
  schedule:
    # Daily at 05:30 UTC. Offset from install-astap (04:30) and
    # plate-solver-smoke (03:30) so the three nightly suites do not
    # contend for the same hosted-runner pool minute.
    - cron: "30 5 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/conformu.yml"
  pull_request:
    paths:
      - ".github/workflows/conformu.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    name: plan
    outputs:
      services: ${{ steps.discover.outputs.services }}
      has_services: ${{ steps.discover.outputs.has_services }}
    steps:
      - uses: actions/checkout@v7
      - name: Discover ConformU services
        id: discover
        run: |
          # Nightly + on-demand cadence runs every conformu-tagged
          # service unconditionally; there is no PR base to diff against
          # and the whole point of the run is to catch drift across the
          # full surface.
          # Phase G (2026-06-18): zwo-camera is a full ConformU citizen now. The
          # conformu jobs provision the native ZWO SDK via
          # ./.github/actions/install-zwo-sdk (the "provision, don't exclude"
          # principle — ADR-008 / docs/plans/bazel-migration.md), so it builds and
          # runs here like every other service. No `select(.name != ...)` filter.
          SERVICES=$(cargo metadata --format-version 1 --no-deps 2>/dev/null | \
            jq -c '[.packages[] | select(.metadata.conformu.command) | {name: .name, command: .metadata.conformu.command}]')

          COUNT=$(echo "$SERVICES" | jq 'length')
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "has_services=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "ConformU services ($COUNT): $(echo "$SERVICES" | jq -r '[.[].name] | join(", ")')"

  # Ubuntu and macOS: run all conformu tests in parallel within a single job.
  conformu:
    name: ${{ matrix.os }}
    needs: plan
    if: needs.plan.outputs.has_services == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os == 'Linux' && 'linux-stable' || 'macos-stable' }}
          save-if: false

      - name: Install ConformU
        uses: ivonnyssen/conformu-install@v3

      # The conformu_integration tests drive ConformU via bdd_infra::run_conformu,
      # which runs the tool only when CONFORMU_PATH points at it (and self-skips
      # otherwise). The install action puts conformu on PATH; surface its absolute
      # path so the tests actually run. Fail loudly if it's missing — a silent
      # skip here would make the whole conformance workflow a no-op.
      - name: Export CONFORMU_PATH
        shell: bash
        run: |
          CONFORMU_PATH="$(command -v conformu || command -v conformu.exe || true)"
          if [ -z "$CONFORMU_PATH" ]; then
            echo "conformu not found on PATH after install"; exit 1
          fi
          echo "CONFORMU_PATH=$CONFORMU_PATH" >> "$GITHUB_ENV"

      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      # qhy-camera opts into ConformU and links the proprietary QHYCCD SDK
      # unconditionally (static=qhyccd, even under the simulation feature), so
      # the --workspace pre-build needs the SDK + libusb on both Linux and
      # macOS. The published action provisions the SDK on all three OSes.
      - name: Install libusb (qhy-camera, Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libusb-1.0-0-dev
          version: 1.0
      - name: Install libusb (qhy-camera, macOS)
        if: runner.os == 'macOS'
        run: brew install libusb
      - name: Install QHYCCD SDK (qhy-camera)
        uses: ivonnyssen/qhyccd-sdk-install@v3
        with:
          version: "26.06.04"
      # On macOS the SDK-linked binaries load libqhyccd's dylib via @rpath from a
      # non-standard $GITHUB_WORKSPACE dir; point the fallback loader path at it so
      # ConformU can launch the qhy-camera binary. Linux links static=qhyccd.
      - name: Help the loader find the QHYCCD dylib (macOS)
        if: runner.os == 'macOS'
        run: |
          DYLIB="$(find "$GITHUB_WORKSPACE" /usr/local/lib /opt/homebrew/lib -name 'libqhyccd*.dylib' -print -quit 2>/dev/null || true)"
          if [ -z "$DYLIB" ]; then echo "::error::libqhyccd dylib not found after SDK install"; exit 1; fi
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(dirname "$DYLIB"):/opt/homebrew/lib:/usr/local/lib:/usr/lib" >> "$GITHUB_ENV"
      # zwo-camera (and the vendored zwo-rs/libzwo-sys members) link the native
      # ZWO SDK; provision it so the full-workspace pre-build links — no exclusion.
      - name: Install ZWO SDK
        uses: ./.github/actions/install-zwo-sdk

      - name: Pre-build workspace
        run: cargo build --locked --workspace --all-features --all-targets

      - name: Run ConformU tests (parallel)
        shell: bash
        timeout-minutes: 30
        run: |
          # All suites run concurrently. (This was briefly serialized on a
          # mistaken "macOS runner CPU starvation" theory; the real cause of the
          # zwo-camera macOS StartExposure timeout was a driver bug — the exposure
          # integration loop summed intended sleep time instead of honouring a
          # real-clock deadline — fixed in services/zwo-camera/src/backend.rs.)
          SERVICES='${{ needs.plan.outputs.services }}'
          COUNT=$(echo "$SERVICES" | jq 'length')

          echo "Running $COUNT ConformU services"
          pids=()
          cmds=()
          for i in $(seq 0 $((COUNT - 1))); do
            name=$(echo "$SERVICES" | jq -r ".[$i].name")
            cmd=$(echo "$SERVICES" | jq -r ".[$i].command")
            echo "::group::Starting $name"
            echo "Command: $cmd"
            echo "::endgroup::"
            # Run in a subshell that exits with the ConformU command's status,
            # NOT sed's. A bare `cmd | sed &` makes `$!` the sed PID, so the
            # `wait` loop below would see sed's (always-0) exit and mask a
            # failing ConformU run. `exit ${PIPESTATUS[0]}` propagates the real
            # status to the subshell, which `$!` now captures.
            ( eval "$cmd" 2>&1 | sed "s/^/[$name] /"; exit "${PIPESTATUS[0]}" ) &
            pids+=($!)
            cmds+=("$name")
          done

          failed=0
          for i in "${!pids[@]}"; do
            if ! wait "${pids[$i]}"; then
              echo "::error::${cmds[$i]} failed"
              failed=1
            else
              echo "${cmds[$i]} passed"
            fi
          done
          exit $failed

  # Windows: per-service jobs to avoid cargo lock contention.
  conformu-windows:
    name: windows / ${{ matrix.service.name }}
    needs: plan
    if: needs.plan.outputs.has_services == 'true'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.plan.outputs.services) }}

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-stable
          save-if: false

      - name: Install ConformU
        uses: ivonnyssen/conformu-install@v3

      # The conformu_integration tests drive ConformU via bdd_infra::run_conformu,
      # which runs the tool only when CONFORMU_PATH points at it (and self-skips
      # otherwise). The install action puts conformu on PATH; surface its absolute
      # path so the tests actually run. Fail loudly if it's missing — a silent
      # skip here would make the whole conformance workflow a no-op.
      - name: Export CONFORMU_PATH
        shell: bash
        run: |
          CONFORMU_PATH="$(command -v conformu || command -v conformu.exe || true)"
          if [ -z "$CONFORMU_PATH" ]; then
            echo "conformu not found on PATH after install"; exit 1
          fi
          echo "CONFORMU_PATH=$CONFORMU_PATH" >> "$GITHUB_ENV"

      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      # Only qhy-camera links the proprietary QHYCCD SDK; provision it for that
      # service's per-package build/run on Windows (no separate libusb needed).
      - name: Install QHYCCD SDK (qhy-camera)
        if: matrix.service.name == 'qhy-camera'
        uses: ivonnyssen/qhyccd-sdk-install@v3
        with:
          version: "26.06.04"
      # Per-service matrix, so only zwo-camera needs the native ZWO SDK on Windows.
      - name: Install ZWO SDK
        if: matrix.service.name == 'zwo-camera'
        uses: ./.github/actions/install-zwo-sdk

      - name: Pre-build
        run: cargo build --locked --package ${{ matrix.service.name }} --all-features --all-targets

      - name: Run ConformU test
        shell: bash
        timeout-minutes: 30
        run: |
          echo "::group::ConformU: ${{ matrix.service.name }}"
          ${{ matrix.service.command }}
          echo "::endgroup::"

  notify-on-failure:
    # Open or update a tracking issue when the nightly run fails so
    # conformance regressions surface without depending on someone
    # reading scheduled-workflow logs. Skipped on workflow_dispatch
    # so manual debugging runs do not churn the issue.
    needs: [conformu, conformu-windows]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = `nightly: ConformU conformance suite failing`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The nightly ConformU workflow failed on at least one OS or service.`,
              ``,
              `Likely causes: a recent change broke an ASCOM Alpaca contract on a`,
              `service that opts in via \`[package.metadata.conformu]\`, a ConformU`,
              `release tightened a check, or a hosted-runner environmental drift`,
              `is producing a flake. Inspect the failed jobs in the linked run for`,
              `the per-service ConformU report.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `This issue was opened automatically by a scheduled run that`,
              `failed. While it stays open, each subsequent scheduled failure`,
              `is appended here as a comment linking its own run. Closing it`,
              `marks the failure handled — it is never re-opened; the next`,
              `scheduled failure opens a fresh issue instead.`,
            ].join("\n");
            // Search only OPEN issues. While a tracking issue is open each
            // failure appends a comment; once it is closed the failure is
            // considered handled, so the next scheduled failure opens a
            // fresh issue rather than resurrecting the closed one.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "conformu-nightly",
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Failed again — run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["conformu-nightly", "ci-flake"],
              });
            }
