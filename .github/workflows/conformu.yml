name: ConformU

permissions:
  contents: read

# ConformU runs only at merge time via the GitHub merge queue, not on every PR
# push. PR iteration is gated on fmt/clippy/unit/BDD/coverage (see check.yml and
# test.yml); ConformU is the final pre-merge validation against the merged tree.
# workflow_dispatch allows manual reruns when debugging conformance failures.
on:
  merge_group:
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    name: plan
    outputs:
      services: ${{ steps.discover.outputs.services }}
      has_services: ${{ steps.discover.outputs.has_services }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: loadingalias/cargo-rail-action@v4
        id: rail
        with:
          since: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || github.event.before }}
      - name: Discover affected ConformU services
        id: discover
        run: |
          # Find all packages with conformu metadata
          ALL_SERVICES=$(cargo metadata --format-version 1 --no-deps 2>/dev/null | \
            jq -c '[.packages[] | select(.metadata.conformu.command) | {name: .name, command: .metadata.conformu.command}]')

          # If infra changed or no rail filtering, test all; otherwise intersect with affected
          if [ "${{ steps.rail.outputs.infra }}" = "true" ] || [ "${{ steps.rail.outputs.test }}" != "true" ]; then
            SERVICES="$ALL_SERVICES"
          else
            AFFECTED='${{ steps.rail.outputs.crates }}'
            SERVICES=$(echo "$ALL_SERVICES" | jq -c --arg affected "$AFFECTED" \
              '[.[] | select(.name as $n | ($affected | split(" ") | index($n)))]')
          fi

          COUNT=$(echo "$SERVICES" | jq 'length')
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "has_services=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "ConformU services ($COUNT): $(echo "$SERVICES" | jq -r '[.[].name] | join(", ")')"

  # Ubuntu and macOS: run all affected conformu tests in parallel within a single job.
  conformu:
    name: ${{ matrix.os }}
    needs: plan
    if: needs.plan.outputs.has_services == 'true'
    runs-on: ${{ matrix.os }}
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.os }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os == 'Linux' && 'linux-stable' || 'macos-stable' }}
          save-if: false

      - name: Install ConformU
        uses: ivonnyssen/conformu-install@v3

      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      - name: Pre-build workspace
        run: cargo build --locked --workspace --all-features --all-targets

      - name: Run ConformU tests (parallel)
        shell: bash
        timeout-minutes: 30
        run: |
          SERVICES='${{ needs.plan.outputs.services }}'
          COUNT=$(echo "$SERVICES" | jq 'length')

          echo "Running $COUNT ConformU services"
          pids=()
          cmds=()
          for i in $(seq 0 $((COUNT - 1))); do
            name=$(echo "$SERVICES" | jq -r ".[$i].name")
            cmd=$(echo "$SERVICES" | jq -r ".[$i].command")
            echo "::group::Starting $name"
            echo "Command: $cmd"
            echo "::endgroup::"
            eval "$cmd" 2>&1 | sed "s/^/[$name] /" &
            pids+=($!)
            cmds+=("$name")
          done

          failed=0
          for i in "${!pids[@]}"; do
            if ! wait "${pids[$i]}"; then
              echo "::error::${cmds[$i]} failed"
              failed=1
            else
              echo "${cmds[$i]} passed"
            fi
          done
          exit $failed

  # Windows: per-service jobs to avoid cargo lock contention.
  conformu-windows:
    name: windows / ${{ matrix.service.name }}
    needs: plan
    if: needs.plan.outputs.has_services == 'true'
    runs-on: windows-latest
    concurrency:
      group: ${{ github.workflow }}-windows-${{ matrix.service.name }}-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.plan.outputs.services) }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-stable
          save-if: false

      - name: Install ConformU
        uses: ivonnyssen/conformu-install@v3

      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      - name: Pre-build
        run: cargo build --locked --package ${{ matrix.service.name }} --all-features --all-targets

      - name: Run ConformU test
        shell: bash
        timeout-minutes: 30
        run: |
          echo "::group::ConformU: ${{ matrix.service.name }}"
          ${{ matrix.service.command }}
          echo "::endgroup::"
