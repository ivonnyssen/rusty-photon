# This workflow runs when a version tag is pushed (e.g., v0.1.0).
# It builds platform-specific packages and creates a GitHub Release:
# - Linux: .deb, .rpm, and .tar.gz (x86_64 + aarch64)
# - macOS: per-service arm64 tarballs for the whole family, brew-verified
#   (Intel is dropped — docs/plans/nightly-releases.md N4)
# - Windows: one suite .msi for the whole family (x86_64, ADR-015)
# - Homebrew: regenerates the tap's stable formulas (rusty-photon-<svc>.rb
#   × every packaged service + the rusty-photon meta-formula) via
#   scripts/generate-brew-formulas.sh — the same generator the nightly
#   channel uses for the -nightly siblings
permissions:
  contents: write
on:
  push:
    tags:
      - "v*"
name: release
env:
  CARGO_TERM_COLOR: always
jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    name: linux / ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p filemonitor
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Strip binary
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            strip target/${{ matrix.target }}/release/filemonitor
          else
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/filemonitor
          fi
      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p staging
          cp target/${{ matrix.target }}/release/filemonitor staging/
          cd staging
          tar czf ../filemonitor-${VERSION}-${{ matrix.target }}.tar.gz filemonitor
      - name: Install cargo-deb
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo install cargo-deb
      - name: Build .deb package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo deb -p filemonitor --no-build --no-strip --target ${{ matrix.target }}
      - name: Install cargo-generate-rpm
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo install cargo-generate-rpm
      - name: Build .rpm package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo generate-rpm -p services/filemonitor --target ${{ matrix.target }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/generate-rpm/*.rpm
            filemonitor-*.tar.gz

  # Per-service arm64 tarballs — the Homebrew formula payloads — built and
  # verified by the same scripts the nightly macos leg runs. Passing the tag
  # version to build-tarballs.sh doubles as the tag/workspace guard: the
  # script refuses any version that is not the workspace version (or a
  # +nightly stamp on it).
  build-macos:
    runs-on: macos-latest
    name: macos / arm64 tarballs
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - name: Strip the v prefix off the tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly-packages-macos
      - name: Cache staged SDKs
        uses: actions/cache@v6
        with:
          path: ~/.cache/rusty-photon-pkg
          key: rusty-photon-pkg-macos-${{ hashFiles('scripts/build-tarballs.sh') }}
      - name: Build the per-service tarballs
        run: scripts/build-tarballs.sh --version '${{ steps.v.outputs.version }}'
      - name: Verify via Homebrew (release gate)
        run: scripts/verify-brew.sh --channel stable --dist 'dist/${{ steps.v.outputs.version }}'
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-tarballs
          path: dist/${{ steps.v.outputs.version }}/*.tar.gz
          if-no-files-found: error

  # The suite MSI (ADR-015): every service in one installer, built by the same
  # scripts the msi workflow exercises on PRs. verify-msi.ps1 is the release
  # gate — the full install -> per-service-class checks -> feature-remove ->
  # uninstall lifecycle must pass before the MSI can ship.
  build-windows:
    runs-on: windows-latest
    name: windows / suite msi
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-msi
      - name: Check tag matches the workspace version
        shell: pwsh
        # build-msi.ps1 derives the MSI version from the workspace Cargo.toml;
        # a tag/workspace mismatch would silently release wrongly-versioned
        # binaries under a right-versioned tag.
        run: |
          $tag = $env:GITHUB_REF_NAME -replace '^v', ''
          # Same first-match extraction as build-msi.ps1 — the guard must
          # read the version the way the build does, or the two can drift.
          $match = Select-String -Path Cargo.toml -Pattern '^version = "(.*)"$' |
            Select-Object -First 1
          if (-not $match) {
            Write-Error "could not read the workspace version from Cargo.toml"
            exit 1
          }
          $workspace = $match.Matches[0].Groups[1].Value
          if ($tag -ne $workspace) {
            Write-Error "tag version '$tag' != workspace version '$workspace'"
            exit 1
          }
      - name: Build the suite MSI
        shell: pwsh
        run: scripts\build-msi.ps1
      - name: Verify the MSI lifecycle (release gate)
        shell: pwsh
        run: scripts\verify-msi.ps1
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi
          path: dist/**/*.msi

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    name: create release
    steps:
      - uses: actions/checkout@v7
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.msi" -o -name "*.tar.gz" \) \
            -exec sh -c 'sha256sum "$1" | sed "s|  \./|  |"' _ {} \; \
            | sort -k2 > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.msi
            artifacts/**/*.tar.gz
            SHA256SUMS.txt

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    name: update homebrew tap
    steps:
      - uses: actions/checkout@v7
      - name: Download macOS tarballs
        uses: actions/download-artifact@v8
        with:
          name: macos-tarballs
          path: artifacts
      # The published release's checksum manifest is what the meta-formula
      # downloads, so the generator needs it to stamp the sha256.
      - name: Fetch the release checksum manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "$GITHUB_REF_NAME" --pattern SHA256SUMS.txt --dir artifacts
      - name: Render the stable formulas
        run: |
          scripts/generate-brew-formulas.sh --channel stable \
            --version "${GITHUB_REF_NAME#v}" \
            --dist artifacts \
            --url-base "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
            --output stable-formulas
      - name: Checkout Homebrew tap
        uses: actions/checkout@v7
        with:
          repository: ivonnyssen/homebrew-rusty-photon
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Commit and push the stable formulas
        run: |
          # Replace the stable set wholesale: a dropped service must not
          # linger, and this also retires the pre-N4 hand-stamped
          # filemonitor.rb (renamed rusty-photon-filemonitor.rb per
          # ADR-012). The -nightly siblings belong to nightly-packages.yml
          # and are left alone.
          find homebrew-tap/Formula -name '*.rb' ! -name '*-nightly.rb' -delete
          cp stable-formulas/*.rb homebrew-tap/Formula/
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula
          # A re-run for the same tag regenerates identical formulas; an
          # empty commit would fail the job (same guard as the nightly push).
          if git diff --cached --quiet; then
            echo "tap already current"
          else
            git commit -m "release: ${GITHUB_REF_NAME#v}"
            git push
          fi
