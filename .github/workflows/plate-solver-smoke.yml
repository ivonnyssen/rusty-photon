# Nightly cross-platform real-ASTAP smoke for plate-solver.
#
# Drives the wrapper end-to-end against a real ASTAP install on each
# target OS. The wrapper's contract correctness is already covered on
# every PR by the mock_astap-backed BDD suite; this workflow's job is
# to catch *integration drift* — a real ASTAP that has rotated its
# `.wcs` shape, CLI surface, or banner format would silently bypass
# the mock-based BDD but trip a `@requires-astap`-tagged scenario
# here.
#
# Cadence: nightly cron + workflow_dispatch (manual). Not on every
# PR (PRs already pay for the mock BDD; ASTAP install + DB download
# would be ~100 MB per run × 3 OSes per PR for marginal benefit).
#
# See docs/plans/plate-solver.md §"Real-ASTAP coverage: cadence
# and gating" for the rationale and the bdd.rs filter snippet.

name: plate-solver-smoke

permissions:
  contents: read

on:
  schedule:
    # Every day at 03:30 UTC. Pick a slot away from the install-astap
    # smoke (which runs on every PR) so the two don't fight for the
    # same upstream SourceForge endpoint at the same minute.
    - cron: "30 3 * * *"
  workflow_dispatch:
  push:
    paths:
      - "services/plate-solver/**"
      - ".github/actions/install-astap/**"
      - ".github/workflows/plate-solver-smoke.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install ASTAP + D05 database
        uses: ./.github/actions/install-astap
        with:
          download-database: "true"

      # The mac binary is ad-hoc-signed by the upstream maintainer.
      # First-run quarantine flagging would block exec without
      # surfacing a useful error. ADR-005 §"Open questions" item 1
      # tracks whether re-signing under our own Developer ID is
      # required; until that's settled, this clear-on-each-run mirrors
      # what an operator would do by hand.
      - name: macOS — clear quarantine on astap_cli
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          xattr -d com.apple.quarantine "$ASTAP_BINARY" 2>/dev/null || true

      - name: Pre-build wrapper + mock_astap (BDD discovery)
        shell: bash
        run: |
          cargo build -p plate-solver --all-features --tests

      - name: Run @requires-astap BDD scenarios
        shell: bash
        env:
          # ASTAP_BINARY and ASTAP_DB_DIR are set by install-astap.
          # Their presence flips the bdd.rs filter to fire the
          # @requires-astap scenarios.
          RUST_LOG: plate_solver=debug
          # The "I record the solve duration as ..." BDD step appends a
          # row to this file. Issue #236: the M 101 fixture's pointing
          # breadcrumbs are stripped, so the blind scenario walks the
          # full ASTAP search spiral (~30–60 s) while the hinted
          # scenario stays sub-second. The delta is the perf-trending
          # signal; future regressions in ASTAP's `-r` optimization
          # or in our argv-mapping will show up as the ratio collapsing.
          PLATE_SOLVER_PERF_CSV: ${{ runner.temp }}/plate-solver-perf.csv
        run: |
          set -euo pipefail
          cargo test -p plate-solver --all-features --test bdd

      - name: Log per-scenario timing
        # Echo the captured CSV into the job log so failures are
        # diagnosable from the GH UI without downloading the artifact.
        # The full machine-readable trend lives in the uploaded
        # artifact below.
        if: always()
        shell: bash
        run: |
          csv="${{ runner.temp }}/plate-solver-perf.csv"
          if [[ -f "$csv" ]]; then
            echo "::group::M 101 hinted-vs-blind timing (${{ matrix.os }})"
            cat "$csv"
            echo "::endgroup::"
            while IFS=, read -r label elapsed_ms; do
              [[ "$label" == "label" ]] && continue
              echo "::notice::plate-solver perf [${{ matrix.os }}] $label = ${elapsed_ms} ms"
            done < "$csv"
          else
            echo "::warning::No timing CSV at $csv — BDD did not record any solve durations."
          fi

      - name: Assert solve-time budget
        # Issue #234 — phase-1 coarse guardrail on the per-OS timing the
        # step above just recorded. Two independent checks, both scoped
        # to this matrix leg's own CSV (no cross-OS aggregation needed):
        #
        #   1. Ratio: the blind solve must stay at least
        #      MIN_BLIND_HINTED_RATIO× slower than the hinted solve. If
        #      the argv-mapping in runner/astap.rs silently drops a hint
        #      flag — or ASTAP's `-r` search-radius optimization regresses
        #      — the hinted solve collapses toward the blind spiral time
        #      and the ratio craters. Ratio is OS-independent and
        #      self-normalizing, so it tolerates slow/contended runners
        #      without false alarms.
        #   2. Absolute ceilings catch a *uniform* slowdown the ratio
        #      check would miss (a globally slower ASTAP) and gross
        #      integration drift.
        #
        # Thresholds are deliberately coarse — phase-1. Baseline observed
        # over 2026-05-21..23 (7 runs, GitHub-hosted runners):
        #   hinted: ubuntu 674–822 ms · macos 134–276 ms · windows 285–453 ms
        #   blind:  ubuntu 76.1–85.6 s · macos 51.5–68.6 s · windows 57.6–62.6 s
        #   blind/hinted ratio: 93×–408×  (worst leg ≈ 93×, ubuntu)
        # 10× leaves ~9× headroom on the ratio; the ceilings sit ~6×
        # (hinted) and ~2.1× (blind) above the worst observed, and the
        # blind ceiling stays under the scenario's 300 s request timeout.
        # Per-OS budget tightening + trend visualization remain forward
        # work until several weeks of *schedule* runs accumulate.
        env:
          MIN_BLIND_HINTED_RATIO: "10"
          HINTED_MAX_MS: "5000"
          BLIND_MAX_MS: "180000"
        shell: bash
        run: |
          set -euo pipefail
          csv="${{ runner.temp }}/plate-solver-perf.csv"
          if [[ ! -f "$csv" ]]; then
            echo "::error::No timing CSV at $csv — cannot assert solve-time budget."
            exit 1
          fi

          hinted=""; blind=""
          while IFS=, read -r label ms; do
            case "$label" in
              m101_hinted) hinted="$ms" ;;
              m101_blind)  blind="$ms" ;;
            esac
          done < "$csv"

          if [[ ! "$hinted" =~ ^[0-9]+$ || ! "$blind" =~ ^[0-9]+$ || "$hinted" -le 0 || "$blind" -le 0 ]]; then
            echo "::error::CSV is missing a positive m101_hinted and/or m101_blind row:"
            cat "$csv"
            exit 1
          fi

          ratio=$(( blind / hinted ))
          fail=0

          if (( blind < MIN_BLIND_HINTED_RATIO * hinted )); then
            echo "::error::hint speedup regressed on ${{ matrix.os }}: blind=${blind}ms is only ${ratio}× hinted=${hinted}ms (need ≥ ${MIN_BLIND_HINTED_RATIO}×). Most likely a dropped hint flag in services/plate-solver/src/runner/astap.rs."
            fail=1
          fi
          if (( hinted > HINTED_MAX_MS )); then
            echo "::error::hinted solve too slow on ${{ matrix.os }}: ${hinted}ms exceeds ${HINTED_MAX_MS}ms ceiling."
            fail=1
          fi
          if (( blind > BLIND_MAX_MS )); then
            echo "::error::blind solve too slow on ${{ matrix.os }}: ${blind}ms exceeds ${BLIND_MAX_MS}ms ceiling."
            fail=1
          fi

          if (( fail )); then
            echo "::error::plate-solver solve-time budget exceeded on ${{ matrix.os }} — see annotations above."
            exit 1
          fi
          echo "::notice::plate-solver budget OK [${{ matrix.os }}]: hinted=${hinted}ms blind=${blind}ms ratio=${ratio}× (need ≥${MIN_BLIND_HINTED_RATIO}×, hinted≤${HINTED_MAX_MS}ms, blind≤${BLIND_MAX_MS}ms)"

      - name: Upload timing CSV artifact
        # Per-OS artifact so a nightly run produces three CSVs the
        # operator (or a future trend-aggregator) can download. The
        # regression assertion landed (issue #234 — the step above);
        # trend visualization across runs remains forward work.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: plate-solver-perf-${{ matrix.os }}
          path: ${{ runner.temp }}/plate-solver-perf.csv
          if-no-files-found: warn
          retention-days: 90

  notify-on-failure:
    # Open or update a tracking issue when the nightly run fails so
    # divergence is visible without depending on someone reading
    # scheduled-workflow logs. Skipped on push and workflow_dispatch
    # so manual debugging runs don't churn an issue.
    needs: smoke
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = `nightly: plate-solver real-ASTAP smoke failing`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The nightly cross-platform real-ASTAP smoke workflow failed.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `This issue was opened automatically by a scheduled run that`,
              `failed. While it stays open, each subsequent scheduled failure`,
              `is appended here as a comment linking its own run. Closing it`,
              `marks the failure handled — it is never re-opened; the next`,
              `scheduled failure opens a fresh issue instead.`,
            ].join("\n");
            // Search only OPEN issues. While a tracking issue is open each
            // failure appends a comment; once it is closed the failure is
            // considered handled, so the next scheduled failure opens a
            // fresh issue rather than resurrecting the closed one.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "plate-solver-nightly",
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Failed again — run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["plate-solver-nightly", "ci-flake"],
              });
            }
