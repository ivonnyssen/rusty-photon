# Bazel build + test — the per-PR build/test gate.
#
# Bazel is the required build/test gate on PRs; the Cargo build/test jobs
# (test.yml) run as a nightly safety net. This 3-OS matrix produces the
# `bazel / <os>` required checks. Coverage is gated separately by
# bazel-coverage.yml and Bazel/Cargo target parity by parity.yml.
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
  # Nightly run from main keeps the remote cache populated from trusted code
  # during quiet stretches, so the next PR reads a warm cache.
  schedule:
    - cron: "7 7 * * *"
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: bazel

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: bazel / ${{ matrix.os }}
    # Bazel's action-graph change detection figures out which targets actually
    # changed and only rebuilds those; everything else is a cache hit.
    #
    # 40-min timeout: with the OmniSim race fixed (see services/rp/BUILD.bazel),
    # rp:bdd runs to full completion (~12 min on Windows), which lengthens the
    # BDD step on the slower Windows runner. The `omnisim` resource pool
    # serializes rp:bdd only against calibrator-flats:bdd — both stay parallel to
    # the other ~10 BDD targets — so the increase is modest; 40 leaves headroom
    # for a cold-cache first run.
    timeout-minutes: 40
    defaults:
      run:
        shell: bash
    env:
      # The remote cache (Cloudflare Worker + R2; see tools/bazel-cache-worker)
      # is public-READ / token-WRITE. Only push-to-main and the nightly schedule
      # — which run from the default branch — get the write token, so they
      # populate the cache from trusted code. PRs (including forks, which get
      # no secrets at all) read anonymously and never write, which prevents
      # cache poisoning. The per-step logic below adds --config=remote-cache
      # unconditionally (reads are anonymous, so even fork PRs get a warm
      # cache) and only attaches the write token + uploads when
      # CACHE_WRITE_TOKEN is non-empty.
      CACHE_WRITE_TOKEN: ${{ (github.event_name == 'push' || github.event_name == 'schedule') && secrets.BAZEL_CACHE_WRITE_TOKEN || '' }}
    steps:
      - uses: actions/checkout@v7

      # MSVC cl.exe (VS 2022 17.7+) respects the LongPathsEnabled
      # registry key, removing the 260-char MAX_PATH ceiling for include
      # resolution. aws-lc-sys's vendored C source uses deep relative
      # includes (../../../../third_party/...) whose intermediate
      # un-normalised paths exceed 260 chars inside Bazel's runfiles tree.
      # The short --output_base below still helps because shorter paths
      # are faster to normalise, but the registry key is what actually
      # unblocks cl.exe.
      - name: Enable long paths (Windows MAX_PATH workaround)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1
          git config --system core.longpaths true

      # Using --output_base=C:/b eliminates the workspace-hash
      # subdirectory and saves ~50 characters vs the default
      # (rules_rust #1120). .bazelrc already imports user.bazelrc via
      # try-import, so this takes effect on the next bazel invocation.
      - name: Shorten Bazel output base (Windows)
        if: runner.os == 'Windows'
        run: echo 'startup --output_base=C:/b' > user.bazelrc

      - name: Install lld
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lld >/dev/null

      - name: Setup bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        with:
          bazelisk-version: 1.28.1

      - name: Verify bazel version
        run: bazel --version

      # rp's BDD scenarios spawn the ASCOM Alpaca simulator. The Cargo
      # workflows install it via the same composite action.
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim

      # qhy-camera links the proprietary QHYCCD SDK + libusb; `bazel build //...`
      # compiles libqhyccd-sys on every OS, so provision both.
      # Linux: the action stages the libs into /usr/local/lib (build.rs's env-free
      # search path) + apt libusb. macOS: SDK extracts into $GITHUB_WORKSPACE
      # (build.rs reads it via the GITHUB_WORKSPACE forwarded in .bazelrc) + brew
      # libusb. Windows: SDK into $GITHUB_WORKSPACE/sdk_win64_<ver> (bundles libusb).
      - name: Install libusb (qhy-camera, Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libusb-1.0-0-dev
          version: 1.0
      - name: Install libusb (qhy-camera, macOS)
        if: runner.os == 'macOS'
        run: brew install libusb
      - name: Install QHYCCD SDK (qhy-camera)
        uses: ivonnyssen/qhyccd-sdk-install@v4
        with:
          version: "26.06.04"
      # zwo-camera links the native ZWO ASI/EFW SDK (zwo-rs -> libzwo-sys), so
      # //... cannot build, link, or run it without the SDK on the link path.
      # Provision it on every OS, exactly like OmniSim above: this build always
      # covers the whole graph, and an unrelated change can still invalidate
      # zwo-camera's cached link action, so the SDK must always be present. The composite action also installs libclang for
      # bindgen and forwards LIBCLANG_PATH / ZWO_SDK_LIB_DIR (consumed under
      # .bazelrc's strict_action_env on macOS / Windows). See
      # services/zwo-camera/BUILD.bazel and docs/services/zwo-camera.md.
      - name: Install ZWO SDK
        uses: ./.github/actions/install-zwo-sdk

      - name: bazel build
        run: |
          REMOTE_FLAGS=(--config=remote-cache)
          if [[ -n "$CACHE_WRITE_TOKEN" ]]; then
            REMOTE_FLAGS+=(--remote_header="Authorization=Bearer $CACHE_WRITE_TOKEN")
          else
            REMOTE_FLAGS+=(--remote_upload_local_results=false)
          fi
          bazel build --config=ci "${REMOTE_FLAGS[@]}" //...

      - name: bazel test (fast)
        # .bazelrc filters -requires-cargo,-bdd by default; keep fast
        # unit + integration pass separate from BDD so log output stays
        # useful when something breaks.
        run: |
          REMOTE_FLAGS=(--config=remote-cache)
          if [[ -n "$CACHE_WRITE_TOKEN" ]]; then
            REMOTE_FLAGS+=(--remote_header="Authorization=Bearer $CACHE_WRITE_TOKEN")
          else
            REMOTE_FLAGS+=(--remote_upload_local_results=false)
          fi
          bazel test --config=ci "${REMOTE_FLAGS[@]}" //...

      - name: bazel test (BDD)
        # BDD cucumber tests spawn service binaries and take 30-150s each;
        # run them explicitly in their own step. They need OMNISIM_PATH (the
        # install-omnisim action's pinned binary path, consumed by
        # `bdd_infra::rp_harness::OmniSimHandle::start`), forwarded via
        # `--test_env=OMNISIM_PATH` — which lives in `.bazelrc` `build:ci` so it
        # applies to every step and the flag never changes mid-run (a changing
        # --test_env discards Bazel's analysis cache; see .bazelrc for the why).
        # --spawn_strategy=local (bypasses the sandbox so the BDD-spawned OmniSim
        # can bind ports; also the confirmed fix for the rp:bdd post-scenario
        # park) and --remote_timeout=3 both live in `.bazelrc`. --test_output=all
        # surfaces rp:bdd's BDD-TRACE per-scenario breadcrumbs even on a passing run
        # (services/rp/tests/bdd.rs).
        run: |
          REMOTE_FLAGS=(--config=remote-cache)
          if [[ -n "$CACHE_WRITE_TOKEN" ]]; then
            REMOTE_FLAGS+=(--remote_header="Authorization=Bearer $CACHE_WRITE_TOKEN")
          else
            REMOTE_FLAGS+=(--remote_upload_local_results=false)
          fi
          # `bdd,-requires-cargo`: run every bdd-tagged suite, minus the
          # cargo-shelling bdd-infra unit tests (the only `requires-cargo` users
          # left). //services/qhy-camera:bdd IS included — it spawns the
          # simulation-backed driver (no real InitQHYCCDResource / USB
          # enumeration; see services/qhy-camera/BUILD.bazel + Cargo.toml).
          # //services/zwo-camera:bdd RUNS here too — `bdd`-tagged (not
          # `requires-cargo`), spawning the native-SDK sim binary the "Install ZWO
          # SDK" step above provisioned. Matches the coverage config in .bazelrc.
          bazel test --config=ci "${REMOTE_FLAGS[@]}" --test_tag_filters=bdd,-requires-cargo \
            --test_output=all \
            //...
