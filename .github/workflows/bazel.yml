# Shadow-mode Bazel build/test. Runs alongside the canonical Cargo jobs
# during the migration described in docs/plans/bazel-migration.md.
#
# This workflow is NOT required for merge. Its purpose is to build
# confidence that Bazel produces parity results before cutting over.
# Add it to required checks once the migration plan's phase-7 exit
# criteria are met.
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: bazel

jobs:
  build-test:
    runs-on: ubuntu-latest
    name: bazel build + test (shadow)
    # Action-graph change detection replaces cargo-rail. Bazel figures out
    # which targets actually changed and only rebuilds those; everything
    # else is a cache hit.
    timeout-minutes: 30
    env:
      # Read+write key on push to main populates the cache from trusted code.
      # Read-only key on pull requests prevents cache poisoning from forks.
      BUILDBUDDY_API_KEY: ${{ github.event_name == 'push' && secrets.BUILDBUDDY_API_KEY || secrets.BUILDBUDDY_API_KEY_READONLY }}
    steps:
      - uses: actions/checkout@v5

      - name: Install lld
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lld >/dev/null

      - name: Setup bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        with:
          bazelisk-version: 1.28.1

      - name: Verify bazel version
        run: bazel --version

      # rp's BDD scenarios spawn the ASCOM Alpaca simulator. The Cargo
      # workflows install it via the same composite action.
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim

      - name: bazel build
        run: bazel build --config=ci --config=remote-cache --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY //...

      - name: bazel test (fast)
        # .bazelrc filters -requires-cargo,-bdd by default; keep fast
        # unit + integration pass separate from BDD so log output stays
        # useful when something breaks.
        run: bazel test --config=ci --config=remote-cache --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY //...

      - name: bazel test (BDD)
        # BDD cucumber tests spawn service binaries and take 30-150s each;
        # run them explicitly in their own step. --test_env=PATH forwards
        # the runner PATH (extended by the OmniSim install step) into
        # test sandboxes so rp's scenarios can spawn ascom.alpaca.simulators.
        run: bazel test --config=ci --config=remote-cache --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY --test_tag_filters=bdd --test_env=PATH //...
