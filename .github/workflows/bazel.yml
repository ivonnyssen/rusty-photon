# Shadow-mode Bazel build/test. Runs alongside the canonical Cargo jobs
# during the migration described in docs/plans/bazel-migration.md.
#
# This workflow is NOT required for merge. Its purpose is to build
# confidence that Bazel produces parity results before cutting over.
# Add it to required checks once the migration plan's phase-7 exit
# criteria are met.
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
  # Nightly run from main keeps the BuildBuddy remote cache warm.
  # BuildBuddy uses LRU eviction on a shared free-tier cache with no
  # documented retention guarantee, so quiet stretches on main let
  # action results age out and PRs pay the full uncached cost. A daily
  # main-equivalent build refreshes last-used timestamps and re-uploads
  # anything that did get evicted.
  schedule:
    - cron: "7 7 * * *"
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: bazel

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: bazel build + test (shadow) / ${{ matrix.os }}
    # Action-graph change detection replaces cargo-rail. Bazel figures out
    # which targets actually changed and only rebuilds those; everything
    # else is a cache hit.
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      # Read+write key on push to main and on the nightly schedule populates
      # the cache from trusted code (scheduled runs always execute against the
      # default branch). Read-only key on pull requests prevents cache
      # poisoning from forks. Empty for fork PRs (secrets not exposed); steps
      # below detect this and skip --config=remote-cache so the job still
      # provides build signal.
      BUILDBUDDY_API_KEY: ${{ (github.event_name == 'push' || github.event_name == 'schedule') && secrets.BUILDBUDDY_API_KEY || secrets.BUILDBUDDY_API_KEY_READONLY }}
    steps:
      - uses: actions/checkout@v5

      # Diagnostic for the Windows `bazel test (fast)` slowdown chase.
      # The cargo-bazel `crate_universe` extension's lockfile entry hashes
      # `Cargo.toml`, `Cargo.lock`, and 17 per-crate `Cargo.toml` files as
      # `recordedFileInputs`. If the on-disk content differs from the
      # recorded hash, Bazel re-evaluates the extension (~50 s on Windows).
      # The leading suspect: this repo has no `.gitattributes`, and
      # `actions/checkout@v5` inherits the runner image's default
      # `core.autocrlf` (which is `true` on stock GitHub Windows images).
      # That would give Windows runners CRLF line endings while Linux/macOS
      # stay LF, producing different SHA-256s for the same file. Print
      # per-platform fingerprints so the theory can be checked from the
      # workflow logs alone.
      #
      # Drop this step once the line-ending question is settled.
      - name: Diagnostic — Cargo file fingerprints
        shell: bash
        run: |
          # No single SHA-256 CLI is on every GitHub-hosted runner:
          #   sha256sum: GNU coreutils — Linux yes, Windows Git Bash yes,
          #              macOS no (shasum is the BSD equivalent).
          #   shasum:    perl-based — macOS yes, Linux yes, Windows Git
          #              Bash NO (no perl in the runner image's PATH).
          # Python is available on all three. Try the C-coded tools
          # first for speed; fall back to Python if neither is on PATH.
          # `set -o pipefail` makes the script fail loudly if any tool
          # in a pipeline is missing (otherwise an empty hash would be
          # reported and the diagnostic would silently lie).
          set -euo pipefail
          sha256() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" | awk '{print $1}'
            elif command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "$1" | awk '{print $1}'
            else
              python3 -c 'import hashlib, sys; print(hashlib.sha256(open(sys.argv[1], "rb").read()).hexdigest())' "$1"
            fi
          }
          echo "::group::Cargo.{toml,lock} fingerprints"
          for f in Cargo.toml Cargo.lock; do
            [ -f "$f" ] || { echo "$f missing"; continue; }
            bytes=$(wc -c < "$f")
            lines=$(wc -l < "$f")
            hash=$(sha256 "$f")
            crlf=$(grep -c $'\r' "$f" || true)
            printf '%-10s sha256=%s bytes=%s lines=%s lines-with-CR=%s\n' \
              "$f" "$hash" "$bytes" "$lines" "$crlf"
            printf '  first 64 bytes hex: '
            head -c 64 "$f" | od -An -t x1 | tr -d '\n' | sed 's/^ *//'
            echo
          done
          # Plus a sample per-crate Cargo.toml (one of the 17 files the
          # lockfile also records) to confirm the pattern is consistent.
          for f in crates/rp-auth/Cargo.toml services/rp/Cargo.toml; do
            [ -f "$f" ] || continue
            hash=$(sha256 "$f")
            crlf=$(grep -c $'\r' "$f" || true)
            printf '%-30s sha256=%s lines-with-CR=%s\n' "$f" "$hash" "$crlf"
          done
          echo "::endgroup::"

      # MSVC cl.exe (VS 2022 17.7+) respects the LongPathsEnabled
      # registry key, removing the 260-char MAX_PATH ceiling for include
      # resolution. aws-lc-sys's vendored C source uses deep relative
      # includes (../../../../third_party/...) whose intermediate
      # un-normalised paths exceed 260 chars inside Bazel's runfiles tree.
      # The short --output_base below still helps because shorter paths
      # are faster to normalise, but the registry key is what actually
      # unblocks cl.exe.
      - name: Enable long paths (Windows MAX_PATH workaround)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1
          git config --system core.longpaths true

      # Using --output_base=C:/b eliminates the workspace-hash
      # subdirectory and saves ~50 characters vs the default
      # (rules_rust #1120). .bazelrc already imports user.bazelrc via
      # try-import, so this takes effect on the next bazel invocation.
      - name: Shorten Bazel output base (Windows)
        if: runner.os == 'Windows'
        run: echo 'startup --output_base=C:/b' > user.bazelrc

      - name: Install lld
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lld >/dev/null

      - name: Setup bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        with:
          bazelisk-version: 1.28.1

      - name: Verify bazel version
        run: bazel --version

      # rp's BDD scenarios spawn the ASCOM Alpaca simulator. The Cargo
      # workflows install it via the same composite action.
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim

      # Two diagnostic captures, both temporary, both attached to the
      # same artifact at the end of the job:
      #
      # 1. --execution_log_compact_file: per-action log of inputs, env,
      #    command, platform properties — the fields Bazel hashes into
      #    the action key. Originally scoped to BDD because
      #    services/rp:bdd and services/sky-survey-camera:bdd were the
      #    known long pole on Windows (4/6 BDD targets cache-hit after
      #    PR #120). A subsequent cache-summary audit of `bazel build`
      #    / `bazel test (fast)` / `bazel test (BDD)` found the bigger
      #    Windows delta is actually in `bazel test (fast)` — extended
      #    to all three steps as a result. Compact format is
      #    zstd-compressed protobuf, ~MB-scale per step.
      #
      # 2. --profile + --noslim_profile + --experimental_profile_*: a
      #    Chrome-trace-format JSON profile of every Bazel sub-task
      #    (Skyframe evaluations, filesystem stats, remote-cache RPCs,
      #    package loading, action execution). Added to chase a
      #    specific Windows mystery: on `bazel test (fast)`, Windows
      #    spends 70+ seconds in the loading phase with two silent ~30 s
      #    stalls (no progress lines emitted) where Linux finishes the
      #    same loading in ~1 s. The exec-log only captures action
      #    spawns, so it cannot see what Bazel is doing during loading.
      #    The profile names every sub-task by duration, so the
      #    silent-stall cause becomes nameable. View profiles in
      #    Chrome's tracing UI (chrome://tracing) or Perfetto
      #    (https://ui.perfetto.dev). Files are gzipped JSON, also
      #    ~MB-scale per step.
      #
      # Drop both sets of flags and the upload step at the bottom once
      # the Windows loading-phase mystery is identified and fixed.
      - name: bazel build
        run: |
          REMOTE_FLAGS=""
          if [[ -n "$BUILDBUDDY_API_KEY" ]]; then
            REMOTE_FLAGS="--config=remote-cache --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY"
          fi
          bazel build --config=ci $REMOTE_FLAGS \
            --execution_log_compact_file="${RUNNER_TEMP}/build-exec.log.zst" \
            --profile="${RUNNER_TEMP}/build-profile.json.gz" \
            --noslim_profile \
            --experimental_profile_include_target_label \
            --experimental_profile_include_primary_output \
            //...

      - name: bazel test (fast)
        # .bazelrc filters -requires-cargo,-bdd by default; keep fast
        # unit + integration pass separate from BDD so log output stays
        # useful when something breaks.
        run: |
          REMOTE_FLAGS=""
          if [[ -n "$BUILDBUDDY_API_KEY" ]]; then
            REMOTE_FLAGS="--config=remote-cache --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY"
          fi
          bazel test --config=ci $REMOTE_FLAGS \
            --execution_log_compact_file="${RUNNER_TEMP}/fast-test-exec.log.zst" \
            --profile="${RUNNER_TEMP}/fast-test-profile.json.gz" \
            --noslim_profile \
            --experimental_profile_include_target_label \
            --experimental_profile_include_primary_output \
            //...

      - name: bazel test (BDD)
        # BDD cucumber tests spawn service binaries and take 30-150s each;
        # run them explicitly in their own step. `--test_env=OMNISIM_PATH`
        # forwards the install-omnisim composite action's pinned binary
        # path into test sandboxes; `bdd_infra::rp_harness::OmniSimHandle::start`
        # consumes it via the binary lookup in
        # `crates/bdd-infra/src/rp_harness/omnisim.rs`. We deliberately do
        # NOT use `--test_env=PATH` here:
        # the runner's full PATH is large and on Windows differs between
        # `push` and `pull_request` events, which would bake unstable
        # values into every BDD test action's cache key and silently
        # invalidate every cache entry across event types. Pinning
        # `OMNISIM_PATH` keeps the action key stable.
        # On macOS, darwin-sandbox blocks OmniSim from binding network
        # ports; --spawn_strategy=local bypasses the sandbox for tests.
        run: |
          REMOTE_FLAGS=""
          if [[ -n "$BUILDBUDDY_API_KEY" ]]; then
            REMOTE_FLAGS="--config=remote-cache --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY"
          fi
          EXTRA_FLAGS=""
          if [[ "$RUNNER_OS" != "Linux" ]]; then
            EXTRA_FLAGS="--spawn_strategy=local"
          fi
          bazel test --config=ci $REMOTE_FLAGS --test_tag_filters=bdd --test_env=OMNISIM_PATH $EXTRA_FLAGS \
            --execution_log_compact_file="${RUNNER_TEMP}/bdd-exec.log.zst" \
            --profile="${RUNNER_TEMP}/bdd-profile.json.gz" \
            --noslim_profile \
            --experimental_profile_include_target_label \
            --experimental_profile_include_primary_output \
            //...

      - name: Upload Bazel diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bazel-exec-logs-${{ matrix.os }}-${{ github.event_name }}
          path: |
            ${{ runner.temp }}/build-exec.log.zst
            ${{ runner.temp }}/fast-test-exec.log.zst
            ${{ runner.temp }}/bdd-exec.log.zst
            ${{ runner.temp }}/build-profile.json.gz
            ${{ runner.temp }}/fast-test-profile.json.gz
            ${{ runner.temp }}/bdd-profile.json.gz
          if-no-files-found: warn
          retention-days: 14
