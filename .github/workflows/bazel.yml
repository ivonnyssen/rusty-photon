# Shadow-mode Bazel build/test. Runs alongside the canonical Cargo jobs
# during the migration described in docs/plans/bazel-migration.md.
#
# This workflow is NOT required for merge. Its purpose is to build
# confidence that Bazel produces parity results before cutting over.
# Add it to required checks once the migration plan's phase-7 exit
# criteria are met.
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
  # Nightly run from main keeps the remote cache populated from trusted code
  # during quiet stretches, so the next PR reads a warm cache.
  schedule:
    - cron: "7 7 * * *"
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: bazel

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: bazel build + test (shadow) / ${{ matrix.os }}
    # Action-graph change detection replaces cargo-rail. Bazel figures out
    # which targets actually changed and only rebuilds those; everything
    # else is a cache hit.
    #
    # 40 (not 30): with the OmniSim race fixed (see services/rp/BUILD.bazel),
    # rp:bdd now runs to full completion (~12 min on Windows) instead of failing
    # fast partway through, which lengthens the BDD step on the slower Windows
    # runner. The `omnisim` resource pool serializes rp:bdd only against
    # calibrator-flats:bdd — both stay parallel to the other ~10 BDD targets — so
    # the increase is modest; 40 leaves headroom for a cold-cache first run.
    timeout-minutes: 40
    defaults:
      run:
        shell: bash
    env:
      # The remote cache (Cloudflare Worker + R2; see tools/bazel-cache-worker)
      # is public-READ / token-WRITE. Only push-to-main and the nightly schedule
      # — which run from the default branch — get the write token, so they
      # populate the cache from trusted code. PRs (including forks, which get
      # no secrets at all) read anonymously and never write, which prevents
      # cache poisoning. The per-step logic below adds --config=remote-cache
      # unconditionally (reads are anonymous, so even fork PRs get a warm
      # cache) and only attaches the write token + uploads when
      # CACHE_WRITE_TOKEN is non-empty.
      CACHE_WRITE_TOKEN: ${{ (github.event_name == 'push' || github.event_name == 'schedule') && secrets.BAZEL_CACHE_WRITE_TOKEN || '' }}
    steps:
      - uses: actions/checkout@v5

      # MSVC cl.exe (VS 2022 17.7+) respects the LongPathsEnabled
      # registry key, removing the 260-char MAX_PATH ceiling for include
      # resolution. aws-lc-sys's vendored C source uses deep relative
      # includes (../../../../third_party/...) whose intermediate
      # un-normalised paths exceed 260 chars inside Bazel's runfiles tree.
      # The short --output_base below still helps because shorter paths
      # are faster to normalise, but the registry key is what actually
      # unblocks cl.exe.
      - name: Enable long paths (Windows MAX_PATH workaround)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1
          git config --system core.longpaths true

      # Using --output_base=C:/b eliminates the workspace-hash
      # subdirectory and saves ~50 characters vs the default
      # (rules_rust #1120). .bazelrc already imports user.bazelrc via
      # try-import, so this takes effect on the next bazel invocation.
      - name: Shorten Bazel output base (Windows)
        if: runner.os == 'Windows'
        run: echo 'startup --output_base=C:/b' > user.bazelrc

      - name: Install lld
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lld >/dev/null

      - name: Setup bazelisk
        uses: bazelbuild/setup-bazelisk@v3
        with:
          bazelisk-version: 1.28.1

      - name: Verify bazel version
        run: bazel --version

      # rp's BDD scenarios spawn the ASCOM Alpaca simulator. The Cargo
      # workflows install it via the same composite action.
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim

      # Two diagnostic captures, both temporary, both attached to the
      # same artifact at the end of the job:
      #
      # 1. --execution_log_compact_file: per-action log of inputs, env,
      #    command, platform properties — the fields Bazel hashes into
      #    the action key. Originally scoped to BDD because
      #    services/rp:bdd and services/sky-survey-camera:bdd were the
      #    known long pole on Windows (4/6 BDD targets cache-hit after
      #    PR #120). A subsequent cache-summary audit of `bazel build`
      #    / `bazel test (fast)` / `bazel test (BDD)` found the bigger
      #    Windows delta is actually in `bazel test (fast)` — extended
      #    to all three steps as a result. Compact format is
      #    zstd-compressed protobuf, ~MB-scale per step.
      #
      # 2. --profile + --noslim_profile + --experimental_profile_*: a
      #    Chrome-trace-format JSON profile of every Bazel sub-task
      #    (Skyframe evaluations, filesystem stats, remote-cache RPCs,
      #    package loading, action execution). Added to chase a
      #    specific Windows mystery: on `bazel test (fast)`, Windows
      #    spends 70+ seconds in the loading phase with two silent ~30 s
      #    stalls (no progress lines emitted) where Linux finishes the
      #    same loading in ~1 s. The exec-log only captures action
      #    spawns, so it cannot see what Bazel is doing during loading.
      #    The profile names every sub-task by duration, so the
      #    silent-stall cause becomes nameable. View profiles in
      #    Chrome's tracing UI (chrome://tracing) or Perfetto
      #    (https://ui.perfetto.dev). Files are gzipped JSON, also
      #    ~MB-scale per step.
      #
      # Drop both sets of flags and the upload step at the bottom once
      # the Windows loading-phase mystery is identified and fixed.
      - name: bazel build
        run: |
          REMOTE_FLAGS=(--config=remote-cache)
          if [[ -n "$CACHE_WRITE_TOKEN" ]]; then
            REMOTE_FLAGS+=(--remote_header="Authorization=Bearer $CACHE_WRITE_TOKEN")
          else
            REMOTE_FLAGS+=(--remote_upload_local_results=false)
          fi
          bazel build --config=ci "${REMOTE_FLAGS[@]}" \
            --execution_log_compact_file="${RUNNER_TEMP}/build-exec.log.zst" \
            --profile="${RUNNER_TEMP}/build-profile.json.gz" \
            --noslim_profile \
            --experimental_profile_include_target_label \
            --experimental_profile_include_primary_output \
            //...

      - name: bazel test (fast)
        # .bazelrc filters -requires-cargo,-bdd by default; keep fast
        # unit + integration pass separate from BDD so log output stays
        # useful when something breaks.
        run: |
          REMOTE_FLAGS=(--config=remote-cache)
          if [[ -n "$CACHE_WRITE_TOKEN" ]]; then
            REMOTE_FLAGS+=(--remote_header="Authorization=Bearer $CACHE_WRITE_TOKEN")
          else
            REMOTE_FLAGS+=(--remote_upload_local_results=false)
          fi
          bazel test --config=ci "${REMOTE_FLAGS[@]}" \
            --execution_log_compact_file="${RUNNER_TEMP}/fast-test-exec.log.zst" \
            --profile="${RUNNER_TEMP}/fast-test-profile.json.gz" \
            --noslim_profile \
            --experimental_profile_include_target_label \
            --experimental_profile_include_primary_output \
            //...

      - name: bazel test (BDD)
        # BDD cucumber tests spawn service binaries and take 30-150s each;
        # run them explicitly in their own step. They need OMNISIM_PATH (the
        # install-omnisim action's pinned binary path, consumed by
        # `bdd_infra::rp_harness::OmniSimHandle::start`), forwarded via
        # `--test_env=OMNISIM_PATH` — which lives in `.bazelrc` `build:ci` so it
        # applies to every step and the flag never changes mid-run (a changing
        # --test_env discards Bazel's analysis cache; see .bazelrc for the why).
        # On macOS, darwin-sandbox blocks OmniSim from binding network
        # ports; --spawn_strategy=local bypasses the sandbox for tests.
        run: |
          REMOTE_FLAGS=(--config=remote-cache)
          if [[ -n "$CACHE_WRITE_TOKEN" ]]; then
            REMOTE_FLAGS+=(--remote_header="Authorization=Bearer $CACHE_WRITE_TOKEN")
          else
            REMOTE_FLAGS+=(--remote_upload_local_results=false)
          fi
          # EXPERIMENT (branch worktree-center-on-target): --spawn_strategy=local on ALL OSes,
          # including Linux. The rp:bdd post-scenario park is Linux-ONLY, and Linux is the only OS
          # that runs BDD under processwrapper-sandbox — mac/win already bypass it via local and
          # never park. Testing whether dropping the sandbox on Linux too makes it match their 0%
          # park rate (i.e. whether the sandbox teardown, not the cache RPC, is the locus).
          # (mac/win independently NEED local because darwin-sandbox blocks OmniSim port-binding.)
          REMOTE_FLAGS+=(--spawn_strategy=local)
          # Live hang diagnostic on Linux (the bazel ubuntu BDD run is a frequent
          # hanger, like bazel-coverage). Streams what's actually running every 30s
          # so a hung-then-cancelled BDD/OmniSim action is attributable even though
          # --profile only records COMPLETED actions; see tools/ci/bazel-hang-sampler.sh.
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            bash tools/ci/bazel-hang-sampler.sh & HANG_SAMPLER_PID=$!
            trap 'kill "$HANG_SAMPLER_PID" 2>/dev/null || true' EXIT
          fi
          # EXPERIMENT (branch worktree-center-on-target): drop --remote_timeout 600 -> 3 to test
          # whether the rp:bdd post-scenario park collapses. It bounds a stale-keepalive cache
          # RPC (see memory bazel-coverage-rp-bdd-hang). --remote_timeout is an idle/inactivity
          # timeout, so healthy byte-flowing transfers survive; the risk at 3s is cold-object
          # time-to-first-byte tripping spurious retries (acceptable for a diagnostic run).
          bazel test --config=ci "${REMOTE_FLAGS[@]}" --test_tag_filters=bdd \
            --remote_timeout=3 \
            --execution_log_compact_file="${RUNNER_TEMP}/bdd-exec.log.zst" \
            --profile="${RUNNER_TEMP}/bdd-profile.json.gz" \
            --noslim_profile \
            --experimental_profile_include_target_label \
            --experimental_profile_include_primary_output \
            --test_output=all \
            //...

      - name: Upload Bazel diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bazel-exec-logs-${{ matrix.os }}-${{ github.event_name }}
          path: |
            ${{ runner.temp }}/build-exec.log.zst
            ${{ runner.temp }}/fast-test-exec.log.zst
            ${{ runner.temp }}/bdd-exec.log.zst
            ${{ runner.temp }}/build-profile.json.gz
            ${{ runner.temp }}/fast-test-profile.json.gz
            ${{ runner.temp }}/bdd-profile.json.gz
          if-no-files-found: warn
          retention-days: 14
