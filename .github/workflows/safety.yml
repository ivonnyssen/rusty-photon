# This workflow runs checks for unsafe code. In crates that don't have any unsafe code, this can be
# removed. Runs:
# - address sanitizer - detects memory errors
# - leak sanitizer - detects memory leaks
# Note: miri has been moved to the scheduled (rolling) workflow to avoid slow CI on every push
# See check.yml for information about how the concurrency cancellation and workflow triggering works
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: safety
jobs:
  sanitizers:
    runs-on: ubuntu-latest
    # CARGO_BUILD_TARGET makes every cargo invocation (including `cargo run`
    # spawned by BDD tests) implicitly use --target. This is critical because
    # when --target is set, RUSTFLAGS only applies to the target compilation
    # and not to proc-macros / build scripts, which would otherwise fail with
    # sanitizer flags (e.g. "can't find crate for `core`"). It also ensures
    # the pre-build and BDD `cargo run` share the same artifact directory
    # (target/x86_64-unknown-linux-gnu/), so the pre-built binary is reused.
    env:
      CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - name: Install cfitsio (cached)
        uses: awalsh128/cache-apt-pkgs-action@latest
        continue-on-error: true
        with:
          packages: libcfitsio-dev
          version: 1.0
      - name: Install cfitsio (act fallback)
        if: env.ACT == 'true'
        run: sudo apt-get update && sudo apt-get install -y libcfitsio-dev
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly
      - run: |
          # to get the symbolizer for debug symbol resolution
          sudo apt install -y llvm
          # to fix buggy leak analyzer:
          # https://github.com/japaric/rust-san#unrealiable-leaksanitizer
          # ensure there's a profile.dev section
          if ! grep -qE '^[ \t]*[profile.dev]' Cargo.toml; then
              echo >> Cargo.toml
              echo '[profile.dev]' >> Cargo.toml
          fi
          # remove pre-existing opt-levels in profile.dev
          sed -i '/^\s*\[profile.dev\]/,/^\s*\[/ {/^\s*opt-level/d}' Cargo.toml
          # now set opt-level to 1
          sed -i '/^\s*\[profile.dev\]/a opt-level = 1' Cargo.toml
          cat Cargo.toml
        name: Enable debug symbols
      # Pre-build all binaries so `cargo run` during BDD tests reuses cached artifacts.
      # CARGO_BUILD_TARGET (job env) ensures artifacts land in the same directory.
      - name: cargo build (asan)
        run: cargo build --all
        env:
          RUSTFLAGS: "-Z sanitizer=address"
      - name: cargo test -Zsanitizer=address
        # only --lib --tests b/c of https://github.com/rust-lang/rust/issues/53945
        run: cargo test --lib --tests --all-features
        env:
          ASAN_OPTIONS: "detect_odr_violation=0:detect_leaks=0"
          RUSTFLAGS: "-Z sanitizer=address"
      # Pre-build again for lsan — different RUSTFLAGS means different artifact cache.
      - name: cargo build (lsan)
        if: always()
        run: cargo build --all
        env:
          RUSTFLAGS: "-Z sanitizer=leak"
      - name: cargo test -Zsanitizer=leak
        if: always()
        run: cargo test --all-features
        env:
          LSAN_OPTIONS: "suppressions=lsan-suppressions.txt"
          RUSTFLAGS: "-Z sanitizer=leak"
