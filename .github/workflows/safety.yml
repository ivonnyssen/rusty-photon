# This workflow runs checks for unsafe code. Runs:
# - address sanitizer - detects memory errors
# - leak sanitizer - detects memory leaks
# Note: miri has been moved to the scheduled (rolling) workflow to avoid slow CI on every push
# See check.yml for information about how the concurrency cancellation and workflow triggering works
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: safety
jobs:
  plan:
    runs-on: ubuntu-latest
    name: plan
    outputs:
      test: ${{ steps.rail.outputs.test }}
      infra: ${{ steps.rail.outputs.infra }}
      packages: ${{ steps.packages.outputs.packages }}
      has_packages: ${{ steps.packages.outputs.has_packages }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: loadingalias/cargo-rail-action@v3
        id: rail
        with:
          since: ${{ github.event.pull_request.base.sha || github.event.before }}
      - name: Discover sanitizer packages
        id: packages
        run: |
          # All workspace packages except bdd-infra (its tests look for
          # binaries in target/debug/ which doesn't exist with CARGO_BUILD_TARGET)
          ALL_PKGS=$(cargo metadata --format-version 1 --no-deps | \
            jq -c '[.packages[].name | select(. != "bdd-infra")]')

          # If infra changed, test all packages; otherwise intersect with affected
          if [ "${{ steps.rail.outputs.infra }}" = "true" ]; then
            PACKAGES="$ALL_PKGS"
          else
            AFFECTED='${{ steps.rail.outputs.crates }}'
            PACKAGES=$(echo "$ALL_PKGS" | jq -c --arg affected "$AFFECTED" \
              '[.[] | select(. as $pkg | ($affected | split(" ") | .[] | select(. == $pkg)) // empty)]')
          fi

          COUNT=$(echo "$PACKAGES" | jq 'length')
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "has_packages=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "Sanitizer packages ($COUNT): $PACKAGES"
  sanitizers:
    needs: plan
    if: needs.plan.outputs.has_packages == 'true' && (needs.plan.outputs.test == 'true' || needs.plan.outputs.infra == 'true')
    runs-on: ubuntu-latest
    name: ${{ matrix.package }} / ${{ matrix.sanitizer }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.plan.outputs.packages) }}
        sanitizer: [address, leak]
    # CARGO_BUILD_TARGET makes every cargo invocation (including `cargo run`
    # spawned by BDD tests) implicitly use --target. This is critical because
    # when --target is set, RUSTFLAGS only applies to the target compilation
    # and not to proc-macros / build scripts, which would otherwise fail with
    # sanitizer flags (e.g. "can't find crate for `core`"). It also ensures
    # the pre-build and BDD `cargo run` share the same artifact directory
    # (target/x86_64-unknown-linux-gnu/), so the pre-built binary is reused.
    env:
      CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly
      - run: sudo apt install -y llvm
        name: Install llvm (symbolizer for debug symbols)
      - name: Enable opt-level 1 for sanitizers
        run: |
          # https://github.com/japaric/rust-san#unrealiable-leaksanitizer
          if ! grep -qE '^\s*\[profile.dev\]' Cargo.toml; then
              echo >> Cargo.toml
              echo '[profile.dev]' >> Cargo.toml
          fi
          sed -i '/^\s*\[profile.dev\]/,/^\s*\[/ {/^\s*opt-level/d}' Cargo.toml
          sed -i '/^\s*\[profile.dev\]/a opt-level = 1' Cargo.toml
      - name: cargo build
        run: cargo build --package ${{ matrix.package }} --all-features
        env:
          RUSTFLAGS: "-Z sanitizer=${{ matrix.sanitizer }}"
      - name: cargo test
        # only --lib --tests for asan b/c of https://github.com/rust-lang/rust/issues/53945
        run: |
          if [ "${{ matrix.sanitizer }}" = "address" ]; then
            cargo test --package ${{ matrix.package }} --lib --tests --all-features
          else
            cargo test --package ${{ matrix.package }} --all-features
          fi
        env:
          ASAN_OPTIONS: "detect_odr_violation=0:detect_leaks=0"
          RUSTFLAGS: "-Z sanitizer=${{ matrix.sanitizer }}"
