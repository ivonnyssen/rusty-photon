# This workflow runs checks for unsafe code. Runs:
# - address sanitizer - detects memory errors
# - leak sanitizer - detects memory leaks
# Note: miri has been moved to the scheduled (rolling) workflow to avoid slow CI on every push
#
# Sanitizers run nightly + on push to main (not on PRs). The project uses
# minimal unsafe code, so nightly coverage is sufficient to catch regressions
# before they reach a release.
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: safety
jobs:
  sanitizers:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Explicit timeout — see test.yml's plan job. The sanitizer `cargo test`
    # step runs the same BDD scenarios that intermittently hang; without a
    # cap GitHub's 360 min default let `ubuntu / nightly / address` burn a
    # full 6 h. 40 min sits ~2x above the ~19 min healthy sanitizer run.
    timeout-minutes: 40
    name: ubuntu / nightly / ${{ matrix.sanitizer }}
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, leak]
    env:
      CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly
      - run: sudo apt install -y llvm
        name: Install llvm (symbolizer for debug symbols)
      - name: Enable opt-level 1 for sanitizers
        run: |
          # https://github.com/japaric/rust-san#unrealiable-leaksanitizer
          if ! grep -qE '^\s*\[profile.dev\]' Cargo.toml; then
              echo >> Cargo.toml
              echo '[profile.dev]' >> Cargo.toml
          fi
          sed -i '/^\s*\[profile.dev\]/,/^\s*\[/ {/^\s*opt-level/d}' Cargo.toml
          sed -i '/^\s*\[profile.dev\]/a opt-level = 1' Cargo.toml
      - name: cargo build
        # Exclude zwo-camera: it links the native ZWO SDK and a bare scaffold
        # has no sanitizer value yet (revisit when the device traits land).
        run: cargo build --workspace --exclude zwo-camera --all-features --all-targets
        env:
          RUSTFLAGS: "-Z sanitizer=${{ matrix.sanitizer }}"
      - name: cargo test
        # only --lib --tests for asan b/c of https://github.com/rust-lang/rust/issues/53945
        # exclude bdd-infra: its unit tests look for binaries in target/debug/
        # which doesn't exist when CARGO_BUILD_TARGET is set
        run: |
          if [ "${{ matrix.sanitizer }}" = "address" ]; then
            cargo test --workspace --exclude bdd-infra --exclude zwo-camera --lib --tests --all-features
          else
            cargo test --workspace --exclude bdd-infra --exclude zwo-camera --all-features --all-targets
          fi
        env:
          ASAN_OPTIONS: "detect_odr_violation=0:detect_leaks=0"
          RUSTFLAGS: "-Z sanitizer=${{ matrix.sanitizer }}"

  notify-on-failure:
    # Open or update a tracking issue when the nightly sanitizer run fails so
    # ASan/LSan findings surface without depending on someone reading
    # scheduled-workflow logs. Skipped on push, pull_request, and
    # workflow_dispatch so manual debugging runs don't churn an issue.
    needs: sanitizers
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = `nightly: safety sanitizers failing`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The nightly safety workflow failed on at least one sanitizer.`,
              ``,
              `Likely causes: AddressSanitizer detected a memory error (use-after-free,`,
              `buffer overflow, etc.) or LeakSanitizer detected a memory leak in newly`,
              `added or recently changed unsafe code. Inspect the failed job in the`,
              `linked run for the sanitizer report.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `This issue was opened automatically by a scheduled run that`,
              `failed. While it stays open, each subsequent scheduled failure`,
              `is appended here as a comment linking its own run. Closing it`,
              `marks the failure handled — it is never re-opened; the next`,
              `scheduled failure opens a fresh issue instead.`,
            ].join("\n");
            // Search only OPEN issues. While a tracking issue is open each
            // failure appends a comment; once it is closed the failure is
            // considered handled, so the next scheduled failure opens a
            // fresh issue rather than resurrecting the closed one.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "safety-nightly",
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Failed again — run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["safety-nightly", "ci-flake"],
              });
            }
