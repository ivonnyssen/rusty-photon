# This workflow runs checks for unsafe code. Runs:
# - address sanitizer - detects memory errors
# - leak sanitizer - detects memory leaks
# Note: miri has been moved to the scheduled (rolling) workflow to avoid slow CI on every push
# See check.yml for information about how the concurrency cancellation and workflow triggering works
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: safety
jobs:
  plan:
    runs-on: ubuntu-latest
    name: plan
    outputs:
      test: ${{ steps.rail.outputs.test }}
      infra: ${{ steps.rail.outputs.infra }}
      cargo-args: ${{ steps.rail.outputs.cargo-args }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: loadingalias/cargo-rail-action@v3
        id: rail
        with:
          since: ${{ github.event.pull_request.base.sha || github.event.before }}
  sanitizers:
    needs: plan
    if: needs.plan.outputs.test == 'true' || needs.plan.outputs.infra == 'true'
    runs-on: ubuntu-latest
    name: ubuntu / nightly / ${{ matrix.sanitizer }}
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, leak]
    # CARGO_BUILD_TARGET makes every cargo invocation (including `cargo run`
    # spawned by BDD tests) implicitly use --target. This is critical because
    # when --target is set, RUSTFLAGS only applies to the target compilation
    # and not to proc-macros / build scripts, which would otherwise fail with
    # sanitizer flags (e.g. "can't find crate for `core`"). It also ensures
    # the pre-build and BDD `cargo run` share the same artifact directory
    # (target/x86_64-unknown-linux-gnu/), so the pre-built binary is reused.
    env:
      CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly
      - run: |
          # to get the symbolizer for debug symbol resolution
          sudo apt install -y llvm
          # to fix buggy leak analyzer:
          # https://github.com/japaric/rust-san#unrealiable-leaksanitizer
          # ensure there's a profile.dev section
          if ! grep -qE '^\s*\[profile.dev\]' Cargo.toml; then
              echo >> Cargo.toml
              echo '[profile.dev]' >> Cargo.toml
          fi
          # remove pre-existing opt-levels in profile.dev
          sed -i '/^\s*\[profile.dev\]/,/^\s*\[/ {/^\s*opt-level/d}' Cargo.toml
          # now set opt-level to 1
          sed -i '/^\s*\[profile.dev\]/a opt-level = 1' Cargo.toml
          cat Cargo.toml
        name: Enable debug symbols
      # Build the entire workspace once so all tests (and BDD child processes)
      # reuse the same sanitizer-instrumented artifacts.
      - name: cargo build
        run: cargo build ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
        env:
          RUSTFLAGS: "-Z sanitizer=${{ matrix.sanitizer }}"
      - name: cargo test
        # only --lib --tests for asan b/c of https://github.com/rust-lang/rust/issues/53945
        # exclude bdd-infra: its unit tests look for binaries in target/debug/
        # which doesn't exist when CARGO_BUILD_TARGET is set
        run: |
          if [ "${{ matrix.sanitizer }}" = "address" ]; then
            cargo test ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --exclude bdd-infra --lib --tests --all-features
          else
            cargo test ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --exclude bdd-infra --all-features --all-targets
          fi
        env:
          ASAN_OPTIONS: "detect_odr_violation=0:detect_leaks=0"
          RUSTFLAGS: "-Z sanitizer=${{ matrix.sanitizer }}"
