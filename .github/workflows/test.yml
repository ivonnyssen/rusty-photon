# This is the main CI workflow that runs the test suite on all pushes to main and all pull requests.
# It runs the following jobs:
# - required: runs the test suite on ubuntu with the stable rust toolchain
# - os-check: runs the test suite on mac and windows (workspace-level)
# - coverage: runs the test suite and collects per-package coverage information
# See check.yml for information about how the concurrency cancellation and workflow triggering works
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: test
jobs:
  plan:
    runs-on: ubuntu-latest
    name: plan
    outputs:
      test: ${{ steps.rail.outputs.test }}
      infra: ${{ steps.rail.outputs.infra }}
      cargo-args: ${{ steps.rail.outputs.cargo-args }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: loadingalias/cargo-rail-action@v3
        id: rail
        with:
          since: ${{ github.event.pull_request.base.sha || github.event.before }}
  required:
    needs: plan
    if: needs.plan.outputs.test == 'true' || needs.plan.outputs.infra == 'true'
    runs-on: ubuntu-latest
    name: ubuntu / stable
    steps:
      - uses: actions/checkout@v5
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
      - name: cargo generate-lockfile
        # enable this ci template to run regardless of whether the lockfile is checked in or not
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # Pre-build all targets (bins + test/bench/example targets) so nextest
      # and BDD tests find cached binaries without recompilation
      - name: cargo build
        run: cargo build --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      # https://twitter.com/jonhoo/status/1571290371124260865
      - name: cargo nextest run
        run: cargo nextest run --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      # BDD tests use custom harness (bdd_main!) incompatible with nextest
      - name: cargo test --test bdd
        run: cargo test --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --test bdd
      # https://github.com/rust-lang/cargo/issues/6669
      - name: cargo test --doc
        run: cargo test --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --doc
  os-check:
    # Run cargo test on mac and windows at the workspace level
    needs: plan
    if: needs.plan.outputs.test == 'true' || needs.plan.outputs.infra == 'true'
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: cargo build
        run: cargo build --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      - name: cargo test --test bdd
        run: cargo test --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --test bdd
  coverage:
    # use llvm-cov to build and collect coverage and upload to codecov.io
    # with per-package flags for README badges.
    needs: plan
    if: needs.plan.outputs.test == 'true' || needs.plan.outputs.infra == 'true'
    runs-on: ubuntu-latest
    name: coverage
    steps:
      - uses: actions/checkout@v5
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install nightly (for coverage instrumentation)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # Two-phase coverage: build all binaries with instrumentation,
      # then run tests so spawned child processes also produce .profraw files.
      # Uses show-env (not cargo llvm-cov nextest) because BDD tests spawn
      # service binaries via find_binary(), which needs instrumented binaries
      # in the default target/debug/ directory.
      - name: Clean previous coverage artifacts
        run: cargo llvm-cov clean --workspace
      - name: Build with coverage instrumentation
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo build --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      - name: Run tests with coverage
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo test --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      - name: Generate per-package coverage reports
        run: |
          source <(cargo llvm-cov show-env --sh)
          PACKAGES=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[].name')
          for pkg in $PACKAGES; do
            cargo llvm-cov report --locked --package "$pkg" --lcov \
              --output-path "lcov-${pkg}.info" 2>/dev/null || true
          done
      - name: Upload to codecov.io
        if: env.ACT != 'true'
        shell: bash
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          # Download the codecov CLI uploader
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x ./codecov
          # Upload per-package reports with flags to preserve per-service badges
          for f in lcov-*.info; do
            [ -f "$f" ] || continue
            pkg="${f#lcov-}"
            pkg="${pkg%.info}"
            echo "Uploading coverage for $pkg"
            ./codecov upload-process \
              --file "$f" \
              --flag "$pkg" \
              --token "$CODECOV_TOKEN" \
              --git-service github \
              || echo "Warning: upload failed for $pkg"
          done
