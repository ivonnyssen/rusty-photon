# Cargo build + test — nightly safety net.
#
# Bazel (bazel.yml + bazel-coverage.yml) is the per-PR build / test / coverage
# gate. This workflow runs on a nightly schedule (+ push to main + manual
# dispatch) and exercises the FULL workspace as a Cargo safety net.
#
# Jobs:
# - required: workspace build + nextest + BDD + doctests on ubuntu/stable
# - macos / windows: the same on the other two host OSes
#   (Windows BDD runs in one job here — on a nightly run the ~10m sequential
#    per-scenario spawn cost is irrelevant, so it is not split per-service.)
#
# Coverage is NOT collected here: `bazel coverage` (bazel-coverage.yml) is the
# sole coverage source (canonical `<pkg>` Codecov flags).
permissions:
  contents: read
on:
  push:
    branches: [main]
  schedule:
    # 08:00 UTC — after the 07:0x–07:1x nightly cluster (bazel 07:07, scheduled
    # 07:07, safety 07:17) so the full-workspace Cargo run doesn't contend with
    # them for the hosted-runner pool minute.
    - cron: "0 8 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: test
env:
  # Every job builds the zwo + qhy + svbony camera crates on their
  # `--all-features` (simulation) path, which `cfg`s out the real FFI and
  # references no SDK symbols. These tell libzwo-sys / libqhyccd-sys /
  # libsvbony-sys build.rs to omit the native link directives, so the whole
  # workspace builds with NO ZWO, QHYCCD, or SVBony SDK to provision (the
  # ZWO/SVBony links would otherwise be forced unconditionally even under
  # `simulation`) — and no libusb either, since the QHYCCD static lib that
  # pulls it in is never linked. The REAL native link + FFI is verified
  # separately by the `native` workflow (nightly + on camera-crate changes),
  # plus Bazel and the Pi nightly.
  ZWO_SKIP_NATIVE_LINK: "1"
  QHYCCD_SKIP_NATIVE_LINK: "1"
  SVBONY_SKIP_NATIVE_LINK: "1"
jobs:
  required:
    runs-on: ubuntu-latest
    # Explicit job timeout. Without one, GitHub's default is 360 min (6 h): a BDD
    # hang in `cargo test --test bdd` could silently burn a full 6 h. The root
    # cause (rp's `do_capture` looping forever on a failed exposure) is fixed at
    # the source; this cap is defense-in-depth. Generous because the nightly run
    # exercises the FULL workspace BDD suite.
    timeout-minutes: 45
    name: ubuntu / stable
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install Pebble
        uses: ./.github/actions/install-pebble
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # Pre-build all targets (bins + test/bench/example targets) so nextest
      # and BDD tests find cached binaries without recompilation.
      - name: cargo build
        run: cargo build --locked --workspace --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked --workspace --all-features --all-targets
      # BDD tests use a custom harness (bdd_main!) incompatible with nextest.
      # `--workspace --test bdd` runs the bdd target wherever it exists; members
      # without one are skipped.
      - name: cargo test --test bdd
        run: cargo test --locked --workspace --all-features --test bdd
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-ubuntu-stable
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
      # https://github.com/rust-lang/cargo/issues/6669
      - name: cargo test --doc
        run: cargo test --locked --workspace --all-features --doc
  macos:
    runs-on: macos-latest
    timeout-minutes: 45
    name: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install Pebble
        uses: ./.github/actions/install-pebble
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-stable
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: cargo build
        run: cargo build --locked --workspace --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked --workspace --all-features --all-targets
      - name: cargo test --test bdd
        run: cargo test --locked --workspace --all-features --test bdd
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-macos-latest
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
  windows:
    # Windows nextest + BDD in one job. On a nightly safety net the ~10m
    # sequential BDD wall-clock (Windows spawns a process per scenario) is
    # irrelevant, so BDD runs as a single full-workspace `cargo test --test bdd`.
    runs-on: windows-latest
    timeout-minutes: 60
    name: windows / nextest
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install Pebble
        uses: ./.github/actions/install-pebble
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-stable
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: cargo build
        run: cargo build --locked --workspace --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked --workspace --all-features --all-targets
      - name: cargo test --test bdd
        run: cargo test --locked --workspace --all-features --test bdd
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-windows
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
