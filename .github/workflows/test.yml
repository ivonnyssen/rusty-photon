# This is the main CI workflow that runs the test suite on all pushes to main and all pull requests.
# It runs the following jobs:
# - required: runs the test suite on ubuntu with the stable rust toolchain
# - os-check: runs the test suite on mac and windows (workspace-level)
#   On Windows, BDD tests are split into per-service parallel jobs to avoid
#   the ~10m sequential wall-clock from per-scenario process spawn overhead.
# - coverage: runs the test suite and collects per-package coverage information
# See check.yml for information about how the concurrency cancellation and workflow triggering works
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: test
env:
  # Every job builds the zwo crates on their `--all-features` (simulation) path,
  # which `cfg`s out the real FFI and references no SDK symbols. This tells
  # libzwo-sys/build.rs to omit the native link directives, so the whole
  # workspace builds with no ZWO SDK to provision (the link would otherwise be
  # forced unconditionally). The REAL native link + FFI is verified separately by
  # the `native` workflow (nightly + on zwo changes), plus Bazel and the Pi nightly.
  ZWO_SKIP_NATIVE_LINK: "1"
jobs:
  plan:
    runs-on: ubuntu-latest
    # Explicit job timeout. Without one, GitHub's default is 360 min (6 h):
    # a BDD hang in `cargo test --test bdd` silently burned a full 6 h per
    # job before being killed, blocking the runner queue overnight. The root
    # cause (rp's `do_capture` looping forever on a failed sky-survey-camera
    # exposure) is fixed at the source; these caps are defense-in-depth so no
    # future hang can ever burn 6 h again. Values sit ~2x above the observed
    # healthy max so cold-cache/load variance won't false-positive.
    timeout-minutes: 15
    name: plan
    outputs:
      test: ${{ steps.rail.outputs.test }}
      infra: ${{ steps.rail.outputs.infra }}
      cargo-args: ${{ steps.scope.outputs.cargo-args }}
      bdd-packages: ${{ steps.bdd.outputs.packages }}
      has-bdd: ${{ steps.bdd.outputs.has_bdd }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: loadingalias/cargo-rail-action@v4
        id: rail
        with:
          since: ${{ github.event.pull_request.base.sha || github.event.before }}
      # cargo-rail-action@v4 no longer emits the `crates` / `cargo-args` step
      # outputs the affected-package narrowing below relies on. Reconstruct
      # them from the planner's `scope-json` contract, whose top-level `.crates`
      # array IS the affected set the jq below reads (cargo-rail pre-unions the
      # directly- and transitively-impacted crates into it; the richer `-f json`
      # surfaces those separately as `.impact.direct_crates` /
      # `.impact.transitive_crates`, but `scope-json` flattens them into
      # `.crates`). cargo-args is the matching `-p` flag list. The `// []`
      # fallback means a missing/empty `.crates` — nothing crate-specific
      # changed, OR a future schema that drops the field — yields an empty list,
      # so the build/test commands fall back to the whole workspace (cargo's
      # default with no -p and no default-members); the SDK gates account for that.
      - name: Derive affected crates from scope-json
        id: scope
        env:
          SCOPE_JSON: ${{ steps.rail.outputs.scope-json }}
        run: |
          if [ -z "$SCOPE_JSON" ]; then SCOPE_JSON='{}'; fi
          CRATES=$(jq -r '.crates // [] | join(" ")' <<<"$SCOPE_JSON")
          CARGO_ARGS=$(jq -r '.crates // [] | map("-p " + .) | join(" ")' <<<"$SCOPE_JSON")
          echo "crates=$CRATES" >> "$GITHUB_OUTPUT"
          echo "cargo-args=$CARGO_ARGS" >> "$GITHUB_OUTPUT"
          echo "Affected crates: ${CRATES:-<none>}; cargo-args: ${CARGO_ARGS:-<empty -> full workspace>}"
      - name: Discover BDD packages
        id: bdd
        run: |
          # Find packages with a "bdd" test target
          ALL_BDD=$(cargo metadata --format-version 1 --no-deps | \
            jq -c '[.packages[] | select(.targets[] | .kind[] == "test" and .name == "bdd") | .name]')

          # If infra changed, test all BDD packages; otherwise intersect with
          # affected. "Affected" combines two sources:
          #   1. the `scope` step's `crates` (reconstructed from the planner's
          #      scope-json) — tracks Rust source / Cargo.toml changes per crate.
          #   2. Feature-file changes under `services/<pkg>/tests/features/`
          #      that rail doesn't see as crate-affecting (cargo metadata
          #      doesn't index resource files). Without this augmentation a
          #      BDD-only fix lands without any windows-bdd validation —
          #      see the post-merge hang on PR #182 (PR #186 fix was first
          #      pushed without exercising windows-bdd because of this gap).
          if [ "${{ steps.rail.outputs.infra }}" = "true" ]; then
            BDD_PACKAGES="$ALL_BDD"
          else
            BASE='${{ github.event.pull_request.base.sha || github.event.before }}'
            FEATURE_AFFECTED=""
            if [ -n "$BASE" ]; then
              FEATURE_AFFECTED=$(git diff --name-only "$BASE"...HEAD 2>/dev/null \
                | grep -oE '^services/[^/]+/tests/features' \
                | cut -d/ -f2 \
                | sort -u \
                | tr '\n' ' ')
            fi
            AFFECTED='${{ steps.scope.outputs.crates }}'" $FEATURE_AFFECTED"
            BDD_PACKAGES=$(echo "$ALL_BDD" | jq -c --arg affected "$AFFECTED" \
              '[.[] | select(. as $pkg | ($affected | split(" ") | .[] | select(. == $pkg)) // empty)]')
          fi

          COUNT=$(echo "$BDD_PACKAGES" | jq 'length')
          echo "packages=$BDD_PACKAGES" >> $GITHUB_OUTPUT
          echo "has_bdd=$([ "$COUNT" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "BDD packages ($COUNT): $BDD_PACKAGES"
  required:
    needs: plan
    if: needs.plan.outputs.test == 'true' || needs.plan.outputs.infra == 'true' || needs.plan.outputs.has-bdd == 'true'
    runs-on: ubuntu-latest
    # See the plan job for why these caps exist (6 h BDD-hang backstop).
    timeout-minutes: 30
    name: ubuntu / stable
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      # qhy-camera links the proprietary QHYCCD SDK (libqhyccd-sys →
      # static=qhyccd) + libusb-1.0. The SDK is publicly downloadable from
      # qhyccd.com; the published action installs it on Linux/macOS/Windows
      # (on Linux its install.sh puts the libs in /usr/local/lib, where
      # libqhyccd-sys's build.rs looks). qhy-camera is built/tested on all
      # three GitHub-hosted OSes; the Pi nightly covers linux-arm64 (which the
      # action does not).
      #
      # Install when this job actually compiles qhy-camera, i.e. when the build
      # selector below includes it: infra (=> --workspace), an EMPTY cargo-args
      # (=> cargo's default whole-workspace build), or cargo-args naming
      # qhy-camera. Narrowed builds that exclude it skip the SDK.
      - name: Install libusb (qhy-camera)
        if: needs.plan.outputs.infra == 'true' || needs.plan.outputs.cargo-args == '' || contains(needs.plan.outputs.cargo-args, 'qhy-camera')
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libusb-1.0-0-dev
          version: 1.0
      - name: Install QHYCCD SDK (qhy-camera)
        if: needs.plan.outputs.infra == 'true' || needs.plan.outputs.cargo-args == '' || contains(needs.plan.outputs.cargo-args, 'qhy-camera')
        uses: ivonnyssen/qhyccd-sdk-install@v3
        with:
          version: "26.06.04"
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # Pre-build all targets (bins + test/bench/example targets) so nextest
      # and BDD tests find cached binaries without recompilation
      - name: cargo build
        run: cargo build --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      # https://twitter.com/jonhoo/status/1571290371124260865
      - name: cargo nextest run
        run: cargo nextest run --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      # BDD cross-spawn deps not visible to cargo-rail: sentinel's BDD
      # spawns filemonitor; calibrator-flats's BDD spawns rp; ui-htmx's BDD
      # spawns dsd-fp2. Narrow cargo-args can miss them, so pre-build
      # unconditionally whenever a BDD run is scheduled and we're not already
      # building --workspace.
      - name: cargo build BDD cross-spawn deps
        if: needs.plan.outputs.has-bdd == 'true' && needs.plan.outputs.infra != 'true'
        run: cargo build --locked --package filemonitor --package rp --package dsd-fp2 --all-features --all-targets
      # BDD tests use custom harness (bdd_main!) incompatible with nextest
      - name: cargo test --test bdd
        run: cargo test --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --test bdd
      # OmniSim's stdout/stderr now lands in target/bdd-infra-omnisim-logs/
      # (see crates/bdd-infra/src/rp_harness/omnisim.rs::OmniSimProcess::log_dir).
      # Uploading on failure preserves the only off-runner copy of those logs
      # so the next intermittent BDD failure can be investigated rather than
      # re-guessed.
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-ubuntu-stable
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
      # https://github.com/rust-lang/cargo/issues/6669
      - name: cargo test --doc
        run: cargo test --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --doc
  macos:
    needs: plan
    if: needs.plan.outputs.test == 'true' || needs.plan.outputs.infra == 'true' || needs.plan.outputs.has-bdd == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    name: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      # qhy-camera links the proprietary QHYCCD SDK on macOS too (static=qhyccd
      # + libc++). The static lib references libusb, so install it via brew
      # exactly as the upstream qhyccd-rs macOS CI does, then provision the SDK
      # via the published action (covers x86_64-linux/macOS/Windows). Gated on
      # the same "build includes qhy-camera" condition as the ubuntu job.
      - name: Install libusb (qhy-camera, macOS)
        if: needs.plan.outputs.infra == 'true' || needs.plan.outputs.cargo-args == '' || contains(needs.plan.outputs.cargo-args, 'qhy-camera')
        run: brew install libusb
      - name: Install QHYCCD SDK (qhy-camera)
        if: needs.plan.outputs.infra == 'true' || needs.plan.outputs.cargo-args == '' || contains(needs.plan.outputs.cargo-args, 'qhy-camera')
        uses: ivonnyssen/qhyccd-sdk-install@v3
        with:
          version: "26.06.04"
      # The macOS SDK ships libqhyccd as a dylib extracted under $GITHUB_WORKSPACE;
      # the SDK-linked test binaries (qhy-camera, plus the qhyccd-rs/libqhyccd-sys
      # workspace members since ADR-009) load it via @rpath, which dyld can't
      # resolve from that non-standard dir at test runtime. Point the fallback
      # loader path at it (+ Homebrew for libusb). Linux links static=qhyccd, so
      # this is macOS-only.
      - name: Help the loader find the QHYCCD dylib (macOS)
        if: needs.plan.outputs.infra == 'true' || needs.plan.outputs.cargo-args == '' || contains(needs.plan.outputs.cargo-args, 'qhy-camera')
        run: |
          DYLIB="$(find "$GITHUB_WORKSPACE" /usr/local/lib /opt/homebrew/lib -name 'libqhyccd*.dylib' -print -quit 2>/dev/null || true)"
          if [ -z "$DYLIB" ]; then echo "::error::libqhyccd dylib not found after SDK install"; exit 1; fi
          echo "DYLD_FALLBACK_LIBRARY_PATH=$(dirname "$DYLIB"):/opt/homebrew/lib:/usr/local/lib:/usr/lib" >> "$GITHUB_ENV"
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-stable
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: cargo build
        run: cargo build --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      # BDD cross-spawn deps not visible to cargo-rail — see ubuntu job above.
      - name: cargo build BDD cross-spawn deps
        if: needs.plan.outputs.has-bdd == 'true' && needs.plan.outputs.infra != 'true'
        run: cargo build --locked --package filemonitor --package rp --package dsd-fp2 --all-features --all-targets
      - name: cargo test --test bdd
        run: cargo test --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --test bdd
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-macos-latest
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
  windows:
    # Windows nextest (unit + integration tests, no BDD).
    # BDD tests are split into per-service parallel jobs below to avoid
    # the ~10m sequential wall-clock from per-scenario process spawn overhead.
    needs: plan
    if: needs.plan.outputs.test == 'true' || needs.plan.outputs.infra == 'true' || needs.plan.outputs.has-bdd == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    name: windows / nextest
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      # qhy-camera links the proprietary QHYCCD SDK on Windows (static=qhyccd
      # from pkg_win\x64; no separate libusb needed). This job always builds
      # the full --workspace to warm the cache for the per-service windows-bdd
      # jobs, so the SDK must be present unconditionally. The published action
      # extracts the WinMix SDK into the workspace where libqhyccd-sys's
      # build.rs looks and adds pkg_win\x64 to PATH for runtime DLL loading.
      - name: Install QHYCCD SDK (qhy-camera)
        uses: ivonnyssen/qhyccd-sdk-install@v3
        with:
          version: "26.06.04"
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          # Shared with windows-bdd jobs so they get a warm cache without
          # creating duplicate ~1.3GB entries per BDD service
          shared-key: windows-stable
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # Build full workspace so the cache saved by this job includes all
      # binaries needed by the per-service BDD jobs
      - name: cargo build
        run: cargo build --locked --workspace --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
  windows-bdd:
    # Per-service BDD tests on Windows, run in parallel via matrix.
    # Each service spawns its own process per scenario; on Windows this takes
    # ~5s/scenario. Running services in parallel cuts wall-clock from ~10m
    # to ~3m (limited by the largest service, ppba-driver).
    needs: plan
    # has-bdd reflects the union of cargo-rail's affected crates and
    # tests/features changes (see plan job's "Discover BDD packages"
    # step). It's a sufficient gate on its own — the prior
    # `&& (test || infra)` clause was redundant and silently dropped
    # BDD-only PRs (#186) from the windows-bdd matrix.
    if: needs.plan.outputs.has-bdd == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    name: windows / bdd / ${{ matrix.package }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.plan.outputs.bdd-packages) }}
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      # Only qhy-camera links the proprietary QHYCCD SDK; provision it for that
      # matrix leg so its BDD binary builds and loads on Windows.
      - name: Install QHYCCD SDK (qhy-camera)
        if: matrix.package == 'qhy-camera'
        uses: ivonnyssen/qhyccd-sdk-install@v3
        with:
          version: "26.06.04"
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-stable
          save-if: false
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: cargo build
        run: cargo build --locked --package ${{ matrix.package }} --all-features --all-targets
      # Cross-spawn deps: sentinel BDD tests spawn filemonitor;
      # calibrator-flats BDD tests spawn rp; rp's @e2e-centering BDD
      # spawns sky-survey-camera; ui-htmx BDD tests spawn dsd-fp2.
      # bdd-infra no longer compiles missing binaries on the fly, so we
      # pre-build them here.
      - name: cargo build filemonitor (sentinel cross-spawn)
        if: matrix.package == 'sentinel'
        run: cargo build --locked --package filemonitor --all-features --all-targets
      - name: cargo build rp (calibrator-flats cross-spawn)
        if: matrix.package == 'calibrator-flats'
        run: cargo build --locked --package rp --all-features --all-targets
      - name: cargo build sky-survey-camera (rp cross-spawn)
        if: matrix.package == 'rp'
        run: cargo build --locked --package sky-survey-camera --all-features --all-targets
      - name: cargo build dsd-fp2 (ui-htmx cross-spawn)
        if: matrix.package == 'ui-htmx'
        run: cargo build --locked --package dsd-fp2 --all-features --all-targets
      - name: cargo test --test bdd
        run: cargo test --locked --package ${{ matrix.package }} --all-features --test bdd
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-windows-bdd-${{ matrix.package }}
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
  coverage:
    # use llvm-cov to build and collect coverage and upload to codecov.io
    # with per-package flags for README badges.
    needs: plan
    if: needs.plan.outputs.test == 'true' || needs.plan.outputs.infra == 'true' || needs.plan.outputs.has-bdd == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: coverage
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      # qhy-camera links the proprietary QHYCCD SDK (libqhyccd-sys →
      # static=qhyccd) + libusb-1.0. The SDK is publicly downloadable from
      # qhyccd.com; the published action installs it into /usr/local/lib on
      # Linux (where libqhyccd-sys's build.rs looks). Coverage runs on Linux
      # only; the SDK action also covers macOS/Windows for the test jobs. Gated
      # on the same "build includes qhy-camera" condition as the ubuntu job.
      - name: Install libusb (qhy-camera)
        if: needs.plan.outputs.infra == 'true' || needs.plan.outputs.cargo-args == '' || contains(needs.plan.outputs.cargo-args, 'qhy-camera')
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libusb-1.0-0-dev
          version: 1.0
      - name: Install QHYCCD SDK (qhy-camera)
        if: needs.plan.outputs.infra == 'true' || needs.plan.outputs.cargo-args == '' || contains(needs.plan.outputs.cargo-args, 'qhy-camera')
        uses: ivonnyssen/qhyccd-sdk-install@v3
        with:
          version: "26.06.04"
      - name: Install nightly (for coverage instrumentation)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-nightly
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # Two-phase coverage: build all binaries with instrumentation,
      # then run tests so spawned child processes also produce .profraw files.
      # Uses show-env (not cargo llvm-cov nextest) because BDD tests spawn
      # service binaries via find_binary(), which needs instrumented binaries
      # in the default target/debug/ directory.
      - name: Clean previous coverage artifacts
        run: cargo llvm-cov clean --workspace
      - name: Build with coverage instrumentation
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo build --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      - name: Run tests with coverage
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo test --locked ${{ needs.plan.outputs.infra == 'true' && '--workspace' || needs.plan.outputs.cargo-args }} --all-features --all-targets
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-coverage
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
      - name: Generate per-package coverage reports
        run: |
          source <(cargo llvm-cov show-env --sh)
          PACKAGES=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[].name')
          for pkg in $PACKAGES; do
            cargo llvm-cov report --locked --package "$pkg" --lcov \
              --output-path "lcov-${pkg}.info" 2>/dev/null || true
          done
      - name: Upload to codecov.io
        if: env.ACT != 'true'
        shell: bash
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          # Download the codecov CLI uploader
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x ./codecov
          # On pull_request events, GitHub checks out an ephemeral merge commit.
          # Override the commit SHA so Codecov maps the upload to the PR head.
          COMMIT_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "Uploading coverage for commit $COMMIT_SHA"
          # Upload per-package reports with flags to preserve per-service badges
          for f in lcov-*.info; do
            [ -f "$f" ] || continue
            pkg="${f#lcov-}"
            pkg="${pkg%.info}"
            echo "Uploading coverage for $pkg"
            ./codecov upload-process \
              --file "$f" \
              --flag "$pkg" \
              --token "$CODECOV_TOKEN" \
              --git-service github \
              --commit-sha "$COMMIT_SHA" \
              || echo "Warning: upload failed for $pkg"
          done
