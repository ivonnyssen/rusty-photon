# Cargo build + test — nightly safety net.
#
# Until the Bazel cutover this ran on every PR and produced the required
# `ubuntu / stable` and `coverage` checks. Bazel (bazel.yml + bazel-coverage.yml)
# is now the per-PR build / test / coverage gate, so this workflow moved to a
# nightly schedule (+ push to main + manual dispatch) and runs the FULL workspace
# as a Cargo safety net. It no longer uses cargo-rail change detection — a
# nightly safety net always exercises the whole workspace, so the narrowing
# `plan` job (and the only remaining cargo-rail use in CI) is gone. See
# docs/plans/bazel-migration.md (Phase 7).
#
# Jobs:
# - required: workspace build + nextest + BDD + doctests on ubuntu/stable
# - macos / windows: the same on the other two host OSes
#   (Windows BDD runs in one job here — on a nightly run the ~10m sequential
#    per-scenario spawn cost is irrelevant, so the per-service matrix split the
#    per-PR job used is collapsed back in.)
# - coverage: cargo-llvm-cov, uploaded under `cargo-<pkg>` flags (Bazel coverage
#   drives the canonical `<pkg>` badges after the cutover — see .github/codecov.yml)
permissions:
  contents: read
on:
  push:
    branches: [main]
  schedule:
    # 08:00 UTC — after the 07:0x–07:1x nightly cluster (bazel 07:07, scheduled
    # 07:07, safety 07:17) so the full-workspace Cargo run doesn't contend with
    # them for the hosted-runner pool minute.
    - cron: "0 8 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: test
env:
  # Every job builds the zwo + qhy camera crates on their `--all-features`
  # (simulation) path, which `cfg`s out the real FFI and references no SDK
  # symbols. These tell libzwo-sys / libqhyccd-sys build.rs to omit the native
  # link directives, so the whole workspace builds with NO ZWO or QHYCCD SDK to
  # provision (the links would otherwise be forced unconditionally) — and no
  # libusb either, since the QHYCCD static lib that pulls it in is never linked.
  # The REAL native link + FFI is verified separately by the `native` workflow
  # (nightly + on camera-crate changes), plus Bazel and the Pi nightly.
  ZWO_SKIP_NATIVE_LINK: "1"
  QHYCCD_SKIP_NATIVE_LINK: "1"
jobs:
  required:
    runs-on: ubuntu-latest
    # Explicit job timeout. Without one, GitHub's default is 360 min (6 h): a BDD
    # hang in `cargo test --test bdd` could silently burn a full 6 h. The root
    # cause (rp's `do_capture` looping forever on a failed exposure) is fixed at
    # the source; this cap is defense-in-depth. Generous because the nightly run
    # exercises the FULL workspace BDD suite (no cargo-rail narrowing).
    timeout-minutes: 45
    name: ubuntu / stable
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # Pre-build all targets (bins + test/bench/example targets) so nextest
      # and BDD tests find cached binaries without recompilation.
      - name: cargo build
        run: cargo build --locked --workspace --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked --workspace --all-features --all-targets
      # BDD tests use a custom harness (bdd_main!) incompatible with nextest.
      # `--workspace --test bdd` runs the bdd target wherever it exists; members
      # without one are skipped.
      - name: cargo test --test bdd
        run: cargo test --locked --workspace --all-features --test bdd
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-ubuntu-stable
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
      # https://github.com/rust-lang/cargo/issues/6669
      - name: cargo test --doc
        run: cargo test --locked --workspace --all-features --doc
  macos:
    runs-on: macos-latest
    timeout-minutes: 45
    name: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-stable
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: cargo build
        run: cargo build --locked --workspace --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked --workspace --all-features --all-targets
      - name: cargo test --test bdd
        run: cargo test --locked --workspace --all-features --test bdd
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-macos-latest
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
  windows:
    # Windows nextest + BDD in one job. On a nightly safety net the ~10m
    # sequential BDD wall-clock (Windows spawns a process per scenario) is
    # irrelevant, so the per-service windows-bdd matrix split the per-PR job used
    # is collapsed back into a single full-workspace `cargo test --test bdd`.
    runs-on: windows-latest
    timeout-minutes: 60
    name: windows / nextest
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-stable
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      - name: cargo build
        run: cargo build --locked --workspace --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked --workspace --all-features --all-targets
      - name: cargo test --test bdd
        run: cargo test --locked --workspace --all-features --test bdd
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-windows
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
  coverage:
    # Cargo coverage — nightly safety net and a cross-check against the
    # now-canonical Bazel coverage. Uploads under `cargo-<pkg>` Codecov flags;
    # the canonical `<pkg>` per-service badges are driven by `bazel coverage`
    # after the cutover. See docs/plans/bazel-migration.md and .github/codecov.yml.
    runs-on: ubuntu-latest
    timeout-minutes: 45
    name: coverage
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install nightly (for coverage instrumentation)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-nightly
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # Two-phase coverage: build all binaries with instrumentation, then run
      # tests so spawned child processes also produce .profraw files. Uses
      # show-env (not `cargo llvm-cov nextest`) because BDD tests spawn service
      # binaries via find_binary(), which needs instrumented binaries in the
      # default target/debug/ directory.
      - name: Clean previous coverage artifacts
        run: cargo llvm-cov clean --workspace
      - name: Build with coverage instrumentation
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo build --locked --workspace --all-features --all-targets
      - name: Run tests with coverage
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo test --locked --workspace --all-features --all-targets
      - name: Upload OmniSim logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: omnisim-logs-coverage
          path: '**/bdd-infra-omnisim-logs/**'
          if-no-files-found: ignore
          retention-days: 14
      - name: Generate per-package coverage reports
        run: |
          source <(cargo llvm-cov show-env --sh)
          PACKAGES=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[].name')
          for pkg in $PACKAGES; do
            cargo llvm-cov report --locked --package "$pkg" --lcov \
              --output-path "lcov-${pkg}.info" 2>/dev/null || true
          done
      - name: Upload to codecov.io
        if: env.ACT != 'true'
        shell: bash
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          # Download the codecov CLI uploader
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x ./codecov
          COMMIT_SHA="${{ github.sha }}"
          echo "Uploading coverage for commit $COMMIT_SHA"
          # Upload per-package reports under `cargo-<pkg>` flags. Bazel coverage
          # owns the canonical `<pkg>` flags / per-service badges post-cutover; the
          # Cargo job keeps a parallel `cargo-<pkg>` set as a nightly cross-check.
          for f in lcov-*.info; do
            [ -f "$f" ] || continue
            pkg="${f#lcov-}"
            pkg="${pkg%.info}"
            echo "Uploading coverage for $pkg as flag cargo-$pkg"
            ./codecov upload-process \
              --file "$f" \
              --flag "cargo-$pkg" \
              --token "$CODECOV_TOKEN" \
              --git-service github \
              --commit-sha "$COMMIT_SHA" \
              || echo "Warning: upload failed for $pkg"
          done
