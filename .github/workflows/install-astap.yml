# Smoke-tests the .github/actions/install-astap composite action on every
# host OS we plan to support for ASTAP. The action downloads the upstream
# ASTAP CLI, exposes it via the ASTAP_BINARY env var, and the smoke step
# invokes it and asserts the banner string is present.
#
# This is the regression target ADR-005 references: each row in this
# matrix corresponds to one of the ADR's supported platforms — Linux
# x64, Linux ARM64 (Raspberry Pi 5), macOS Apple Silicon, and Windows
# x64. When a row goes red, operators following the same install
# recipe by hand would also see the breakage.
#
# Cadence: nightly cron + workflow_dispatch (manual) + paths-filtered
# PR/push. The workflow's only failure mode is an upstream SourceForge
# rotation that invalidates a SHA pin — that happens on the order of
# weeks-to-months, so paying for the matrix on every PR is mostly a
# deterministic replay. The paths filter keeps PR-time verification on
# changes that *can* affect the install (the action itself or this
# workflow), so a SHA-refresh PR still runs the smoke before merge.
# The nightly cron catches upstream rotations that arrive between
# install-touching PRs, and notify-on-failure opens a tracking issue
# so divergence is visible without trawling scheduled-workflow logs.
permissions:
  contents: read
on:
  schedule:
    # Daily at 04:30 UTC. Offset from plate-solver-smoke's 03:30 UTC so
    # the two install-astap consumers don't hit the same SourceForge
    # endpoint at the same minute.
    - cron: "30 4 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/actions/install-astap/**"
      - ".github/workflows/install-astap.yml"
  pull_request:
    paths:
      - ".github/actions/install-astap/**"
      - ".github/workflows/install-astap.yml"
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: install-astap
jobs:
  smoke:
    name: install-astap / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04-arm covers the Linux-ARM64 row of the action's
        # per-OS table — Raspberry Pi 5 is a documented plate-solver
        # target, so its SHA pin needs CI exercise like the others.
        # The Windows-ARM64 row remains pinned-but-unexercised (not a
        # currently supported target).
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Install ASTAP
        uses: ./.github/actions/install-astap
        # Skip the cache entirely: this workflow exists to catch
        # upstream install breakages, so we want a fresh upstream
        # download on every run AND no cache entry to save (which
        # would otherwise churn the repo cache quota with junk
        # entries that no other workflow ever reads). Production
        # callers leave use-cache at its default true.
        with:
          use-cache: "false"
      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ -z "${ASTAP_BINARY:-}" ]]; then
            echo "::error::ASTAP_BINARY not set by install-astap action"
            exit 1
          fi
          if [[ ! -x "$ASTAP_BINARY" ]]; then
            echo "::error::$ASTAP_BINARY is not an executable file"
            exit 1
          fi
          echo "Running $ASTAP_BINARY (no args; ASTAP prints banner and exits)"
          OUTPUT="$("$ASTAP_BINARY" 2>&1 || true)"
          echo "$OUTPUT"
          if ! grep -qi "astap" <<<"$OUTPUT"; then
            echo "::error::ASTAP banner not detected in output"
            exit 1
          fi
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:ASTAP_BINARY) {
            Write-Error "ASTAP_BINARY not set by install-astap action"
            exit 1
          }
          if (-not (Test-Path $env:ASTAP_BINARY)) {
            Write-Error "$env:ASTAP_BINARY does not exist"
            exit 1
          }
          Write-Host "Running $env:ASTAP_BINARY (no args; ASTAP prints banner and exits)"
          # Capture output as a single string so -match returns a boolean,
          # not a filtered array. Against an array, -notmatch returns the
          # non-matching elements; the array is non-empty whenever ASTAP
          # prints any usage line, so the if-branch fires even when the
          # banner is present.
          $output = (& $env:ASTAP_BINARY 2>&1) | Out-String
          Write-Host $output
          if ($output -notmatch '(?i)astap') {
            Write-Error "ASTAP banner not detected in output"
            exit 1
          }

  notify-on-failure:
    # Open or update a tracking issue when the nightly run fails so an
    # upstream SHA rotation surfaces without depending on someone reading
    # scheduled-workflow logs. Skipped on push, pull_request, and
    # workflow_dispatch so manual debugging runs and refresh-PR
    # verification don't churn an issue.
    needs: smoke
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `nightly: install-astap smoke failing (likely upstream SHA rotation)`;
            const body = [
              `The nightly install-astap smoke workflow failed.`,
              ``,
              `Most likely cause: ASTAP upstream rotated a SourceForge archive`,
              `without us refreshing the SHA pin in`,
              `\`.github/actions/install-astap/action.yml\`. See ADR-005`,
              `§"Pinned SHA-256 + refresh procedure" for the refresh steps.`,
              ``,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `This issue is opened automatically when the workflow fails on schedule.`,
              `It will be updated (rather than re-opened) on subsequent failures so the`,
              `notification cadence stays low. Close it once the underlying issue is`,
              `resolved; the next failure will reopen.`,
            ].join("\n");
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "install-astap-nightly",
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Failed again: run ${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["install-astap-nightly", "ci-flake"],
              });
            }
