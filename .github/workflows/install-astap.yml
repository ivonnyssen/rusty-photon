# Smoke-tests the .github/actions/install-astap composite action on every
# host OS we plan to support for ASTAP. The action downloads the upstream
# ASTAP CLI, exposes it via the ASTAP_BINARY env var, and the smoke step
# invokes it and asserts the banner string is present.
#
# This is the regression target ADR-005 references: each row in this
# matrix corresponds to one of the ADR's per-platform open questions
# (macOS Apple Silicon, Windows x64, Linux x64). When a row goes red,
# operators following the same install recipe by hand would also see
# the breakage.
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: install-astap
jobs:
  smoke:
    name: install-astap / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Install ASTAP
        uses: ./.github/actions/install-astap
        # Force a fresh upstream download on every run. This workflow
        # exists to catch upstream install breakages; a warm cache
        # would let regressions slip through unnoticed. Production
        # callers leave cache-key-suffix empty and benefit from cache
        # hits across runs.
        with:
          cache-key-suffix: ${{ github.run_id }}
      - name: Smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ -z "${ASTAP_BINARY:-}" ]]; then
            echo "::error::ASTAP_BINARY not set by install-astap action"
            exit 1
          fi
          if [[ ! -x "$ASTAP_BINARY" ]]; then
            echo "::error::$ASTAP_BINARY is not an executable file"
            exit 1
          fi
          echo "Running $ASTAP_BINARY (no args; ASTAP prints banner and exits)"
          OUTPUT="$("$ASTAP_BINARY" 2>&1 || true)"
          echo "$OUTPUT"
          if ! grep -qi "astap" <<<"$OUTPUT"; then
            echo "::error::ASTAP banner not detected in output"
            exit 1
          fi
      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:ASTAP_BINARY) {
            Write-Error "ASTAP_BINARY not set by install-astap action"
            exit 1
          }
          if (-not (Test-Path $env:ASTAP_BINARY)) {
            Write-Error "$env:ASTAP_BINARY does not exist"
            exit 1
          }
          Write-Host "Running $env:ASTAP_BINARY (no args; ASTAP prints banner and exits)"
          # Capture output as a single string so -match returns a boolean,
          # not a filtered array. Against an array, -notmatch returns the
          # non-matching elements; the array is non-empty whenever ASTAP
          # prints any usage line, so the if-branch fires even when the
          # banner is present.
          $output = (& $env:ASTAP_BINARY 2>&1) | Out-String
          Write-Host $output
          if ($output -notmatch '(?i)astap') {
            Write-Error "ASTAP banner not detected in output"
            exit 1
          }
