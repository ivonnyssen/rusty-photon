# Cargo quality gates: fmt, clippy, doc, hack (feature powerset), msrv.
#
# Post Bazel cutover (docs/plans/bazel-migration.md Phase 7): Bazel is the
# required PR gate, so these Cargo checks no longer run per-PR. They run on
# push-to-main (every merge — fast safety-net feedback) and nightly, catching
# anything the Bazel graph doesn't cover. Trigger on demand via
# workflow_dispatch.
permissions:
  contents: read
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
# If new code is pushed to a PR branch, then cancel in progress workflows for that PR. Ensures that
# we don't waste CI time, and returns results quicker https://github.com/jonhoo/rust-ci-conf/pull/5
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: check
jobs:
  fmt:
    runs-on: ubuntu-latest
    name: stable / fmt
    steps:
      - uses: actions/checkout@v5
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --check
  clippy:
    runs-on: ubuntu-latest
    name: ${{ matrix.toolchain }} / clippy
    strategy:
      fail-fast: false
      matrix:
        # Get early warning of new lints which are regularly introduced in beta channels.
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v5
      - name: Install ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-${{ matrix.toolchain }}
          save-if: ${{ matrix.toolchain == 'beta' }}
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
  hack:
    # cargo-hack checks combinations of feature flags to ensure that features are all additive
    # which is required for feature unification
    runs-on: ubuntu-latest
    name: ubuntu / stable / features
    steps:
      - uses: actions/checkout@v5
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: cargo install cargo-hack
        uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
          save-if: false
      # intentionally no target specifier; see https://github.com/jonhoo/rust-ci-conf/pull/4
      # --feature-powerset runs for every combination of features
      - name: cargo hack
        run: cargo hack --feature-powerset check
  msrv:
    # check that we can build using the declared minimum rust version
    runs-on: ubuntu-latest
    name: ubuntu / msrv
    steps:
      - uses: actions/checkout@v5
      - name: Install cargo-msrv
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-msrv
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
          save-if: false
      - name: Verify workspace MSRV
        run: |
          # cargo-msrv doesn't resolve [workspace.package].rust-version from
          # virtual workspace roots, so verify each member individually.
          cargo metadata --format-version 1 --no-deps | \
            jq -r '.packages[] | select(.rust_version) | .manifest_path' | \
          while read manifest; do
            echo "::group::$(basename $(dirname $manifest))"
            cargo msrv verify --manifest-path "$manifest"
            echo "::endgroup::"
          done
