# Lint & quality checks.
#
# PR-gating (every pull_request + push to main) — these stay required because the
# per-PR Bazel build/test gate (bazel.yml) does NOT run rustfmt or clippy:
#   - fmt:    rustfmt formatting              (required check: `stable / fmt`)
#   - clippy: stable clippy, `-D warnings`    (required check: `stable / clippy`)
#
# Nightly-only (schedule + push to main + workflow_dispatch; skipped on PRs via
# `if: github.event_name != 'pull_request'`):
#   - clippy (beta): early warning of new beta-channel lints
#   - hack:          cargo-hack feature-powerset (feature additivity)
#   - msrv:          verify the declared workspace MSRV
permissions:
  contents: read
# fmt + clippy run on every PR and on push to main. The heavier nightly jobs
# (beta clippy, hack, msrv) additionally run on a schedule + manual dispatch and
# are guarded below so they no-op on pull_request events.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # 06:00 UTC — offset from parity (06:45) and native (06:47) so the nightly
    # Cargo suites don't contend for the same hosted-runner pool minute.
    - cron: "0 6 * * *"
  workflow_dispatch:
# If new code is pushed to a PR branch, then cancel in progress workflows for that PR. Ensures that
# we don't waste CI time, and returns results quicker https://github.com/jonhoo/rust-ci-conf/pull/5
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: check
jobs:
  fmt:
    # Required PR gate. Bazel does not run rustfmt, so this stays on every PR.
    runs-on: ubuntu-latest
    name: stable / fmt
    steps:
      - uses: actions/checkout@v7
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --check
  clippy:
    runs-on: ubuntu-latest
    name: ${{ matrix.toolchain }} / clippy
    strategy:
      fail-fast: false
      matrix:
        # `stable / clippy` is a required PR gate, so it runs on every event.
        # `beta / clippy` (early warning of new beta lints) is nightly-only: on a
        # pull_request the matrix collapses to [stable] so PRs aren't gated on
        # beta; otherwise it expands to [stable, beta].
        toolchain: ${{ (github.event_name == 'pull_request') && fromJSON('["stable"]') || fromJSON('["stable", "beta"]') }}
    steps:
      - uses: actions/checkout@v7
      - name: Install ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-${{ matrix.toolchain }}
          save-if: ${{ matrix.toolchain == 'beta' }}
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
  hack:
    # cargo-hack checks combinations of feature flags to ensure that features are
    # all additive (required for feature unification). Bazel is the per-PR build
    # gate, so this runs nightly as a Cargo-only safety net. Skipped on PRs via
    # the event guard.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: ubuntu / stable / features
    steps:
      - uses: actions/checkout@v7
      - name: Install stable
        uses: dtolnay/rust-toolchain@stable
      - name: cargo install cargo-hack
        uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
          save-if: false
      # intentionally no target specifier; see https://github.com/jonhoo/rust-ci-conf/pull/4
      # --feature-powerset runs for every combination of features
      - name: cargo hack
        run: cargo hack --feature-powerset check
  msrv:
    # check that we can build using the declared minimum rust version.
    # Nightly-only (never gated PRs); skipped on PRs via the event guard.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    name: ubuntu / msrv
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-msrv
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-msrv
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
          save-if: false
      - name: Verify workspace MSRV
        run: |
          # cargo-msrv doesn't resolve [workspace.package].rust-version from
          # virtual workspace roots, so verify each member individually.
          #
          # Skip the four dual-homed FFI crates (qhyccd-rs + libqhyccd-sys, zwo-rs
          # + libzwo-sys): they declare lower, independent MSRVs that CANNOT be
          # verified in-workspace — the root `[profile.dev] debug =
          # "line-tables-only"` needs Rust >= 1.71 and the shared Cargo.lock pins
          # newest deps. publish-readiness.yml verifies them OUT of the workspace
          # instead. The skip set = every crate carrying
          # [package.metadata.publish-readiness] plus its declared `sys-crate`.
          meta="$(cargo metadata --format-version 1 --no-deps)"
          skip="$(echo "$meta" | jq -c '[.packages[]
                  | select(.metadata["publish-readiness"])
                  | (.name, .metadata["publish-readiness"]["sys-crate"])] | unique')"
          echo "Skipping (verified out-of-workspace by publish-readiness.yml): $(echo "$skip" | jq -r 'join(", ")')"
          echo "$meta" | jq -r --argjson skip "$skip" \
            '.packages[] | select(.rust_version)
             | select(.name as $n | ($skip | index($n)) | not)
             | .manifest_path' | \
          while read manifest; do
            echo "::group::$(basename $(dirname $manifest))"
            cargo msrv verify --manifest-path "$manifest"
            echo "::endgroup::"
          done
