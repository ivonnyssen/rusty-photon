# Run scheduled (rolling) jobs on a nightly basis, as your crate may break independently of any
# given PR. E.g., updates to rust nightly and updates to this crates dependencies. See check.yml for
# information about how the concurrency cancellation and workflow triggering works
permissions:
  contents: read
on:
  push:
    branches: [main]
  schedule:
    - cron: "7 7 * * *"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: rolling
jobs:
  # https://twitter.com/mycoliza/status/1571295690063753218
  nightly:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Explicit timeout — see test.yml's plan job. The `cargo test --test bdd`
    # step intermittently hangs; without a cap GitHub's 360 min default let
    # the `scheduled / ubuntu / beta*` jobs burn a full 6 h. 30 min is ~2x
    # the ~12-15 min healthy run.
    timeout-minutes: 30
    name: scheduled / ubuntu / nightly
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install Pebble
        uses: ./.github/actions/install-pebble
      # zwo-camera + the vendored zwo-rs/libzwo-sys link the native ZWO SDK; the
      # full-workspace build below needs it on the link path (provision, don't
      # exclude).
      - name: Install ZWO SDK
        uses: ./.github/actions/install-zwo-sdk
      - name: Install nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-nightly
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # qhy-camera links the proprietary QHYCCD SDK unconditionally; the
      # --workspace build below compiles it, so install the SDK + libusb.
      - name: Install libusb (qhy-camera)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libusb-1.0-0-dev
          version: 1.0
      - name: Install QHYCCD SDK (qhy-camera)
        uses: ivonnyssen/qhyccd-sdk-install@v4
        with:
          version: "26.06.04"
      # Pre-build all service binaries so BDD tests find cached binaries
      - name: cargo build --workspace
        run: cargo build --locked --workspace --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked --all-features --all-targets
      # BDD tests use custom harness (bdd_main!) incompatible with nextest
      - name: cargo test --test bdd
        run: cargo test --locked --all-features --test bdd
  discover-miri:
    if: github.event_name != 'pull_request'
    name: Discover Miri Services
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      services: ${{ steps.find.outputs.services }}
      has_services: ${{ steps.find.outputs.has_services }}
    steps:
      - uses: actions/checkout@v7

      - name: Find Miri services
        id: find
        run: |
          # Get all packages with miri metadata and build JSON array
          SERVICES=$(cargo metadata --format-version 1 --no-deps 2>/dev/null | \
            jq -c '[.packages[] | select(.metadata.miri.command) | {name: .name, command: .metadata.miri.command}]')

          echo "services=$SERVICES" >> $GITHUB_OUTPUT

          # Check if we have any services
          COUNT=$(echo "$SERVICES" | jq 'length')
          if [ "$COUNT" -gt 0 ]; then
            echo "has_services=true" >> $GITHUB_OUTPUT
            echo "Found $COUNT Miri services:"
            echo "$SERVICES" | jq -r '.[] | "  - \(.name): \(.command)"'
          else
            echo "has_services=false" >> $GITHUB_OUTPUT
            echo "No Miri services found"
          fi

  miri:
    if: github.event_name != 'pull_request' && needs.discover-miri.outputs.has_services == 'true'
    needs: discover-miri
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: scheduled / ubuntu / miri / ${{ matrix.service.name }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover-miri.outputs.services) }}
    steps:
      - uses: actions/checkout@v7
      - run: |
          echo "NIGHTLY=nightly-$(curl -s https://rust-lang.github.io/rustup-components-history/x86_64-unknown-linux-gnu/miri)" >> "$GITHUB_ENV"
      - name: Install ${{ env.NIGHTLY }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.NIGHTLY }}
          components: miri
      - name: cargo clean (avoid stale artifacts)
        run: cargo clean
      - name: cargo miri test
        run: ${{ matrix.service.command }}
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
  # https://twitter.com/alcuadrado/status/1571291687837732873
  update:
    if: github.event_name != 'pull_request'
    # This action checks that updating the dependencies of this crate to the latest available that
    # satisfy the versions in Cargo.toml does not break this crate. This is important as consumers
    # of this crate will generally use the latest available crates. This is subject to the standard
    # Cargo semver rules (i.e cargo does not update to a new major version unless explicitly told
    # to).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: scheduled / ubuntu / beta / updated
    # There's no point running this if no Cargo.lock was checked in in the first place, since we'd
    # just redo what happened in the regular test job. Unfortunately, hashFiles only works in if on
    # steps, so we repeat it.
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install Pebble
        uses: ./.github/actions/install-pebble
      # zwo-camera + the vendored zwo-rs/libzwo-sys link the native ZWO SDK; the
      # full-workspace build below needs it on the link path (provision, don't
      # exclude).
      - name: Install ZWO SDK
        uses: ./.github/actions/install-zwo-sdk
      - name: Install beta
        if: hashFiles('Cargo.lock') != ''
        uses: dtolnay/rust-toolchain@beta
      - name: Install cargo-nextest
        if: hashFiles('Cargo.lock') != ''
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-beta
      - name: cargo update
        if: hashFiles('Cargo.lock') != ''
        run: cargo update
      # qhy-camera links the proprietary QHYCCD SDK unconditionally; the
      # --workspace build below compiles it, so install the SDK + libusb.
      - name: Install libusb (qhy-camera)
        if: hashFiles('Cargo.lock') != ''
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libusb-1.0-0-dev
          version: 1.0
      - name: Install QHYCCD SDK (qhy-camera)
        if: hashFiles('Cargo.lock') != ''
        uses: ivonnyssen/qhyccd-sdk-install@v4
        with:
          version: "26.06.04"
      # Pre-build all service binaries so BDD tests find cached binaries
      - name: cargo build --workspace
        if: hashFiles('Cargo.lock') != ''
        run: cargo build --locked --workspace --all-features --all-targets
      - name: cargo nextest run
        if: hashFiles('Cargo.lock') != ''
        run: cargo nextest run --locked --all-features --all-targets
        env:
          RUSTFLAGS: -D deprecated
      # BDD tests use custom harness (bdd_main!) incompatible with nextest
      - name: cargo test --test bdd
        if: hashFiles('Cargo.lock') != ''
        run: cargo test --locked --all-features --test bdd
        env:
          RUSTFLAGS: -D deprecated
  beta:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: scheduled / ubuntu / beta
    steps:
      - uses: actions/checkout@v7
      - name: Install ASCOM OmniSim
        uses: ./.github/actions/install-omnisim
      - name: Install Pebble
        uses: ./.github/actions/install-pebble
      # zwo-camera + the vendored zwo-rs/libzwo-sys link the native ZWO SDK; the
      # full-workspace build below needs it on the link path (provision, don't
      # exclude).
      - name: Install ZWO SDK
        uses: ./.github/actions/install-zwo-sdk
      - name: Install beta
        uses: dtolnay/rust-toolchain@beta
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-beta
      - name: cargo generate-lockfile
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile
      # qhy-camera links the proprietary QHYCCD SDK unconditionally; the
      # --workspace build below compiles it, so install the SDK + libusb.
      - name: Install libusb (qhy-camera)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libusb-1.0-0-dev
          version: 1.0
      - name: Install QHYCCD SDK (qhy-camera)
        uses: ivonnyssen/qhyccd-sdk-install@v4
        with:
          version: "26.06.04"
      # Pre-build all service binaries so BDD tests find cached binaries
      - name: cargo build --workspace
        run: cargo build --locked --workspace --all-features --all-targets
      - name: cargo nextest run
        run: cargo nextest run --locked --all-features --all-targets
      # BDD tests use custom harness (bdd_main!) incompatible with nextest
      - name: cargo test --test bdd
        run: cargo test --locked --all-features --test bdd
      # https://github.com/rust-lang/cargo/issues/6669
      - name: cargo test --doc
        run: cargo test --locked --all-features --doc

  notify-on-failure:
    # Open or update a tracking issue when the scheduled rolling run fails so
    # nightly/beta toolchain breaks, Miri regressions, and dependency-update
    # drift surface without depending on someone reading scheduled-workflow
    # logs. Skipped on push, pull_request, and workflow_dispatch so manual
    # debugging runs don't churn an issue.
    needs: [nightly, discover-miri, miri, update, beta]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - name: Open or update tracking issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = `nightly: rolling workflow failing`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The nightly rolling workflow failed on at least one job.`,
              ``,
              `Likely causes: a Rust nightly or beta toolchain regression, a Miri`,
              `finding (undefined behavior or isolation violation), or a transitive`,
              `dependency update (\`cargo update\`) breaking the build against beta.`,
              `Inspect the failed jobs in the linked run to see which one is red.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `This issue was opened automatically by a scheduled run that`,
              `failed. While it stays open, each subsequent scheduled failure`,
              `is appended here as a comment linking its own run. Closing it`,
              `marks the failure handled — it is never re-opened; the next`,
              `scheduled failure opens a fresh issue instead.`,
            ].join("\n");
            // Search only OPEN issues. While a tracking issue is open each
            // failure appends a comment; once it is closed the failure is
            // considered handled, so the next scheduled failure opens a
            // fresh issue rather than resurrecting the closed one.
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "rolling-nightly",
            });
            const match = existing.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Failed again — run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["rolling-nightly", "ci-flake"],
              });
            }
