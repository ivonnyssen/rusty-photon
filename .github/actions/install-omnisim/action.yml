name: Install ASCOM OmniSim
description: Download and install ASCOM Alpaca Simulators (OmniSim) for BDD tests

inputs:
  repo:
    description: GitHub repo to download OmniSim release assets from
    required: false
    # Patched fork carrying the issue #326 TelescopeHardware locking fixes
    # and the issue #467 --multi-instance flag.
    # Set to "ASCOMInitiative/ASCOM.Alpaca.Simulators" to revert to upstream.
    default: "ivonnyssen/ASCOM.Alpaca.Simulators"
  version:
    description: OmniSim release version
    required: false
    default: "v0.5.0-467.1"

runs:
  using: composite
  steps:
    # Per-OS table. SHA-256 values are pinned against the OmniSim
    # release assets named below. They currently point at the patched
    # fork ivonnyssen/ASCOM.Alpaca.Simulators (default `repo` input,
    # tag v0.5.0-467.1 = v0.5.0-326.4 + the --multi-instance flag).
    #
    # 467.1 (rusty-photon #467) adds `--multi-instance`: skips upstream's
    # machine-global single-instance guard (named Mutex + named-pipe command
    # server) so bdd-infra can run one private OmniSim per test process —
    # the enabler for parallel OmniSim BDD suites and rp:bdd sharding.
    # bdd-infra ALWAYS passes the flag now, so this pin is a hard floor:
    # an older binary exits at startup whenever another instance is running.
    #
    # The carried 326.x series fixes TelescopeHardware slew bugs behind the
    # center_on_target hang/flake (ivonnyssen/rusty-photon #326, #319):
    # 326.1 locked the slew-engine writers + IsSlewing/RA/Dec readers;
    # 326.2 adds the AtPark/SlewState readers (closes the park-poll hang);
    # 326.3 disposes the prior slew timer on Init() and resets the slew
    # state under hardwareLock; 326.4 closes the center_on_target IsSlewing
    # wedge proper (issue #319). ConformU-clean vs upstream.
    #
    # Reverting to upstream (repo=ASCOMInitiative/..., version=v0.5.0) is no
    # longer SHA-refresh-only: upstream has no --multi-instance, so the
    # bdd-infra spawn path would have to be reverted too. Bumping either
    # input requires refreshing the SHAs — the verify step fails closed on
    # any mismatch. Same shape and supply-chain reasoning as install-astap.
    - name: Determine asset name and pinned SHA-256
      id: asset
      shell: bash
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)
            ASSET="ascom.alpaca.simulators.linux-x64.tar.xz"
            SHA256="68cca3f2b326579a71e02e70fd767987253fd7a700132cf23bd2fa5dace363e8"
            ;;
          Linux-ARM64)
            ASSET="ascom.alpaca.simulators.linux-aarch64.tar.xz"
            SHA256="6c6dc32479b5a10e17b9a20b831940ccfb54e80576bd4946e2c1056ba432f1aa"
            ;;
          macOS-ARM64)
            ASSET="ascom.alpaca.simulators.macos-arm64.zip"
            SHA256="3ab44c0abfa82c556f73da6c85c9d727956b67e6d66a9ae30996069ba168b7d0"
            ;;
          macOS-X64)
            ASSET="ascom.alpaca.simulators.macos-x64.zip"
            SHA256="3b01f427f875c40e6ea4b5603e568ef9615ceea57e89f12c803449031bf8eff4"
            ;;
          Windows-X64)
            ASSET="ascom.alpaca.simulators.windows-x64.zip"
            SHA256="ff2d558e661ce5d465da2c345be16164ba0ddea3837ea7f68ff76073427995b6"
            ;;
          *)
            echo "::error::Unsupported platform: ${{ runner.os }}-${{ runner.arch }}"
            exit 1
            ;;
        esac
        {
          echo "asset=$ASSET"
          echo "sha256=$SHA256"
          # Pinned SHA participates in the cache key so a SHA bump
          # invalidates any previously-cached download.
          echo "cache-key=omnisim-${{ inputs.version }}-$ASSET-$SHA256"
        } >> "$GITHUB_OUTPUT"

    - name: Cache OmniSim binary
      id: cache
      uses: actions/cache@v5
      with:
        path: omnisim
        key: ${{ steps.asset.outputs.cache-key }}

    - name: Download OmniSim
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p omnisim
        URL="https://github.com/${{ inputs.repo }}/releases/download/${{ inputs.version }}/${{ steps.asset.outputs.asset }}"
        echo "Downloading $URL"
        curl -fsSL -o "omnisim/${{ steps.asset.outputs.asset }}" "$URL"

    - name: Verify OmniSim checksum
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        EXPECTED="${{ steps.asset.outputs.sha256 }}"
        # Portable SHA-256 across runners: shasum is on every macOS, sha256sum is on Linux + Git Bash.
        if command -v sha256sum >/dev/null; then
          ACTUAL=$(sha256sum "omnisim/${{ steps.asset.outputs.asset }}" | awk '{print $1}')
        else
          ACTUAL=$(shasum -a 256 "omnisim/${{ steps.asset.outputs.asset }}" | awk '{print $1}')
        fi
        if [[ "$ACTUAL" != "$EXPECTED" ]]; then
          echo "::error::SHA-256 mismatch for ${{ steps.asset.outputs.asset }}"
          echo "  expected: $EXPECTED"
          echo "  actual:   $ACTUAL"
          echo "Upstream may have rotated the asset (or inputs.version was bumped without refreshing the SHA table)."
          exit 1
        fi
        echo "SHA-256 match: $ACTUAL"

    - name: Extract OmniSim
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        ASSET="${{ steps.asset.outputs.asset }}"
        TMPDIR="omnisim-extract"
        mkdir -p "$TMPDIR"
        if [[ "$ASSET" == *.tar.xz ]]; then
          tar xf "omnisim/$ASSET" -C "$TMPDIR"
        elif [[ "$ASSET" == *.zip ]]; then
          unzip -o "omnisim/$ASSET" -d "$TMPDIR"
        fi
        # Archives contain a subdirectory named ascom.alpaca.simulators.* — flatten into omnisim/
        # macOS zips also include a __MACOSX metadata dir, so match by name
        SUBDIR=$(ls -d "$TMPDIR"/ascom.alpaca.simulators.*/ | head -1)
        rm -rf omnisim
        mv "$SUBDIR" omnisim
        rm -rf "$TMPDIR"

    - name: Set permissions (Linux/macOS)
      if: runner.os != 'Windows'
      shell: bash
      run: chmod +x omnisim/ascom.alpaca.simulators

    - name: Remove quarantine (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: xattr -d com.apple.quarantine omnisim/ascom.alpaca.simulators 2>/dev/null || true

    - name: Add to PATH
      shell: bash
      run: echo "${{ github.workspace }}/omnisim" >> "$GITHUB_PATH"

    # Export the absolute binary path so consumers (notably Bazel's
    # `--test_env=OMNISIM_PATH` and `bdd_infra::rp_harness::OmniSimHandle`,
    # whose binary lookup lives in
    # `crates/bdd-infra/src/rp_harness/omnisim.rs`) can locate OmniSim
    # without relying on the runner PATH.
    #
    # Why this matters for Bazel: forwarding the runner's full PATH into
    # test actions via `--test_env=PATH` makes the host PATH part of every
    # test action's cache key. On Windows the runner exposes different
    # PATH entries on `pull_request` vs `push` events, which silently
    # invalidates cache entries written by main pushes. A pinned
    # `OMNISIM_PATH=<workspace>/omnisim/<binary>` is stable across event
    # types, so Bazel cache hits work the same as on Linux/macOS. See
    # docs/decisions/004-* for the analysis.
    - name: Export OMNISIM_PATH
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          BIN="${{ github.workspace }}/omnisim/ascom.alpaca.simulators.exe"
        else
          BIN="${{ github.workspace }}/omnisim/ascom.alpaca.simulators"
        fi
        echo "OMNISIM_PATH=$BIN" >> "$GITHUB_ENV"
