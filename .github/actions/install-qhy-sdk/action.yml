name: Install QHYCCD SDK
description: |
  Provision the proprietary QHYCCD SDK (pinned 25.09.29) + libusb-1.0 dev
  headers so libqhyccd-sys (links = "qhyccd") can link the qhy-camera package.

  IMPORTANT: on Linux `libqhyccd-sys` 0.1.4's build.rs hard-codes the linker
  search path `cargo:rustc-link-search=native=/usr/local/lib` and emits
  `static=qhyccd` + `dylib=usb-1.0` + `dylib=stdc++` — so this action installs
  the SDK into `/usr/local` (lib + include) and runs ldconfig, rather than
  exporting env vars. The SDK blob is pulled from an authenticated internal
  build-cache tier (NOT the anonymous-read public mirror cache.rustyphoton.space)
  because its redistribution terms forbid public hosting. Mirrors install-omnisim's
  cache→download→verify→extract shape; the only structural differences are the
  token-gated source and the `/usr/local` install.

  Before this can run in CI, the caller must supply:
    - `cache-base-url`  : the internal tier host (keep the real host out of the
                          repo — pass via a repo variable, e.g. vars.QHY_SDK_CACHE_BASE).
    - `cache-token`     : a Bearer token (repo secret QHY_SDK_CACHE_TOKEN).
    - the per-arch SHA-256 pins below (compute from the 25.09.29 tarballs).

inputs:
  version:
    description: QHYCCD SDK version (the version qhyccd-rs 0.1.9 targets).
    required: false
    default: "25.09.29"
  cache-base-url:
    description: >
      Base URL of the authenticated internal blob tier holding the SDK tarballs
      (NOT cache.rustyphoton.space). Pass from a repo variable.
    required: true
  cache-token:
    description: Bearer token for the authenticated cache tier (a repo secret).
    required: true

runs:
  using: composite
  steps:
    # libusb-1.0 dev headers + stdc++ — required by libqhyccd-sys's
    # dylib=usb-1.0 / dylib=stdc++ link directives.
    - name: Install system libraries (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if command -v apt-get >/dev/null; then
          sudo apt-get update -qq
          sudo apt-get install -y -qq libusb-1.0-0-dev
        elif command -v dnf >/dev/null; then
          sudo dnf install -y libusbx-devel
        fi

    - name: Determine SDK asset and pinned SHA-256
      id: asset
      shell: bash
      run: |
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)
            ASSET="sdk_linux64_${{ inputs.version }}.tar.bz2"
            # TODO: pin the real SHA-256 of the x86_64 SDK tarball.
            SHA256="<PIN-SHA256-x86_64>"
            ;;
          Linux-ARM64)
            ASSET="sdk_linux_arm64_${{ inputs.version }}.tar.bz2"
            # TODO: pin the real SHA-256 of the aarch64 SDK tarball.
            SHA256="<PIN-SHA256-aarch64>"
            ;;
          *)
            echo "::error::QHYCCD SDK provisioning supports Linux x86_64/arm64 only (got ${{ runner.os }}-${{ runner.arch }})"
            exit 1
            ;;
        esac
        {
          echo "asset=$ASSET"
          echo "sha256=$SHA256"
          echo "cache-key=qhy-sdk-${{ inputs.version }}-$ASSET-$SHA256"
        } >> "$GITHUB_OUTPUT"

    - name: Cache QHYCCD SDK
      id: cache
      uses: actions/cache@v5
      with:
        path: qhy-sdk
        key: ${{ steps.asset.outputs.cache-key }}

    - name: Download QHYCCD SDK (authenticated tier)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p qhy-sdk
        URL="${{ inputs.cache-base-url }}/${{ inputs.version }}/${{ steps.asset.outputs.asset }}"
        echo "Downloading QHYCCD SDK from the authenticated tier"
        curl -fsSL --retry 3 --retry-delay 2 \
          -H "Authorization: Bearer ${{ inputs.cache-token }}" \
          -o "qhy-sdk/${{ steps.asset.outputs.asset }}" "$URL"

    - name: Verify SDK checksum
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        EXPECTED="${{ steps.asset.outputs.sha256 }}"
        ACTUAL=$(sha256sum "qhy-sdk/${{ steps.asset.outputs.asset }}" | awk '{print $1}')
        if [[ "$ACTUAL" != "$EXPECTED" ]]; then
          echo "::error::SHA-256 mismatch for ${{ steps.asset.outputs.asset }} (expected $EXPECTED, got $ACTUAL)"
          exit 1
        fi
        echo "SHA-256 match: $ACTUAL"

    - name: Extract SDK
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        tar xf "qhy-sdk/${{ steps.asset.outputs.asset }}" -C qhy-sdk

    # Install into /usr/local so libqhyccd-sys's hard-coded
    # `-L /usr/local/lib` + `static=qhyccd` link directives resolve.
    - name: Install SDK into /usr/local
      shell: bash
      run: |
        # The vendor tarball nests the payload under .../usr/local/{lib,include}.
        LIB_SRC=$(find qhy-sdk -type f -name 'libqhyccd.a' -printf '%h\n' | head -n1)
        if [[ -z "$LIB_SRC" ]]; then
          echo "::error::libqhyccd.a not found in the extracted SDK"; exit 1
        fi
        INC_SRC=$(find qhy-sdk -type f -name 'qhyccd.h' -printf '%h\n' | head -n1)
        sudo cp -a "$LIB_SRC"/libqhyccd.* /usr/local/lib/
        if [[ -n "$INC_SRC" ]]; then
          sudo cp -a "$INC_SRC"/*.h /usr/local/include/
        fi
        sudo ldconfig
        echo "Installed QHYCCD SDK into /usr/local/lib"
