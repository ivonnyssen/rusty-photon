# ref: https://docs.codecov.com/docs/codecovyml-reference
coverage:
  # Hold ourselves to a high bar
  range: 85..100
  round: down
  precision: 1
  status:
    # ref: https://docs.codecov.com/docs/commit-status
    project:
      default:
        # Avoid false negatives
        threshold: 1%
    patch:
      default:
        # Allow small patch-coverage drops from natural noise. Without
        # this, the default zero-tolerance patch check fails any PR
        # whose changed-line coverage is below the project average,
        # even by a fraction of a percent.
        threshold: 1%

# Test files, mock binaries, and test helper binaries aren't important for coverage
ignore:
  - "tests"
  - "**/bin/mock_*.rs"
  - "**/bin/test_*.rs"

# Make comments less noisy
comment:
  layout: "files"
  require_changes: true
