# ref: https://docs.codecov.com/docs/codecovyml-reference
coverage:
  # Hold ourselves to a high bar
  range: 85..100
  round: down
  precision: 1
  status:
    # ref: https://docs.codecov.com/docs/commit-status
    project:
      default:
        # Avoid false negatives
        threshold: 1%

# Test files, mock binaries, test helper binaries, and examples aren't important
# for coverage. Examples are built-but-never-run: `cargo build --all-targets`
# (the Cargo coverage job) instruments services/rp/examples/*.rs but no test
# executes them, so they would otherwise sit at 0% in the Cargo `rp` denominator
# and drag that flag down — while the Bazel job's split_lcov routes them to `rp`
# too. Ignoring `**/examples/**` drops them from BOTH reports symmetrically so
# the cargo-vs-bazel per-package comparison is apples-to-apples. See
# docs/plans/bazel-migration.md "Coverage under Bazel".
ignore:
  - "tests"
  - "**/bin/mock_*.rs"
  - "**/bin/test_*.rs"
  - "**/examples/**"
  # Vendored qhyccd-rs crate: `mocks.rs` is a `#[cfg(test)]`-only FFI mock helper
  # (never shipped), and `src/bin/*` are manual hardware-probe binaries that
  # require a physical camera, so they are built-but-never-run by tests (same as
  # examples above). Both would otherwise sit at 0% and drag qhyccd-rs coverage.
  - "**/qhyccd-rs/src/mocks.rs"
  - "**/qhyccd-rs/src/bin/*.rs"

# Make comments less noisy
comment:
  layout: "files"
  require_changes: true

# Flag carryforward (ref: https://docs.codecov.com/docs/carryforward-flags).
# When a commit does not re-upload a given flag, Codecov backfills that flag's
# last-known coverage so the per-service badges stay populated instead of
# flipping to "unknown". Two jobs depend on this:
#   * Cargo (test.yml): narrows uploads to the changed packages via cargo-rail,
#     so most commits upload only a subset of flags.
#   * Bazel shadow (bazel-coverage.yml): uploads every bazel-<pkg> flag each run,
#     but a run that fails or hits its time cap uploads nothing for that commit
#     (historically the rp:bdd post-scenario park cancelled ~half of these at the
#     60-min wall — now fixed; see docs/plans/bazel-migration.md).
# Declaring carryforward here makes it explicit and version-controlled for every
# flag, and — critically — applies it to the bazel-<pkg> shadow flags, which had
# no carried baseline and rendered "unknown" on every commit whose bazel-coverage
# run was cancelled. Carryforward is applied when an upload is processed, so the
# badges fill in on the next main commit that uploads, not retroactively.
# Note: the project status (above) has no `flags:` filter, so carried-forward
# bazel-<pkg> data now enters its merged report; this cannot regress the gate
# (Codecov merges flags by union, and bazel-* covers a subset of the Cargo lines,
# so the merged % only stays equal or rises). See docs/plans/bazel-migration.md.
flag_management:
  default_rules:
    carryforward: true
