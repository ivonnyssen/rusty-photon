# ref: https://docs.codecov.com/docs/codecovyml-reference
coverage:
  # Hold ourselves to a high bar
  range: 85..100
  round: down
  precision: 1
  status:
    # ref: https://docs.codecov.com/docs/commit-status
    project:
      default:
        # Avoid false negatives
        threshold: 1%

# Test files and mock binaries aren't important for coverage
ignore:
  - "tests"
  - "**/bin/mock_*.rs"

# Per-service flags for README coverage badges
flags:
  rp:
    paths: [services/rp/]
  filemonitor:
    paths: [services/filemonitor/]
  ppba-driver:
    paths: [services/ppba-driver/]
  qhy-focuser:
    paths: [services/qhy-focuser/]
  phd2-guider:
    paths: [services/phd2-guider/]
  sentinel:
    paths: [services/sentinel/]

# Make comments less noisy
comment:
  layout: "files"
  require_changes: true
