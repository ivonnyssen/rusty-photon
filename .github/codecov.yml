# ref: https://docs.codecov.com/docs/codecovyml-reference
coverage:
  # Hold ourselves to a high bar
  range: 85..100
  round: down
  precision: 1
  status:
    # ref: https://docs.codecov.com/docs/commit-status
    project:
      default:
        # Avoid false negatives
        threshold: 1%

# Test files, mock binaries, test helper binaries, and examples aren't important
# for coverage. `bazel coverage` (the sole coverage source) only instruments
# first-party library / binary / test targets, and examples have no Bazel targets,
# so they don't appear in the report; the `**/examples/**` ignore is kept as a
# guard in case example targets are ever added. See docs/plans/archive/bazel-migration.md
# "Coverage under Bazel".
ignore:
  - "tests"
  - "**/bin/mock_*.rs"
  - "**/bin/test_*.rs"
  - "**/examples/**"

# Make comments less noisy
comment:
  layout: "files"
  require_changes: true

# Flag carryforward (ref: https://docs.codecov.com/docs/carryforward-flags).
# When a commit does not re-upload a given flag, Codecov backfills that flag's
# last-known coverage so the per-service badges stay populated instead of
# flipping to "unknown". `bazel coverage` (bazel-coverage.yml) is the sole
# coverage uploader — it uploads every canonical `<pkg>` flag each run — so
# carryforward only matters when a run is cancelled or fails (e.g. it hits its
# time cap): the badges keep their last-known value until the next successful run.
# Declaring it here makes that explicit and version-controlled for every flag.
flag_management:
  default_rules:
    carryforward: true
