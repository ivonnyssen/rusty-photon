[package]
name = "dsd-fp2"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ASCOM Alpaca CoverCalibrator driver for the Deep Sky Dad Flat Panel 2 (FP2)"

[features]
default = []
mock = []  # Enables mock hardware for testing without a real serial port
# `conformu` enables `mock` because the integration test launches the binary
# with a mock serial port (`/dev/mock`) driven from the test config. Keeping
# them coupled means a single `--features conformu` flag is enough to build
# and run the test.
conformu = ["mock"]

[lints]
workspace = true

[package.metadata.conformu]
command = "cargo test -p dsd-fp2 --features conformu --test conformu_integration -- --nocapture"

[dependencies]
ascom-alpaca = { workspace = true, features = ["server", "cover_calibrator", "client"] }
tokio = { workspace = true }
tokio-serial = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
derive_more = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
rusty-photon-shared-transport = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-driver = { workspace = true }
rp-tls = { workspace = true }
rp-auth = { workspace = true }
axum = { workspace = true }
directories = { workspace = true }
tempfile = { workspace = true }

[dev-dependencies]
tracing-subscriber = { workspace = true }
tokio-test = { workspace = true }
cucumber = { workspace = true }
reqwest = { workspace = true }
bdd-infra = { workspace = true, features = ["conformu"] }

[[test]]
name = "bdd"
harness = false
