[package]
name = "sky-survey-camera"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ASCOM Alpaca Camera simulator backed by NASA SkyView"

[features]
default = []
mock = []
# `conformu` enables `mock` because the integration test imports
# `mock::synthetic_fits` for the in-process stub backend. Keeping
# them coupled means a single `--features conformu` flag is enough to
# build and run the test.
conformu = ["mock"]

[lints]
workspace = true

[dependencies]
ascom-alpaca = { workspace = true, features = ["server", "camera", "client", "telescope", "rotator"] }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
derive_more = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
axum = { workspace = true }
reqwest = { workspace = true }
ndarray = { workspace = true }
parking_lot = { workspace = true }
rp-auth = { workspace = true }
rp-fits = { workspace = true }
rusty-photon-tls = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-server-config = { workspace = true }
rusty-photon-driver = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
tempfile = { workspace = true }
base64 = { workspace = true }

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }

[package.metadata.conformu]
command = "cargo test -p sky-survey-camera --features conformu --test conformu_integration -- --nocapture"

[package.metadata.deb]
name = "rusty-photon-sky-survey-camera"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "ASCOM Alpaca Camera simulator that renders frames from NASA SkyView imagery."
section = "science"
priority = "optional"
# $auto = dpkg-shlibdeps (needs a Debian build host); adduser is used by postinst.
depends = "$auto, adduser"
assets = [
    ["target/release/sky-survey-camera", "usr/bin/rusty-photon-sky-survey-camera", "755"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-sky-survey-camera"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-sky-survey-camera"
summary = "ASCOM Alpaca Camera simulator backed by NASA SkyView"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/sky-survey-camera", dest = "/usr/bin/rusty-photon-sky-survey-camera", mode = "755" },
    { source = "pkg/rusty-photon-sky-survey-camera.service", dest = "/usr/lib/systemd/system/rusty-photon-sky-survey-camera.service", mode = "644" },
]
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon /var/lib/rusty-photon/.config /var/lib/rusty-photon/.config/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
if [ "$1" -eq 1 ]; then
    systemctl enable rusty-photon-sky-survey-camera.service
fi
"""
# rpm scriptlet arg $1 = package instances remaining after the operation.
# On upgrade the old %preun runs AFTER the new %post, so an unguarded
# stop/disable would take the service down right after every upgrade.
# Guarded: enable fires on first install only (upgrades keep the
# operator's enable/disable choice), stop/disable on final erase only,
# and try-restart hands a running service over to the upgraded binary
# (the deb restart-after-upgrade equivalent).
pre_uninstall_script = """
if [ "$1" -eq 0 ]; then
    systemctl stop rusty-photon-sky-survey-camera.service || true
    systemctl disable rusty-photon-sky-survey-camera.service || true
fi
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = """
systemctl daemon-reload
if [ "$1" -ge 1 ]; then
    systemctl try-restart rusty-photon-sky-survey-camera.service || true
fi
"""
require-sh = true

[dev-dependencies]
tracing-subscriber = { workspace = true }
bdd-infra = { workspace = true, features = ["conformu", "tls-auth"] }
cucumber = { workspace = true }
tempfile = { workspace = true }
tokio-test = { workspace = true }
proptest = { workspace = true }
mockall = { workspace = true }
cargo-husky = { workspace = true }

[[test]]
name = "bdd"
harness = false
