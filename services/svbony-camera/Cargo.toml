[package]
name = "svbony-camera"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ASCOM Alpaca Camera driver for SVBony hardware"

[features]
default = []
# Forwards to `svbony-rs/simulation`: a hardware-free, in-Rust simulated
# camera for development and tests. As in zwo-camera/qhy-camera this removes
# the *camera*, NOT the SDK *link* — the native SVBony SDK is still linked.
# See the README and docs/services/svbony-camera.md "Native dependency &
# build gating".
simulation = ["svbony-rs/simulation"]
# Cross-driver alias for `simulation` (the workspace-wide test-backend name).
mock = ["simulation"]
# `conformu` enables `mock`, matching the sibling camera services' shape.
conformu = ["mock"]

[lints]
workspace = true

[dependencies]
# `client` is NOT enabled here — the production server never builds an
# Alpaca client; only the BDD harness does, so it lives in
# [dev-dependencies] below.
ascom-alpaca = { workspace = true, features = ["server", "camera"] }
# `svbony-rs` is a DIRECT PATH dependency, not promoted into the root
# Cargo.toml's `[workspace.dependencies]`: per CLAUDE.md Rule 10, promotion
# happens only once a second consumer appears, and `svbony-camera` is the
# first and (for now) only one.
svbony-rs = { path = "../../crates/svbony-rs" }
rp-auth = { workspace = true }
rusty-photon-tls = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-doctor-checks = { workspace = true }
rusty-photon-server-config = { workspace = true }
rusty-photon-driver = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
derive_more = { workspace = true }
ndarray = { workspace = true }
parking_lot = { workspace = true }

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }

[package.metadata.conformu]
command = "cargo test -p svbony-camera --features conformu --test conformu_integration -- --nocapture"

# Packaging metadata (ADR-012 / ADR-013 / the new ADR-018 no-license-SDK
# bucket). SVBony's SDK ships no license grant, so — like qhy-camera —
# nothing bundles the SDK library itself: only the binary, udev rule,
# systemd unit, and the download-on-target helper ship in the package. The
# root-only helper (`rusty-photon-svbony-sdk-install`, analogous to
# `rusty-photon-qhy-firmware-install`) installs `libSVBCameraSDK.so` to
# `/usr/lib/rusty-photon/` at operator request (Phase G).
[package.metadata.deb]
name = "rusty-photon-svbony-camera"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "ASCOM Alpaca Camera driver for SVBony cameras. SVBony's SDK ships no license grant, so it is not bundled: run rusty-photon-svbony-sdk-install once as root after installation."
section = "science"
priority = "optional"
# Explicit list, NOT "$auto": like zwo-camera's bundled blob, the
# operator-installed libSVBCameraSDK.so carries no SONAME, so
# dpkg-shlibdeps cannot map the binary's bare libSVBCameraSDK.so NEEDED
# entry to any package and would fail — even though this package never
# ships the blob itself, the binary built against it still carries that
# NEEDED entry. Direct runtime needs: glibc, libgcc, C++ runtime (what
# libSVBCameraSDK.so itself links, per readelf -d) + libusb-1.0 (the
# *binary's own* -lusb-1.0 link — the SDK blob has no NEEDED entry for it
# at all, see docs/plans/svbony-camera.md Phase F); adduser is used by
# postinst.
depends = "libc6, libgcc-s1, libstdc++6, libusb-1.0-0, adduser"
assets = [
    ["target/release/svbony-camera", "usr/bin/rusty-photon-svbony-camera", "755"],
    ["pkg/90-rusty-photon-svbony.rules", "usr/lib/udev/rules.d/90-rusty-photon-svbony.rules", "644"],
    ["pkg/rusty-photon-svbony-sdk-install", "usr/sbin/rusty-photon-svbony-sdk-install", "755"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-svbony-camera"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-svbony-camera"
summary = "ASCOM Alpaca Camera driver for SVBony cameras"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/svbony-camera", dest = "/usr/bin/rusty-photon-svbony-camera", mode = "755" },
    { source = "pkg/rusty-photon-svbony-camera.service", dest = "/usr/lib/systemd/system/rusty-photon-svbony-camera.service", mode = "644" },
    { source = "pkg/90-rusty-photon-svbony.rules", dest = "/usr/lib/udev/rules.d/90-rusty-photon-svbony.rules", mode = "644" },
    { source = "pkg/rusty-photon-svbony-sdk-install", dest = "/usr/sbin/rusty-photon-svbony-sdk-install", mode = "755" },
]
# rpm's dependency generator would emit a requires on the SONAME-less
# operator-installed blob (libSVBCameraSDK.so) that no package provides,
# making the rpm uninstallable — same reasoning as zwo-camera's
# auto-req = "disabled". Disable it and declare the runtime needs
# explicitly in the requires table below.
auto-req = "disabled"
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon /var/lib/rusty-photon/.config /var/lib/rusty-photon/.config/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
if [ "$1" -eq 1 ]; then
    systemctl enable rusty-photon-svbony-camera.service
fi
udevadm control --reload-rules || true
udevadm trigger || true
echo "rusty-photon-svbony-camera: the SVBony SDK is not bundled."
echo "Run '/usr/sbin/rusty-photon-svbony-sdk-install' once as root before first use."
"""
# rpm scriptlet arg $1 = package instances remaining after the operation.
# On upgrade the old %preun runs AFTER the new %post, so an unguarded
# stop/disable would take the service down right after every upgrade.
# Guarded: enable fires on first install only (upgrades keep the
# operator's enable/disable choice), stop/disable on final erase only,
# and try-restart hands a running service over to the upgraded binary
# (the deb restart-after-upgrade equivalent).
pre_uninstall_script = """
if [ "$1" -eq 0 ]; then
    systemctl stop rusty-photon-svbony-camera.service || true
    systemctl disable rusty-photon-svbony-camera.service || true
fi
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = """
systemctl daemon-reload
if [ "$1" -ge 1 ]; then
    systemctl try-restart rusty-photon-svbony-camera.service || true
fi
"""
require-sh = true

[package.metadata.generate-rpm.requires]
glibc = "*"
libgcc = "*"
"libstdc++" = "*"
libusb1 = "*"

[dev-dependencies]
svbony-rs = { path = "../../crates/svbony-rs", features = ["simulation"] }
# Client API for the BDD harness (tests/bdd/world.rs); kept out of the prod build.
ascom-alpaca = { workspace = true, features = ["client"] }
tracing-subscriber = { workspace = true }
bdd-infra = { workspace = true, features = ["conformu", "tls-auth"] }
cucumber = { workspace = true }
tempfile = { workspace = true }
tokio-test = { workspace = true }
# Raw HTTP for the one BDD path the typed Alpaca client cannot express: a
# StartExposure with a negative Duration (`std::time::Duration` is unsigned).
reqwest = { workspace = true }

[[test]]
name = "bdd"
harness = false
