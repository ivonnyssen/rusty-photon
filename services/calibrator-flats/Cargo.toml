[package]
name = "calibrator-flats"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Calibrator flat field orchestrator - iterative exposure optimization with CoverCalibrator control"
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
humantime = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true }
axum = { workspace = true }
async-trait = { workspace = true }
rmcp = { workspace = true, features = ["client", "transport-streamable-http-client-reqwest"] }
rusty-photon-config = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }

[package.metadata.deb]
name = "rusty-photon-calibrator-flats"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "Flat-field capture orchestrator with iterative exposure optimization."
section = "science"
priority = "optional"
# $auto = dpkg-shlibdeps (needs a Debian build host); adduser is used by postinst.
depends = "$auto, adduser"
assets = [
    ["target/release/calibrator-flats", "usr/bin/rusty-photon-calibrator-flats", "755"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-calibrator-flats"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-calibrator-flats"
summary = "Flat-field capture orchestrator"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/calibrator-flats", dest = "/usr/bin/rusty-photon-calibrator-flats", mode = "755" },
    { source = "pkg/rusty-photon-calibrator-flats.service", dest = "/usr/lib/systemd/system/rusty-photon-calibrator-flats.service", mode = "644" },
]
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
systemctl enable rusty-photon-calibrator-flats.service
"""
pre_uninstall_script = """
systemctl stop rusty-photon-calibrator-flats.service || true
systemctl disable rusty-photon-calibrator-flats.service || true
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = "systemctl daemon-reload"
require-sh = true

[dev-dependencies]
bdd-infra = { workspace = true, features = ["rp-harness"] }
cucumber = { workspace = true }
derive_more = { workspace = true }
libc = { workspace = true }
mockall = { workspace = true }
tempfile = { workspace = true }
tokio-test = { workspace = true }
cargo-husky = { workspace = true }

[[test]]
name = "bdd"
harness = false
