[package]
name = "qhy-camera"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ASCOM Alpaca Camera (+ FilterWheel) driver for QHYCCD hardware"

[features]
default = []
# `simulation` forwards qhyccd-rs's simulation backend so `Sdk::new()` yields a
# QHY178M-Simulated camera + 7-position CFW instead of scanning USB. It is
# hardware-free (no physical camera/USB) but NOT SDK-free — the static `qhyccd`
# lib is still required at link time (see docs/services/qhy-camera.md "Native
# dependency & build gating").
simulation = ["qhyccd-rs/simulation"]
# `mock` is the project-wide convention name BDD/CI build with (`--features mock`
# / `--all-features`); for this SDK-backed service it is just an alias that
# forwards the simulation backend.
mock = ["simulation"]
# `conformu` enables `mock` so a single `--features conformu` flag builds and
# runs the compliance test against the simulation backend.
conformu = ["mock"]

[lints]
workspace = true

[dependencies]
ascom-alpaca = { workspace = true, features = ["server", "camera", "filter_wheel"] }
qhyccd-rs = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-doctor-checks = { workspace = true }
rusty-photon-server-config = { workspace = true }
rusty-photon-driver = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
rusty-photon-tls = { workspace = true }
rp-auth = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
derive_more = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
axum = { workspace = true }
ndarray = { workspace = true }
parking_lot = { workspace = true }

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }
# Preflight/doctor: resolve + keep resident the delay-loaded qhyccd.dll (see
# docs/services/qhy-camera.md § "Windows: qhyccd.dll resolution" and build.rs).
# Windows-only and single-service, so a local dep (Rule 10); the version was
# already in Cargo.lock as a transitive dep (bindgen), so this adds an edge,
# not a new pin.
libloading = "0.9"

[package.metadata.conformu]
command = "cargo test -p qhy-camera --features conformu --test conformu_integration -- --nocapture"

[package.metadata.deb]
name = "rusty-photon-qhy-camera"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "ASCOM Alpaca Camera and FilterWheel driver for QHYCCD cameras. QHYCCD's proprietary firmware is not bundled: run rusty-photon-qhy-firmware-install once as root after installation."
section = "science"
priority = "optional"
# $auto = dpkg-shlibdeps (needs a Debian build host); adduser is used by postinst.
depends = "$auto, adduser"
assets = [
    ["target/release/qhy-camera", "usr/bin/rusty-photon-qhy-camera", "755"],
    ["pkg/90-rusty-photon-qhy.rules", "usr/lib/udev/rules.d/90-rusty-photon-qhy.rules", "644"],
    ["pkg/rusty-photon-qhy-firmware-install", "usr/sbin/rusty-photon-qhy-firmware-install", "755"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-qhy-camera"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-qhy-camera"
summary = "ASCOM Alpaca Camera and FilterWheel driver for QHYCCD cameras"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/qhy-camera", dest = "/usr/bin/rusty-photon-qhy-camera", mode = "755" },
    { source = "pkg/rusty-photon-qhy-camera.service", dest = "/usr/lib/systemd/system/rusty-photon-qhy-camera.service", mode = "644" },
    { source = "pkg/90-rusty-photon-qhy.rules", dest = "/usr/lib/udev/rules.d/90-rusty-photon-qhy.rules", mode = "644" },
    { source = "pkg/rusty-photon-qhy-firmware-install", dest = "/usr/sbin/rusty-photon-qhy-firmware-install", mode = "755" },
]
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
getent group plugdev > /dev/null || groupadd -r plugdev
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon /var/lib/rusty-photon/.config /var/lib/rusty-photon/.config/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
if [ "$1" -eq 1 ]; then
    systemctl enable rusty-photon-qhy-camera.service
fi
udevadm control --reload-rules || true
udevadm trigger || true
echo "rusty-photon-qhy-camera: camera firmware is not bundled."
echo "Run '/usr/sbin/rusty-photon-qhy-firmware-install' once as root before first use."
"""
# rpm scriptlet arg $1 = package instances remaining after the operation.
# On upgrade the old %preun runs AFTER the new %post, so an unguarded
# stop/disable would take the service down right after every upgrade.
# Guarded: enable fires on first install only (upgrades keep the
# operator's enable/disable choice), stop/disable on final erase only,
# and try-restart hands a running service over to the upgraded binary
# (the deb restart-after-upgrade equivalent).
pre_uninstall_script = """
if [ "$1" -eq 0 ]; then
    systemctl stop rusty-photon-qhy-camera.service || true
    systemctl disable rusty-photon-qhy-camera.service || true
fi
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = """
systemctl daemon-reload
if [ "$1" -ge 1 ]; then
    systemctl try-restart rusty-photon-qhy-camera.service || true
fi
"""
require-sh = true

[dev-dependencies]
# ascom-alpaca's `client` feature is used only by the BDD harness
# (tests/bdd/world.rs), so keep it out of the production server binary — it
# independently pulls reqwest/rand/mime/async-fn-stream/tracing-futures. Dev-dep
# features union with the prod features for test/--all-features builds. The prod
# [dependencies] entry keeps `filter_wheel` (production-used: real CFW devices).
ascom-alpaca = { workspace = true, features = ["client"] }
tracing-subscriber = { workspace = true }
bdd-infra = { workspace = true, features = ["conformu", "tls-auth"] }
cucumber = { workspace = true }
tempfile = { workspace = true }
tokio-test = { workspace = true }
# Raw HTTP for the one BDD path the typed Alpaca client cannot express: a
# StartExposure with a negative Duration (rejected by the server before the
# typed client can carry it — `std::time::Duration` is unsigned).
reqwest = { workspace = true }
# Bazel-only resolution nudge — keeps `simulation`'s OPTIONAL deps (rand, rayon)
# materialized in the `@cr` crate_universe repo. Since ADR-009 vendored qhyccd-rs
# first-party, the real/sim SDK split is done by depending on the two BUILD
# variants (`//crates/qhyccd-rs:qhyccd-rs` vs `:qhyccd-rs_sim`), NOT by this
# dev-dep. But crate_universe (`from_cargo`) still resolves ONE feature set per
# crate and ignores a Bazel target's `crate_features`: `qhyccd-rs/simulation` is
# non-default, so without something enabling it in the Cargo resolution, `rand`/
# `rayon` never enter `@cr` and `qhyccd-rs_sim` fails to compile (`unresolved
# import rand`). This dev-dep is that "something". resolver = "2" keeps it out of
# the release binary (`cargo build` ignores dev-deps) so production links the
# real SDK. (Verified by spike 2026-06-17: dropping it → rand/rayon leave `@cr` →
# sim build breaks.) See docs/services/qhy-camera.md "Native dependency & build
# gating".
qhyccd-rs = { workspace = true, features = ["simulation"] }

[[test]]
name = "bdd"
harness = false
