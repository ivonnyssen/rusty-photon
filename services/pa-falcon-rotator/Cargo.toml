[package]
name = "pa-falcon-rotator"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ASCOM Alpaca driver for Pegasus Astro Falcon Rotator (firmware >= 1.3)"

[features]
default = []
mock = []  # Enables mock hardware for testing without real serial port
# `conformu` enables `mock` because the integration test launches the binary
# with a mock serial port (`/dev/mock`) driven from the test config. Keeping
# them coupled means a single `--features conformu` flag is enough to build
# and run the test.
conformu = ["mock", "ascom-alpaca/test"]

[lints]
workspace = true

[dependencies]
ascom-alpaca = { workspace = true, features = ["server", "rotator", "switch", "client"] }
rusty-photon-shared-transport = { workspace = true }
tokio = { workspace = true }
tokio-serial = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
derive_more = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
rp-tls = { workspace = true }
rp-auth = { workspace = true }
axum = { workspace = true }

[dev-dependencies]
bdd-infra = { workspace = true }
tokio-test = { workspace = true }
mockall = { workspace = true }
proptest = { workspace = true }
reqwest = { workspace = true }
cucumber = { workspace = true }
tempfile = { workspace = true }
cargo-husky = { workspace = true }

[[test]]
name = "bdd"
harness = false
required-features = ["mock"]

[package.metadata.conformu]
command = "cargo test -p pa-falcon-rotator --features conformu --test conformu_integration -- --ignored --nocapture"
