[package]
name = "session-runner-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
chrono = { version = "0.4", default-features = false }
libfuzzer-sys = "0.4"
serde_json = "1"
session-runner = { path = ".." }

[[bin]]
name = "expr_parse"
path = "fuzz_targets/expr_parse.rs"
test = false
doc = false
bench = false

# Deliberately a standalone workspace: fuzzing needs nightly (libFuzzer
# instrumentation), so this crate stays outside the root workspace, the
# Bazel target graph, and the Bazel/Cargo parity check. Run it with
# `cargo +nightly fuzz run expr_parse` from services/session-runner.
[workspace]
