[package]
name = "session-runner"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Generic imaging-workflow orchestrator: executes declarative JSON workflow documents against rp's tool catalog"
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
axum = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
humantime = { workspace = true }
# Layer-2 catalog validation checks literal tool arguments against rp's
# tool parameter schemas (draft 2020-12); the schema-agreement test suite
# reuses it. Layer 1 stays the hand-rolled walk in src/document/validate.rs
# (precise pointers + messages JSON Schema output cannot produce). Default
# features off: no external $refs to resolve.
jsonschema = { version = "0.48", default-features = false }
reqwest = { workspace = true }
rp-auth = { workspace = true }
rp-mcp-client = { workspace = true }
rusty-photon-tls = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-server-config = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }

[dev-dependencies]
bdd-infra = { workspace = true, features = ["rp-harness", "tls-auth"] }
cucumber = { workspace = true }
derive_more = { workspace = true }
proptest = { workspace = true }
# `test-util` unlocks paused tokio time (`start_paused`), which the
# events tests use to exercise the subscribe-attempt timeout instantly.
tokio = { workspace = true, features = ["test-util"] }

[[test]]
name = "bdd"
harness = false

[package.metadata.deb]
name = "rusty-photon-session-runner"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "Generic imaging-workflow orchestrator: executes declarative JSON workflow documents against rp's tool catalog."
section = "science"
priority = "optional"
# $auto = dpkg-shlibdeps (needs a Debian build host); adduser is used by postinst.
depends = "$auto, adduser"
assets = [
    ["target/release/session-runner", "usr/bin/rusty-photon-session-runner", "755"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-session-runner"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-session-runner"
summary = "Generic imaging-workflow orchestrator"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/session-runner", dest = "/usr/bin/rusty-photon-session-runner", mode = "755" },
    { source = "pkg/rusty-photon-session-runner.service", dest = "/usr/lib/systemd/system/rusty-photon-session-runner.service", mode = "644" },
]
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon /var/lib/rusty-photon/.config /var/lib/rusty-photon/.config/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
if [ "$1" -eq 1 ]; then
    systemctl enable rusty-photon-session-runner.service
fi
"""
# rpm scriptlet arg $1 = package instances remaining after the operation.
# On upgrade the old %preun runs AFTER the new %post, so an unguarded
# stop/disable would take the service down right after every upgrade.
# Guarded: enable fires on first install only (upgrades keep the
# operator's enable/disable choice), stop/disable on final erase only,
# and try-restart hands a running service over to the upgraded binary
# (the deb restart-after-upgrade equivalent).
pre_uninstall_script = """
if [ "$1" -eq 0 ]; then
    systemctl stop rusty-photon-session-runner.service || true
    systemctl disable rusty-photon-session-runner.service || true
fi
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = """
systemctl daemon-reload
if [ "$1" -ge 1 ]; then
    systemctl try-restart rusty-photon-session-runner.service || true
fi
"""
require-sh = true
