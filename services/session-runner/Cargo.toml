[package]
name = "session-runner"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Generic imaging-workflow orchestrator: executes declarative JSON workflow documents against rp's tool catalog"
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
axum = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
humantime = { workspace = true }
# Layer-2 catalog validation checks literal tool arguments against rp's
# tool parameter schemas (draft 2020-12); the schema-agreement test suite
# reuses it. Layer 1 stays the hand-rolled walk in src/document/validate.rs
# (precise pointers + messages JSON Schema output cannot produce). Default
# features off: no external $refs to resolve.
jsonschema = { version = "0.48", default-features = false }
reqwest = { workspace = true }
rmcp = { workspace = true, features = ["client", "transport-streamable-http-client-reqwest"] }
rp-auth = { workspace = true }
rp-tls = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-server-config = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }

[dev-dependencies]
bdd-infra = { workspace = true, features = ["rp-harness", "tls-auth"] }
cucumber = { workspace = true }
derive_more = { workspace = true }
proptest = { workspace = true }
# `test-util` unlocks paused tokio time (`start_paused`), which the
# events tests use to exercise the subscribe-attempt timeout instantly.
tokio = { workspace = true, features = ["test-util"] }

[[test]]
name = "bdd"
harness = false
