[package]
name = "ppba-driver"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ASCOM Alpaca driver for Pegasus Astro Pocket Powerbox Advance Gen2"

[features]
default = []
mock = []    # Enables mock hardware for testing without real serial port
# `conformu` enables `mock` because the integration test launches the binary
# with a mock serial port (`/dev/mock`) driven from the test config. Keeping
# them coupled means a single `--features conformu` flag is enough to build
# and run the test.
conformu = ["mock", "ascom-alpaca/test"]

[lints]
workspace = true

[dependencies]
ascom-alpaca = { workspace = true, features = [
  "server",
  "switch",
  "observing_conditions",
] }
tokio = { workspace = true }
tokio-serial = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
rp-tls = { workspace = true }
rp-auth = { workspace = true }
axum = { workspace = true }

[package.metadata.conformu]
command = "cargo test -p ppba-driver --features conformu --test conformu_integration -- --ignored --nocapture"

#[package.metadata.miri] - takes over 6 hours on github, so disabling
#command = "cargo miri test -p ppba-driver"

[dev-dependencies]
ascom-alpaca = { workspace = true, features = ["client", "switch", "observing_conditions"] }
bdd-infra = { workspace = true }
tokio-test = { workspace = true }
mockall = { workspace = true }
proptest = { workspace = true }
reqwest = { workspace = true }
cucumber = { workspace = true }
cargo-husky = { workspace = true }
tempfile = { workspace = true }

[[test]]
name = "bdd"
harness = false
