[package]
name = "ppba-driver"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version = "1.88.0"
description = "ASCOM Alpaca driver for Pegasus Astro Pocket Powerbox Advance Gen2"

[package.metadata.bdd]
env_var = "PPBA_BINARY"
features = ["mock"]

[features]
default = []
mock = []    # Enables mock hardware for testing without real serial port

[lints]
workspace = true

[dependencies]
ascom-alpaca = { workspace = true, features = [
  "server",
  "switch",
  "observing_conditions",
  "test",
] }
tokio = { workspace = true }
tokio-serial = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
rp-tls = { workspace = true }
axum = { workspace = true }

[package.metadata.conformu]
command = "cargo test -p ppba-driver --features mock --test conformu_integration -- --ignored --nocapture"

#[package.metadata.miri] - takes over 6 hours on github, so disabling
#command = "cargo miri test -p ppba-driver"

[dev-dependencies]
ascom-alpaca = { workspace = true, features = ["client", "switch", "observing_conditions"] }
bdd-infra = { workspace = true }
tokio-test = { workspace = true }
mockall = { workspace = true }
proptest = { workspace = true }
reqwest = { workspace = true }
cucumber = { workspace = true }
cargo-husky = { workspace = true }
tempfile = { workspace = true }

[[test]]
name = "bdd"
harness = false
