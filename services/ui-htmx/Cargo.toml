[package]
name = "ui-htmx"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Server-rendered web configuration UI (BFF) for rusty-photon — HTMX expression"

[lints]
workspace = true

[features]
# Test-only `/fixtures/*` routes for the @browser BDD layer (UI-testing plan §9
# Tier 1). OFF by default, so it ships nothing in the real binary; the BDD suite
# spawns a binary built WITH it (cargo `--all-features`; Bazel `:ui-htmx_fixtures`).
# The fixtures module is `#[coverage(off)]`, so enabling it never perturbs the
# coverage numbers (test-only code must not count toward product coverage).
test-fixtures = []
# Test-only Server-Sent-Events fixture routes for the @browser SSE spike
# (UI-testing plan §9 Tier 2). Same shape as `test-fixtures` — OFF by default,
# `#[coverage(off)]`, spawned only by the BDD suite. It proves async
# server-pushed DOM updates are browser-observable and that an open SSE stream
# (which never closes on the shutdown signal — axum #2673) still allows a
# graceful, coverage-flushing shutdown when the browser is quit first. (Its
# `async-stream` dependency became unconditional when the production SSE proxy
# landed in Phase 5, so this gate now only scopes the fixture routes.)
test-sse = []

[dependencies]
axum = { workspace = true }
derive_more = { workspace = true }
maud = { version = "0.27", features = ["axum"] }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
# CancellationToken for ending open SSE proxy streams on shutdown (axum #2673),
# mirroring rp's `sse_shutdown` pattern.
tokio-util = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
clap = { workspace = true }
rp-tls = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
# Async stream construction for the production SSE proxy (`/stream/events`,
# Phase 5) and the test-only SSE fixture endpoint.
async-stream = { workspace = true }

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }

[package.metadata.deb]
name = "rusty-photon-ui-htmx"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "Server-rendered web configuration UI for Rusty Photon services."
section = "science"
priority = "optional"
# $auto = dpkg-shlibdeps (needs a Debian build host); adduser is used by postinst.
depends = "$auto, adduser"
assets = [
    ["target/release/ui-htmx", "usr/bin/rusty-photon-ui-htmx", "755"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-ui-htmx"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-ui-htmx"
summary = "Web configuration UI for Rusty Photon services"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/ui-htmx", dest = "/usr/bin/rusty-photon-ui-htmx", mode = "755" },
    { source = "pkg/rusty-photon-ui-htmx.service", dest = "/usr/lib/systemd/system/rusty-photon-ui-htmx.service", mode = "644" },
]
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon /var/lib/rusty-photon/.config /var/lib/rusty-photon/.config/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
systemctl enable rusty-photon-ui-htmx.service
"""
pre_uninstall_script = """
systemctl stop rusty-photon-ui-htmx.service || true
systemctl disable rusty-photon-ui-htmx.service || true
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = "systemctl daemon-reload"
require-sh = true

[dev-dependencies]
# rp-harness: the Phase-5 suites spawn a real rp (RpConfigBuilder + launcher)
# alongside the BFF and dsd-fp2 — an all-first-party stack, no OmniSim.
bdd-infra = { workspace = true, features = ["rp-harness"] }
mockall = { workspace = true }
cucumber = { workspace = true }
tempfile = { workspace = true }
# Layer A of the UI-testing plan (docs/plans/ui-testing.md §4): the Servo
# html5ever/selectors stack browsers ship, used for CSS-selector DOM assertions
# in the BDD suite. Test-only — never compiled into the shipped binary.
scraper = "0.27"
# Layer B (§5): byte-equivalence snapshots of the server's HTML output, the
# cross-OS-comparable artifact (P2). `filters` scrubs run/OS-varying tokens
# before compare; `redactions` is pulled for completeness per the plan.
insta = { version = "1.48", features = ["filters", "redactions"] }
# Layer C (§6): a real WebDriver browser for behaviors only a browser can prove
# (P3 — htmx actually executes the swap/poll). Pure Rust, no Node. The @browser
# scenarios it drives are gated behind UI_BROWSER_TESTS=1 (see tests/bdd.rs), so
# this always-compiled dev-dep never drags a browser into the default gate.
thirtyfour = "0.37"
# Layer C Tier 0 step 4 (§9): the kill-the-tree reaper for the @browser worst-case
# scenario — killpg of geckodriver's process group + a /proc orphan scan, both
# unix-only (the @browser layer runs on Linux). Test-only.
libc = { workspace = true }

[[test]]
name = "bdd"
harness = false
