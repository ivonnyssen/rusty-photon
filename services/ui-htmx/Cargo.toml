[package]
name = "ui-htmx"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Server-rendered web configuration UI (BFF) for rusty-photon — HTMX expression"

[lints]
workspace = true

[dependencies]
axum = { workspace = true }
derive_more = { workspace = true }
maud = { version = "0.27", features = ["axum"] }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
clap = { workspace = true }
rp-tls = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }

[dev-dependencies]
bdd-infra = { workspace = true }
mockall = { workspace = true }
cucumber = { workspace = true }
tempfile = { workspace = true }
# Layer A of the UI-testing plan (docs/plans/ui-testing.md §4): the Servo
# html5ever/selectors stack browsers ship, used for CSS-selector DOM assertions
# in the BDD suite. Test-only — never compiled into the shipped binary.
scraper = "0.27"

[[test]]
name = "bdd"
harness = false
