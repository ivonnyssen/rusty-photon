[package]
name = "doctor"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Diagnoses a multi-service rusty-photon install: config files, ports, cross-service wiring"

[features]
default = []
# Enables the --platform-facts flag: a JSON file replaces the host
# service-manager queries so tests can stage any host state on any OS.
mock = []

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
clap = { workspace = true }
cloudflare = { workspace = true }
derive_more = { workspace = true }
hostname = "0.4"
instant-acme = { workspace = true }
rand = { workspace = true }
rcgen = { workspace = true }
rp-auth = { workspace = true }
rpassword = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-server-config = { workspace = true }
rusty-photon-tls = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
# Floor pinned to 0.3.47 — fixes RUSTSEC-2026-0009 (DoS via stack exhaustion in
# RFC 2822 parsing). Affected: >=0.3.6, <0.3.47.
time = "0.3.47"
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
axum = { workspace = true }
bdd-infra = { workspace = true }
cucumber = { workspace = true }
mockall = { workspace = true }
reqwest = { workspace = true }
rustls = { workspace = true }
rustls-pemfile = { workspace = true }
tempfile = { workspace = true }

[[test]]
name = "bdd"
harness = false
# The BDD suite drives the binary through --platform-facts, which only
# exists under `mock`; `cargo test -p doctor --features mock` builds the
# binary with the flag and runs the suite in one invocation.
required-features = ["mock"]
