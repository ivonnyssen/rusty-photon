[package]
name = "sentinel"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Observatory monitoring and notification service"

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
humantime = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
derive_more = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true }
tokio-util = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
rp-auth = { workspace = true }
rusty-photon-tls = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-doctor-checks = { workspace = true }
rusty-photon-server-config = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }

[package.metadata.deb]
name = "rusty-photon-sentinel"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "Observatory monitoring and notification service that polls ASCOM Alpaca devices and serves a web dashboard."
section = "science"
priority = "optional"
# $auto = dpkg-shlibdeps (needs a Debian build host); adduser is used by postinst.
depends = "$auto, adduser"
assets = [
    ["target/release/sentinel", "usr/bin/rusty-photon-sentinel", "755"],
    # Scoped grant (restart of rusty-photon-* units only) without which the
    # unprivileged NoNewPrivileges unit could restart nothing via systemctl.
    # Vendor rules dir, not /etc: polkitd reads both, and /etc is the local
    # admin's override space (also keeps cargo-deb from marking it a conffile).
    ["pkg/50-rusty-photon-sentinel.rules", "usr/share/polkit-1/rules.d/50-rusty-photon-sentinel.rules", "644"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-sentinel"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-sentinel"
summary = "Observatory monitoring and notification service"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/sentinel", dest = "/usr/bin/rusty-photon-sentinel", mode = "755" },
    { source = "pkg/rusty-photon-sentinel.service", dest = "/usr/lib/systemd/system/rusty-photon-sentinel.service", mode = "644" },
    { source = "pkg/50-rusty-photon-sentinel.rules", dest = "/usr/share/polkit-1/rules.d/50-rusty-photon-sentinel.rules", mode = "644" },
]
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon /var/lib/rusty-photon/.config /var/lib/rusty-photon/.config/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
if [ "$1" -eq 1 ]; then
    systemctl enable rusty-photon-sentinel.service
fi
"""
# rpm scriptlet arg $1 = package instances remaining after the operation.
# On upgrade the old %preun runs AFTER the new %post, so an unguarded
# stop/disable would take the service down right after every upgrade.
# Guarded: enable fires on first install only (upgrades keep the
# operator's enable/disable choice), stop/disable on final erase only,
# and try-restart hands a running service over to the upgraded binary
# (the deb restart-after-upgrade equivalent).
pre_uninstall_script = """
if [ "$1" -eq 0 ]; then
    systemctl stop rusty-photon-sentinel.service || true
    systemctl disable rusty-photon-sentinel.service || true
fi
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = """
systemctl daemon-reload
if [ "$1" -ge 1 ]; then
    systemctl try-restart rusty-photon-sentinel.service || true
fi
"""
require-sh = true

[dev-dependencies]
bdd-infra = { workspace = true, features = ["tls-auth"] }
tokio-test = { workspace = true }
mockall = { workspace = true }
cucumber = { workspace = true }
tempfile = { workspace = true }
cargo-husky = { workspace = true }

[[test]]
name = "bdd"
harness = false
