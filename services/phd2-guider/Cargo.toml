[package]
name = "phd2-guider"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "PHD2 guider client library and service for Rusty Photon"

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
humantime = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
base64 = { workspace = true }
rp-fits = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
async-trait = { workspace = true }

[package.metadata.miri]
command = "cargo miri test -p phd2-guider"

[[bin]]
name = "mock_phd2"
path = "src/bin/mock_phd2.rs"

[package.metadata.deb]
name = "rusty-photon-phd2-guider"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "Command-line client for the PHD2 guiding application."
section = "science"
priority = "optional"
depends = "$auto"
assets = [
    ["target/release/phd2-guider", "usr/bin/rusty-photon-phd2-guider", "755"],
]

[package.metadata.generate-rpm]
name = "rusty-photon-phd2-guider"
summary = "Command-line client for the PHD2 guiding application"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/phd2-guider", dest = "/usr/bin/rusty-photon-phd2-guider", mode = "755" },
]

[dev-dependencies]
tokio-test = { workspace = true }
base64 = { workspace = true }
mockall = { workspace = true }
tempfile = { workspace = true }
cargo-husky = { workspace = true }

[target.'cfg(unix)'.dev-dependencies]
libc = { workspace = true }
