[package]
name = "rp"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Rusty Photon main application - equipment gateway, event bus, and safety enforcer"
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
tokio-util = { workspace = true }
async-stream = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
humantime = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true }
axum = { workspace = true }
base64 = { workspace = true }
rp-auth = { workspace = true }
rp-catalog = { workspace = true }
rp-ephemeris = { workspace = true }
rp-guider = { workspace = true }
rp-plate-solver = { workspace = true }
rp-tls = { workspace = true }
rpassword = { workspace = true }
rp-fits = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
ndarray = { workspace = true }
ndarray-ndimage = { workspace = true }
rmpfit = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
ascom-alpaca = { workspace = true, features = ["client", "camera", "filter_wheel", "cover_calibrator", "focuser", "telescope", "safety_monitor"] }
rmcp = { workspace = true, features = ["server", "macros", "transport-streamable-http-server", "schemars"] }
schemars = { workspace = true }
tempfile = { workspace = true }

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }

[package.metadata.deb]
name = "rusty-photon-rp"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "Rusty Photon core service - equipment gateway, event bus, and safety enforcer."
section = "science"
priority = "optional"
# $auto = dpkg-shlibdeps (needs a Debian build host); adduser is used by postinst.
depends = "$auto, adduser"
assets = [
    ["target/release/rp", "usr/bin/rusty-photon-rp", "755"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-rp"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-rp"
summary = "Rusty Photon equipment gateway and event bus"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/rp", dest = "/usr/bin/rusty-photon-rp", mode = "755" },
    { source = "pkg/rusty-photon-rp.service", dest = "/usr/lib/systemd/system/rusty-photon-rp.service", mode = "644" },
]
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon /var/lib/rusty-photon/.config /var/lib/rusty-photon/.config/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
if [ "$1" -eq 1 ]; then
    systemctl enable rusty-photon-rp.service
fi
"""
# rpm scriptlet arg $1 = package instances remaining after the operation.
# On upgrade the old %preun runs AFTER the new %post, so an unguarded
# stop/disable would take the service down right after every upgrade.
# Guarded: enable fires on first install only (upgrades keep the
# operator's enable/disable choice), stop/disable on final erase only,
# and try-restart hands a running service over to the upgraded binary
# (the deb restart-after-upgrade equivalent).
pre_uninstall_script = """
if [ "$1" -eq 0 ]; then
    systemctl stop rusty-photon-rp.service || true
    systemctl disable rusty-photon-rp.service || true
fi
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = """
systemctl daemon-reload
if [ "$1" -ge 1 ]; then
    systemctl try-restart rusty-photon-rp.service || true
fi
"""
require-sh = true

[dev-dependencies]
bdd-infra = { workspace = true, features = ["rp-harness"] }
cucumber = { workspace = true }
derive_more = { workspace = true }
libc = { workspace = true }
mockall = { workspace = true }
# Re-declared in dev-deps with the `mock` feature so unit tests in
# mcp.rs can build against MockPlateSolveClient. The non-test build
# pulls the same crate without the feature, keeping mockall out of
# the production binary.
rp-guider = { workspace = true, features = ["mock"] }
rp-plate-solver = { workspace = true, features = ["mock"] }
tokio-test = { workspace = true }
cargo-husky = { workspace = true }

[[test]]
name = "bdd"
harness = false
