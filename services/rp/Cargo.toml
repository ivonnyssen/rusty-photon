[package]
name = "rp"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Rusty Photon main application - equipment gateway, event bus, and safety enforcer"
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true }
axum = { workspace = true }
base64 = { workspace = true }
rp-auth = { workspace = true }
rp-tls = { workspace = true }
rpassword = { workspace = true }
fitrs = { workspace = true }
ndarray = { workspace = true }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { workspace = true }
ascom-alpaca = { workspace = true, features = ["client", "camera", "filter_wheel", "cover_calibrator"] }
rmcp = { workspace = true, features = ["server", "macros", "transport-streamable-http-server", "schemars"] }
schemars = { workspace = true }

[dev-dependencies]
bdd-infra = { workspace = true, features = ["rp-harness"] }
cucumber = { workspace = true }
libc = { workspace = true }
mockall = { workspace = true }
tempfile = { workspace = true }
tokio-test = { workspace = true }
cargo-husky = { workspace = true }

[[test]]
name = "bdd"
harness = false
