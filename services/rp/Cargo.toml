[package]
name = "rp"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Rusty Photon main application - equipment gateway, event bus, and safety enforcer"
rust-version = "1.88.0"

[package.metadata.bdd]
env_var = "RP_BINARY"

[lints]
workspace = true

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true }
axum = { workspace = true }
base64 = { workspace = true }
rp-auth = { workspace = true }
rp-tls = { workspace = true }
rpassword = { workspace = true }
uuid = { version = "1", features = ["v4", "serde"] }
ascom-alpaca = { workspace = true, features = ["client", "camera", "filter_wheel"] }

[dev-dependencies]
bdd-infra = { workspace = true }
cucumber = { workspace = true }
libc = { workspace = true }
mockall = { workspace = true }
tempfile = { workspace = true }
tokio-test = { workspace = true }
cargo-husky = { workspace = true }

[[test]]
name = "bdd"
harness = false
