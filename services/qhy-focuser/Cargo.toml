[package]
name = "qhy-focuser"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version = "1.88.0"
description = "ASCOM Alpaca driver for QHY Q-Focuser (EAF)"

[package.metadata.bdd]
env_var = "QHY_FOCUSER_BINARY"
features = ["mock"]

[features]
default = []
mock = []  # Enables mock hardware for testing without real serial port
conformu = ["ascom-alpaca/test"]

[dependencies]
ascom-alpaca = { workspace = true, features = ["server", "focuser", "client"] }
tokio = { workspace = true }
tokio-serial = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }

[package.metadata.conformu]
command = "cargo test -p qhy-focuser --features mock,conformu --test conformu_integration -- --ignored --nocapture"

[package.metadata.miri]
command = "cargo miri test -p qhy-focuser"

[dev-dependencies]
bdd-infra = { workspace = true }
tokio-test = { workspace = true }
mockall = { workspace = true }
proptest = { workspace = true }
reqwest = { workspace = true }
cucumber = { workspace = true }
tempfile = { workspace = true }
cargo-husky = { workspace = true }

[[test]]
name = "bdd"
harness = false
