[package]
name = "star-adventurer-gti"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ASCOM Alpaca driver for Sky-Watcher Star Adventurer GTi GEM"

[features]
default = []
mock = []
conformu = ["mock"]

[lints]
workspace = true

[dependencies]
ascom-alpaca = { workspace = true, features = ["server", "telescope", "client"] }
skywatcher-motor-protocol = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
rusty-photon-shared-transport = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-server-config = { workspace = true }
rusty-photon-driver = { workspace = true }
tokio = { workspace = true }
tokio-serial = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
derive_more = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
rp-tls = { workspace = true }
rp-auth = { workspace = true }
axum = { workspace = true }
erfars = { workspace = true }
chrono = { workspace = true }
tempfile = { workspace = true }

# Intentionally NOT opting in to the nightly ConformU workflow via
# `[package.metadata.conformu]` (issue #201). When PR #206
# re-enabled it after PulseGuide landed, the conformance phase
# surfaced three independent failures that the alpacaprotocol-only
# manual runs hadn't exercised:
#
# 1. `SideOfPierTests` slews to mechanical-HA ±9 h to verify
#    pier-side reporting on both sides of the meridian. The
#    `[-6.95, +6.95]` h safety envelope
#    (`MountConfig::ra_{min,max}_hours`) correctly rejects those
#    slews for real hardware, but ConformU treats the resulting
#    `InvalidValueException` as a fatal exception and abandons
#    `CheckMethods` entirely — so the rest of the suite never runs
#    in CI.
# 2. `SideOfPier` returns `pierWest` for every in-envelope target
#    because `coordinates::side_of_pier` keys on
#    `|dec_ticks| > cpr_dec/4` (the Dec-encoder-past-pole "physical
#    flip" convention). ConformU asserts the ASCOM pointing-state
#    convention (`pierWest` for HA ∈ [-6, 0), `pierEast` for
#    HA ∈ (0, +6]) and records ISSUEs for the HA > 0 cases.
# 3. PulseGuide tolerance checks fail in all four directions across
#    HA ±3 and ±9 (24 ISSUEs): Dec North / South moves at ~2× the
#    configured rate; RA East slows by only ~10 % instead of 50 %;
#    RA West pulses move east instead of west. The implementation
#    is the rate-shifted-tracking burst that PR #206 introduced.
#
# Re-add `[package.metadata.conformu]` once those land. Until then,
# run ConformU manually — see
# `docs/services/star-adventurer-gti.md` §"Running ConformU manually".

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }

[package.metadata.deb]
name = "rusty-photon-star-adventurer-gti"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "ASCOM Alpaca Telescope driver for the Sky-Watcher Star Adventurer GTi mount (USB or WiFi)."
section = "science"
priority = "optional"
# $auto = dpkg-shlibdeps (needs a Debian build host); adduser is used by postinst.
depends = "$auto, adduser"
assets = [
    ["target/release/star-adventurer-gti", "usr/bin/rusty-photon-star-adventurer-gti", "755"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-star-adventurer-gti"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-star-adventurer-gti"
summary = "ASCOM Alpaca Telescope driver for the SA GTi mount"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/star-adventurer-gti", dest = "/usr/bin/rusty-photon-star-adventurer-gti", mode = "755" },
    { source = "pkg/rusty-photon-star-adventurer-gti.service", dest = "/usr/lib/systemd/system/rusty-photon-star-adventurer-gti.service", mode = "644" },
]
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon /var/lib/rusty-photon/.config /var/lib/rusty-photon/.config/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
if [ "$1" -eq 1 ]; then
    systemctl enable rusty-photon-star-adventurer-gti.service
fi
"""
# rpm scriptlet arg $1 = package instances remaining after the operation.
# On upgrade the old %preun runs AFTER the new %post, so an unguarded
# stop/disable would take the service down right after every upgrade.
# Guarded: enable fires on first install only (upgrades keep the
# operator's enable/disable choice), stop/disable on final erase only,
# and try-restart hands a running service over to the upgraded binary
# (the deb restart-after-upgrade equivalent).
pre_uninstall_script = """
if [ "$1" -eq 0 ]; then
    systemctl stop rusty-photon-star-adventurer-gti.service || true
    systemctl disable rusty-photon-star-adventurer-gti.service || true
fi
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = """
systemctl daemon-reload
if [ "$1" -ge 1 ]; then
    systemctl try-restart rusty-photon-star-adventurer-gti.service || true
fi
"""
require-sh = true

[dev-dependencies]
tracing-subscriber = { workspace = true }
bdd-infra = { workspace = true, features = ["conformu"] }
tokio-test = { workspace = true }
mockall = { workspace = true }
proptest = { workspace = true }
reqwest = { workspace = true }
cucumber = { workspace = true }
cargo-husky = { workspace = true }
regex = { workspace = true }

[[test]]
name = "bdd"
harness = false
