[package]
name = "star-adventurer-gti"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ASCOM Alpaca driver for Sky-Watcher Star Adventurer GTi GEM"

[features]
default = []
mock = []
conformu = ["mock"]

[lints]
workspace = true

[dependencies]
ascom-alpaca = { workspace = true, features = ["server", "telescope", "client"] }
skywatcher-motor-protocol = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
rusty-photon-shared-transport = { workspace = true }
rusty-photon-config = { workspace = true }
tokio = { workspace = true }
tokio-serial = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
async-trait = { workspace = true }
derive_more = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
rp-tls = { workspace = true }
rp-auth = { workspace = true }
axum = { workspace = true }
erfars = { workspace = true }
chrono = { workspace = true }
tempfile = { workspace = true }

# Intentionally NOT opting in to the nightly ConformU workflow via
# `[package.metadata.conformu]` (issue #201). When PR #206
# re-enabled it after PulseGuide landed, the conformance phase
# surfaced three independent failures that the alpacaprotocol-only
# manual runs hadn't exercised:
#
# 1. `SideOfPierTests` slews to mechanical-HA ±9 h to verify
#    pier-side reporting on both sides of the meridian. The
#    `[-6.95, +6.95]` h safety envelope
#    (`MountConfig::ra_{min,max}_hours`) correctly rejects those
#    slews for real hardware, but ConformU treats the resulting
#    `InvalidValueException` as a fatal exception and abandons
#    `CheckMethods` entirely — so the rest of the suite never runs
#    in CI.
# 2. `SideOfPier` returns `pierWest` for every in-envelope target
#    because `coordinates::side_of_pier` keys on
#    `|dec_ticks| > cpr_dec/4` (the Dec-encoder-past-pole "physical
#    flip" convention). ConformU asserts the ASCOM pointing-state
#    convention (`pierWest` for HA ∈ [-6, 0), `pierEast` for
#    HA ∈ (0, +6]) and records ISSUEs for the HA > 0 cases.
# 3. PulseGuide tolerance checks fail in all four directions across
#    HA ±3 and ±9 (24 ISSUEs): Dec North / South moves at ~2× the
#    configured rate; RA East slows by only ~10 % instead of 50 %;
#    RA West pulses move east instead of west. The implementation
#    is the rate-shifted-tracking burst that PR #206 introduced.
#
# Re-add `[package.metadata.conformu]` once those land. Until then,
# run ConformU manually — see
# `docs/services/star-adventurer-gti.md` §"Running ConformU manually".

[dev-dependencies]
bdd-infra = { workspace = true, features = ["conformu"] }
tokio-test = { workspace = true }
mockall = { workspace = true }
proptest = { workspace = true }
reqwest = { workspace = true }
cucumber = { workspace = true }
cargo-husky = { workspace = true }
regex = { workspace = true }

[[test]]
name = "bdd"
harness = false
