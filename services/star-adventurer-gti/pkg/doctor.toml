# Catalog metadata for rusty-photon-doctor (docs/services/doctor.md).
# This service's own unit tests assert these values match its config defaults.
class = "alpaca"
port = 11117

# Hardware identity (docs/services/doctor.md §Hardware).
serial_pointer = "/transport/port"
serial_default_unix = "/dev/ttyACM0"
serial_default_windows = "COM3"
serial_gate_pointer = "/transport/kind"
serial_gate_value = "usb"
