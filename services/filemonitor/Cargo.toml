[package]
name = "filemonitor"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "File monitoring service for Rusty Photon"

[features]
default = []
conformu = []

[lints]
workspace = true

[dependencies]
ascom-alpaca = { workspace = true, features = ["server", "safety_monitor", "client"] }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
humantime-serde = { workspace = true }
clap = { workspace = true }
regex = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }

rp-tls = { workspace = true }
rp-auth = { workspace = true }
axum = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
tokio-util = { workspace = true }

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }

[package.metadata.conformu]
command = "cargo test -p filemonitor --features conformu --test conformu_integration -- --nocapture"

[package.metadata.miri]
command = "cargo miri test -p filemonitor"

[package.metadata.wix]
eula = false

[package.metadata.deb]
name = "rusty-photon-filemonitor"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "ASCOM Alpaca SafetyMonitor that monitors file content for astrophotography safety."
section = "science"
priority = "optional"
# $auto = dpkg-shlibdeps (needs a Debian build host); adduser is used by postinst.
depends = "$auto, adduser"
assets = [
    ["target/release/filemonitor", "usr/bin/rusty-photon-filemonitor", "755"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-filemonitor"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-filemonitor"
summary = "ASCOM Alpaca SafetyMonitor that monitors file content"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/filemonitor", dest = "/usr/bin/rusty-photon-filemonitor", mode = "755" },
    { source = "pkg/rusty-photon-filemonitor.service", dest = "/usr/lib/systemd/system/rusty-photon-filemonitor.service", mode = "644" },
]
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
systemctl enable rusty-photon-filemonitor.service
"""
pre_uninstall_script = """
systemctl stop rusty-photon-filemonitor.service || true
systemctl disable rusty-photon-filemonitor.service || true
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = "systemctl daemon-reload"
require-sh = true

[dev-dependencies]
bdd-infra = { workspace = true, features = ["conformu"] }
tokio-test = { workspace = true }
proptest = { workspace = true }
tracing-subscriber = { workspace = true }
cucumber = { workspace = true }
tempfile = { workspace = true }
cargo-husky = { workspace = true }
reqwest = { workspace = true }

[[test]]
name = "bdd"
harness = false
