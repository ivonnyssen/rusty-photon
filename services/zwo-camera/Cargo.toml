[package]
name = "zwo-camera"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ASCOM Alpaca Camera (+ EFW FilterWheel) driver for ZWO ASI hardware"

[features]
default = []
# Forwards to `zwo-rs/simulation`: a hardware-free, in-Rust simulated camera/EFW
# for development and tests. As in qhyccd-rs this removes the *camera*, NOT the
# SDK *link* — the native ZWO SDK is still linked. See the README and
# docs/services/zwo-camera.md "Native dependency & build gating".
simulation = ["zwo-rs/simulation"]
# Cross-driver alias for `simulation` (the workspace-wide test-backend name).
mock = ["simulation"]
# `conformu` enables `mock` so a single `--features conformu` flag builds and
# runs the compliance test against the simulation backend.
conformu = ["mock"]

[lints]
workspace = true

[dependencies]
# `client` is NOT enabled here — the production server never builds an Alpaca
# client; only the BDD harness does, so it lives in [dev-dependencies] below.
ascom-alpaca = { workspace = true, features = ["server", "camera"] }
# `camera` only (ADR-014): this binary links libASICamera2 (+ libusb-1.0) and
# nothing else — the EFW/EAF SDKs belong to their own services.
zwo-rs = { workspace = true, features = ["camera"] }
rp-tls = { workspace = true }
rusty-photon-config = { workspace = true }
rusty-photon-driver = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
derive_more = { workspace = true }
ndarray = { workspace = true }
parking_lot = { workspace = true }

# Enable the Windows Service Control Manager dispatch only on Windows;
# on Unix the `scm` feature would pull in `windows-service` for no
# runtime benefit.
[target.'cfg(windows)'.dependencies]
rusty-photon-service-lifecycle = { workspace = true, features = ["scm"] }

[package.metadata.conformu]
command = "cargo test -p zwo-camera --features conformu --test conformu_integration -- --nocapture"

[package.metadata.deb]
name = "rusty-photon-zwo-camera"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "ASCOM Alpaca Camera driver for ZWO ASI cameras. Bundles ZWO's MIT-licensed camera SDK library (libASICamera2) under /usr/lib/rusty-photon; no separate SDK install is needed."
section = "science"
priority = "optional"
# Explicit list, NOT "$auto": the bundled SDK blob carries no SONAME, so
# dpkg-shlibdeps cannot map the binary's bare libASICamera2.so NEEDED entry to
# any package and would fail. The binary links only the camera SDK (zwo-rs's
# `camera` feature, ADR-014), so libASICamera2.so is the only blob it needs —
# and ships (the EFW/EAF SDKs belong to their own services). Direct runtime
# needs: glibc, libgcc, C++ runtime + libusb for libASICamera2 (its DT_NEEDED);
# adduser is used by postinst.
depends = "libc6, libgcc-s1, libstdc++6, libusb-1.0-0, adduser"
assets = [
    ["target/release/zwo-camera", "usr/bin/rusty-photon-zwo-camera", "755"],
    ["pkg/90-rusty-photon-zwo.rules", "usr/lib/udev/rules.d/90-rusty-photon-zwo.rules", "644"],
    # MIT SDK blob: staged into gitignored pkg/lib/ by scripts/build-packages.sh
    # from the pinned indi-3rdparty ref (same pin as .github/actions/install-zwo-sdk),
    # never committed (ADR-013). Exactly the one SDK this binary links (ADR-014) —
    # co-installing zwo-focuser is conflict-free because each package owns only
    # its own blob. No SONAME, so the binary finds it via the RUNPATH
    # build-packages.sh injects (-Wl,-rpath,/usr/lib/rusty-photon).
    ["pkg/lib/libASICamera2.so", "usr/lib/rusty-photon/libASICamera2.so", "644"],
    # The license must travel with the redistributed blob (checker asserts this
    # copy matches the one vendored with the SDK headers in libzwo-sys).
    ["pkg/ZWO-SDK-LICENSE.txt", "usr/share/doc/rusty-photon-zwo-camera/ZWO-SDK-LICENSE.txt", "644"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-zwo-camera"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-zwo-camera"
summary = "ASCOM Alpaca Camera driver for ZWO ASI cameras"
# Aggregate expression: our dual-licensed code AND the bundled MIT-only ZWO
# SDK blobs — Apache-2.0 alone does not cover the whole package contents.
license = "(MIT OR Apache-2.0) AND MIT"
assets = [
    { source = "target/release/zwo-camera", dest = "/usr/bin/rusty-photon-zwo-camera", mode = "755" },
    { source = "pkg/rusty-photon-zwo-camera.service", dest = "/usr/lib/systemd/system/rusty-photon-zwo-camera.service", mode = "644" },
    { source = "pkg/90-rusty-photon-zwo.rules", dest = "/usr/lib/udev/rules.d/90-rusty-photon-zwo.rules", mode = "644" },
    { source = "pkg/lib/libASICamera2.so", dest = "/usr/lib/rusty-photon/libASICamera2.so", mode = "644" },
    { source = "pkg/ZWO-SDK-LICENSE.txt", dest = "/usr/share/doc/rusty-photon-zwo-camera/ZWO-SDK-LICENSE.txt", mode = "644" },
]
# rpm's dependency generator would emit a requires on the SONAME-less bundled
# blob (libASICamera2.so) that no package provides, making the rpm
# uninstallable. Disable it and declare the runtime needs explicitly in the
# requires table below — the Fedora renderings of the deb `depends` list
# above (the nightly rpm verify leg installs with dnf, which must resolve
# exactly these).
auto-req = "disabled"
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
getent group plugdev > /dev/null || groupadd -r plugdev
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon /var/lib/rusty-photon/.config /var/lib/rusty-photon/.config/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
if [ "$1" -eq 1 ]; then
    systemctl enable rusty-photon-zwo-camera.service
fi
udevadm control --reload-rules || true
udevadm trigger || true
"""
# rpm scriptlet arg $1 = package instances remaining after the operation.
# On upgrade the old %preun runs AFTER the new %post, so an unguarded
# stop/disable would take the service down right after every upgrade.
# Guarded: enable fires on first install only (upgrades keep the
# operator's enable/disable choice), stop/disable on final erase only,
# and try-restart hands a running service over to the upgraded binary
# (the deb restart-after-upgrade equivalent).
pre_uninstall_script = """
if [ "$1" -eq 0 ]; then
    systemctl stop rusty-photon-zwo-camera.service || true
    systemctl disable rusty-photon-zwo-camera.service || true
fi
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = """
systemctl daemon-reload
if [ "$1" -ge 1 ]; then
    systemctl try-restart rusty-photon-zwo-camera.service || true
fi
"""
require-sh = true

[package.metadata.generate-rpm.requires]
glibc = "*"
libgcc = "*"
"libstdc++" = "*"
libusb1 = "*"

[dev-dependencies]
# zwo-rs is now a first-party member with explicit Bazel real
# (`//crates/zwo-rs:zwo-rs`) and simulation (`:zwo-rs_sim`) variants, so this
# dev-dep no longer flips a single `@cr` variant. Its remaining (narrowed) role:
# `crate_universe` only resolves an optional dep into `@cr` if some member enables
# the gating feature, so this keeps `zwo-rs/simulation`'s optional deps (rand,
# rayon) present in `@cr` — which the `:zwo-rs_sim` target pulls via
# `all_crate_deps`. Resolver v2 still keeps it out of the production `cargo build`.
# See docs/plans/vendor-zwo-rs.md (Phase 2 spike).
zwo-rs = { workspace = true, features = ["simulation"] }
# Client API for the BDD harness (tests/bdd/world.rs); kept out of the prod build.
ascom-alpaca = { workspace = true, features = ["client"] }
tracing-subscriber = { workspace = true }
bdd-infra = { workspace = true, features = ["conformu"] }
cucumber = { workspace = true }
tempfile = { workspace = true }
tokio-test = { workspace = true }
# Raw HTTP for the one BDD path the typed Alpaca client cannot express: a
# StartExposure with a negative Duration (`std::time::Duration` is unsigned).
reqwest = { workspace = true }

[[test]]
name = "bdd"
harness = false
