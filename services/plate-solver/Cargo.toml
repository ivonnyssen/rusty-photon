[package]
name = "plate-solver"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "rp-managed plate solver service: HTTP wrapper around the ASTAP CLI"

[lints]
workspace = true

[dependencies]
rusty-photon-config = { workspace = true }
rusty-photon-service-lifecycle = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
humantime-serde = { workspace = true }
axum = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
libc = { workspace = true }
fitsrs = { workspace = true }
wcs = { workspace = true }

[[bin]]
name = "mock_astap"
path = "src/bin/mock_astap.rs"

[package.metadata.deb]
name = "rusty-photon-plate-solver"
maintainer = "Igor von Nyssen <igor@vonnyssen.com>"
extended-description = "HTTP plate-solving service wrapping the ASTAP CLI. ASTAP itself must be installed separately."
section = "science"
priority = "optional"
# $auto = dpkg-shlibdeps (needs a Debian build host); adduser is used by postinst.
depends = "$auto, adduser"
assets = [
    ["target/release/plate-solver", "usr/bin/rusty-photon-plate-solver", "755"],
]
maintainer-scripts = "pkg/"

[package.metadata.deb.systemd-units]
unit-name = "rusty-photon-plate-solver"
unit-scripts = "pkg/"
enable = true
start = true
restart-after-upgrade = true

[package.metadata.generate-rpm]
name = "rusty-photon-plate-solver"
summary = "HTTP plate-solving service wrapping the ASTAP CLI"
license = "MIT OR Apache-2.0"
assets = [
    { source = "target/release/plate-solver", dest = "/usr/bin/rusty-photon-plate-solver", mode = "755" },
    { source = "pkg/rusty-photon-plate-solver.service", dest = "/usr/lib/systemd/system/rusty-photon-plate-solver.service", mode = "644" },
]
post_install_script = """
getent passwd rusty-photon > /dev/null || useradd -r -d /var/lib/rusty-photon -s /sbin/nologin rusty-photon
install -d -m 0750 -o rusty-photon -g rusty-photon /var/lib/rusty-photon
[ -e /etc/rusty-photon ] || ln -s /var/lib/rusty-photon/.config/rusty-photon /etc/rusty-photon
systemctl daemon-reload
systemctl enable rusty-photon-plate-solver.service
"""
pre_uninstall_script = """
systemctl stop rusty-photon-plate-solver.service || true
systemctl disable rusty-photon-plate-solver.service || true
"""
# rpm has no purge lifecycle: erase preserves the runtime-created config and
# state (removal is a documented manual step), matching dpkg remove-vs-purge.
post_uninstall_script = "systemctl daemon-reload"
require-sh = true

[dev-dependencies]
tokio-test = { workspace = true }
mockall = { workspace = true }
tempfile = { workspace = true }
cargo-husky = { workspace = true }
cucumber = { workspace = true }
bdd-infra = { workspace = true }
reqwest = { workspace = true }

[[test]]
name = "bdd"
harness = false
