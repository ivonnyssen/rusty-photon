<rect x="596.0" y="72" width="18" height="13" fill="#dcdcdc" stroke="#8a8a8a"/>
<text x="621.0" y="83" font-weight="bold" fill="#1a1a1a">Overscan area</text>
<text x="621.0" y="98" font-size="10" fill="#1a1a1a">full sensor, 1920 x 1080 px</text>
<rect x="596.0" y="116" width="18" height="13" fill="#5bb98b" stroke="#2f8f63"/>
