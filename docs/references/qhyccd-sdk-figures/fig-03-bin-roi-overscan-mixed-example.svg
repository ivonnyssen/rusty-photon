<text x="80" y="362" font-size="10" fill="#1a1a1a">All coordinates are in sensor pixels measured from the top-left origin (X right, Y down).</text>
<text x="80" y="377" font-size="10" fill="#1a1a1a">The effective area is inset within the full sensor by the overscan margin; the ROI lies inside the effective area.</text>
