<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 419" font-size="11" font-family="DejaVu Sans, Verdana, Arial, sans-serif">
<rect x="0" y="0" width="820" height="419" fill="white"/>
<text x="80" y="30" font-size="15" font-weight="bold" fill="#1a1a1a">The same ROI after overscan correction (effective-area coordinates)</text>
<defs><marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#333"/></marker></defs>
<rect x="80.0" y="64.0" width="470.0" height="255.4" fill="#5bb98b" stroke="#2f8f63" stroke-width="1.6"/>
<rect x="95.3" y="79.3" width="357.6" height="153.3" fill="#d8975f" stroke="#9c5f32" stroke-width="1.6"/>
<line x1="80" y1="64" x2="576.0" y2="64" stroke="#333" stroke-width="1.4" marker-end="url(#ah)"/>
<line x1="80" y1="64" x2="80" y2="345.4" stroke="#333" stroke-width="1.4" marker-end="url(#ah)"/>
<text x="574.0" y="58" text-anchor="end" font-size="12" font-weight="bold" fill="#333">X</text>
<text x="74" y="345.4" text-anchor="end" font-size="12" font-weight="bold" fill="#333">Y</text>
<text x="73" y="57" text-anchor="end" font-size="10" fill="#1a1a1a">0</text>
<line x1="95.3" y1="64" x2="95.3" y2="46" stroke="#9a9a9a" stroke-width="0.8"/>
<text x="95.3" y="43" text-anchor="middle" font-size="10" fill="#1a1a1a">60</text>
<line x1="452.9" y1="64" x2="452.9" y2="57" stroke="#9a9a9a" stroke-width="0.8"/>
<text x="452.9" y="54" text-anchor="middle" font-size="10" fill="#1a1a1a">1460</text>
<line x1="550.0" y1="64" x2="550.0" y2="46" stroke="#9a9a9a" stroke-width="0.8"/>
<text x="550.0" y="43" text-anchor="middle" font-size="10" fill="#1a1a1a">1840</text>
<line x1="80" y1="79.3" x2="60" y2="79.3" stroke="#9a9a9a" stroke-width="0.8"/>
<text x="57" y="82.3" text-anchor="end" font-size="10" fill="#1a1a1a">60</text>
<line x1="80" y1="232.6" x2="73" y2="232.6" stroke="#9a9a9a" stroke-width="0.8"/>
<text x="70" y="235.6" text-anchor="end" font-size="10" fill="#1a1a1a">660</text>
<line x1="80" y1="319.4" x2="60" y2="319.4" stroke="#9a9a9a" stroke-width="0.8"/>
<text x="57" y="322.4" text-anchor="end" font-size="10" fill="#1a1a1a">1000</text>
<rect x="596.0" y="72" width="18" height="13" fill="#5bb98b" stroke="#2f8f63"/>
<text x="621.0" y="83" font-weight="bold" fill="#1a1a1a">Effective area</text>
<text x="621.0" y="98" font-size="10" fill="#1a1a1a">origin (0, 0), 1840 x 1000 px</text>
<rect x="596.0" y="116" width="18" height="13" fill="#d8975f" stroke="#9c5f32"/>
<text x="621.0" y="127" font-weight="bold" fill="#1a1a1a">ROI (region of interest)</text>
<text x="621.0" y="142" font-size="10" fill="#1a1a1a">origin (60, 60), 1400 x 600 px</text>
<text x="80" y="353" font-size="10" fill="#1a1a1a">After overscan correction the origin (0,0) is the top-left of the effective area, not the sensor.</text>
<text x="80" y="368" font-size="10" fill="#1a1a1a">The same ROI therefore shifts from (100,100) to (100-40, 100-40) = (60, 60); its size is unchanged.</text>
</svg>