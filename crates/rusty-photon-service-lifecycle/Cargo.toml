[package]
name = "rusty-photon-service-lifecycle"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Unified service lifecycle for Rusty Photon: tokio runtime + signal handlers + optional Windows SCM, exposing a single Shutdown handle across the workspace"
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
# color-eyre + tracing-error are deliberately crate-local, NOT workspace deps:
# this crate is the single owner of top-level error/panic reporting (ADR-011),
# and keeping the deps here is the structural guardrail that stops eyre!-style
# ad-hoc errors from leaking into thiserror-typed library/device code.
color-eyre = "0.6.5"
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
tracing-error = "0.2.1"
tracing-subscriber = { workspace = true }
windows-service = { version = "0.8", optional = true }

[features]
default = []
# Enables Windows Service Control Manager dispatch via `ServiceRunner::scm_mode(true)`.
# Pulls in the `windows-service` crate. Adopters: filemonitor (Phase 1).
scm = ["dep:windows-service"]

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "test-util", "time"] }

# Signal-install integration tests self-raise SIGTERM / SIGHUP via libc::raise.
[target.'cfg(unix)'.dev-dependencies]
libc = { workspace = true }
