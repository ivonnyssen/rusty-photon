[package]
name = "rusty-photon-service-lifecycle"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Unified service lifecycle for Rusty Photon: tokio runtime + signal handlers + optional Windows SCM, exposing a single Shutdown handle across the workspace"
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
# color-eyre + tracing-error are deliberately crate-local, NOT workspace deps:
# this crate is the single owner of top-level error/panic reporting (ADR-011),
# and keeping the deps here is the structural guardrail that stops eyre!-style
# ad-hoc errors from leaking into thiserror-typed library/device code.
color-eyre = "0.6.5"
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
# tracing-appender is deliberately crate-local too: only this crate builds the
# SCM-mode rolling-file writer (`init_service_tracing`); no service touches it
# directly. Optional so non-`scm` consumers get zero extra dependency content.
tracing-appender = { version = "0.2.3", optional = true }
tracing-error = "0.2.1"
tracing-subscriber = { workspace = true }
windows-service = { version = "0.8", optional = true }

[features]
default = []
# Enables Windows Service Control Manager dispatch via `ServiceRunner::scm_mode(true)`
# and the SCM-mode rolling-file logging in `init_service_tracing`. Pulls in the
# `windows-service` and `tracing-appender` crates. Adopters: every service binary,
# via `[target.'cfg(windows)'.dependencies]` (see any service's Cargo.toml).
scm = ["dep:windows-service", "dep:tracing-appender"]

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt", "test-util", "time"] }

# Signal-install integration tests self-raise SIGTERM / SIGHUP via libc::raise.
[target.'cfg(unix)'.dev-dependencies]
libc = { workspace = true }
