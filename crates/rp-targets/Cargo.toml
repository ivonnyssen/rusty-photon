[package]
name = "rp-targets"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "redb-backed store for rp's imaging plan: targets, acquisition goals, per-target overrides"
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
derive_more = { workspace = true, features = ["display"] }
humantime-serde = { workspace = true }
rp-vocabulary = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
# Pinned to the 4.x file-format generation (see docs/crates/rp-targets.md
# "On-disk layout" / "Schema migration" — a redb-major bump needs a one-time
# Database::upgrade() step, distinct from this crate's own schema_version).
redb = "4"

# Optional, only enabled by tests / consumers that want the
# `MockTargetStore` generated by `#[automock]`.
mockall = { workspace = true, optional = true }

[features]
default = []
mock = ["dep:mockall"]

[dev-dependencies]
mockall = { workspace = true }
tempfile = { workspace = true }
