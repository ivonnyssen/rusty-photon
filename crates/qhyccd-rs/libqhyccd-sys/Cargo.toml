[package]
name = "libqhyccd-sys"
version = "0.1.4"
edition = "2021"
authors = ["Igor von Nyssen <igor@vonnyssen.com>"]
links = "qhyccd"
repository = "https://github.com/ivonnyssen/qhyccd-rs"
license = "MIT OR Apache-2.0"
description = "Rust bindings for QHY CCD SDK"
# Explicit, lower-than-workspace MSRV (dual-homed to crates.io, ADR-009): a
# dependency-free, hand-written FFI shim, so its floor is just what the bindings
# compile on. Pinned to the wrapper's 1.68.0 for a single coherent published
# floor; verified out-of-tree by the nightly publish-readiness check
# (docs/plans/publish-readiness-checks.md), not in-workspace. See ../Cargo.toml.
rust-version = "1.68.0"
exclude = ["qhyccd-sdk/*"]

[lib]
name = "libqhyccd_sys"
path = "lib.rs"

[dependencies]

[features]
# Removed vendored feature - now uses system-installed SDK
