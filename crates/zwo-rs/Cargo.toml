[package]
name = "zwo-rs"
version = "0.1.0"
edition = "2021"
# Explicit, lower-than-workspace MSRV: dual-homed to crates.io (ADR-010), so the
# published floor must reflect what downstream consumers can build on, NOT the
# workspace's unified 1.94.1. Verified out-of-tree by the nightly publish-readiness
# check (docs/plans/publish-readiness-checks.md). The honest floor is 1.87.0: the
# build chain bottoms out at libzwo-sys's `bindgen 0.72` (MSRV 1.70.0), but
# `src/camera.rs` calls `u32::is_multiple_of` (stabilised in Rust 1.87.0). Replace
# that with `% n == 0` to drop the wrapper toward libzwo-sys's 1.70.0 floor; the
# `cargo msrv find` step in the nightly check reports the true minimum.
rust-version = "1.87.0"
authors = ["Igor von Nyssen <igor@vonnyssen.com>"]
license = "MIT OR Apache-2.0"
readme = "README.md"
# Canonical development home is the rusty-photon monorepo (ADR-010); the crate is
# still published to crates.io from crates/zwo-rs (dual-home).
repository = "https://github.com/ivonnyssen/rusty-photon"
documentation = "https://docs.rs/zwo-rs"
homepage = "https://github.com/ivonnyssen/rusty-photon"
description = "Safe Rust bindings for the ZWO ASI camera and EFW filter wheel SDK"
keywords = ["zwo", "asi", "astronomy", "camera", "filter-wheel"]
categories = ["api-bindings", "hardware-support"]
# Vendored into the rusty-photon workspace as a first-party, dual-homed member
# (ADR-010 / docs/plans/vendor-zwo-rs.md): the monorepo is the canonical
# development home, and this crate is still published to crates.io from here. The
# package metadata above stays explicit (NOT `*.workspace = true`) so the crate
# releases on its own cadence; shared *dependencies* inherit from the workspace
# per AGENTS.md Rule 10 (`cargo publish` inlines their concrete versions).

# Marks this crate (+ its nested FFI sub-crate) for the nightly publish-readiness
# check (docs/plans/publish-readiness-checks.md). See the qhyccd-rs marker for the
# field semantics. needs-libclang = true: libzwo-sys's build script runs bindgen.
[package.metadata.publish-readiness]
sys-crate = "libzwo-sys"
skip-link-env = "ZWO_SKIP_NATIVE_LINK"
needs-libclang = true

[features]
# Default to the full device surface so a bare/external build behaves like the
# pre-split crate; rusty-photon's services narrow to their own device via
# `default-features = false` (ADR-014).
default = ["camera", "efw", "focuser"]
# Per-device surface + native link (ADR-014): each feature compiles this crate's
# module for that device and forwards to the matching libzwo-sys link feature.
# The three ZWO SDKs are independent libraries, so a camera-only consumer never
# links (nor ships) libEFWFilter/libEAFFocuser, and vice versa.
camera = ["libzwo-sys/camera"]
efw = ["libzwo-sys/efw"]
focuser = ["libzwo-sys/focuser"]
# Mirrors qhyccd-rs: a hardware-free, in-Rust simulated environment for
# development and tests. NOTE: like qhyccd-rs, this removes the *camera*, not the
# SDK *link* — the native SDK is still linked when this feature is enabled.
simulation = ["rand", "rayon"]

[dependencies]
# default-features = false: the device features above forward explicitly, so a
# narrow zwo-rs build yields an equally narrow libzwo-sys link.
libzwo-sys = { version = "0.1.0", path = "libzwo-sys", default-features = false }
thiserror = { workspace = true }
tracing = { workspace = true }
# rand/rayon are simulation-only (behind the `simulation` feature) and shared with
# qhyccd-rs's sim backend, so their version is pinned once in the workspace
# (Rule 10); only the `optional` flag stays crate-local. `cargo publish` flattens
# the inherited version, so the dual-home release is unaffected.
rand = { workspace = true, optional = true }
rayon = { workspace = true, optional = true }

[dev-dependencies]
mockall = { workspace = true }
