[package]
name = "libzwo-sys"
version = "0.1.0"
edition = "2021"
# Explicit, lower-than-workspace MSRV (dual-homed to crates.io, ADR-010): the
# floor is set by the `bindgen 0.72` build-dependency (its own MSRV is 1.70.0),
# which the build script runs to generate the FFI bindings. Verified out-of-tree
# by the nightly publish-readiness check (docs/plans/publish-readiness-checks.md)
# — bindgen must be present, so that job installs libclang; the ZWO SDK binary is
# NOT needed (a check-only build, with ZWO_SKIP_NATIVE_LINK=1, never links).
rust-version = "1.70.0"
authors = ["Igor von Nyssen <igor@vonnyssen.com>"]
license = "MIT OR Apache-2.0"
# Canonical development home is the rusty-photon monorepo (ADR-010); still
# published to crates.io from crates/zwo-rs/libzwo-sys (dual-home).
repository = "https://github.com/ivonnyssen/rusty-photon"
description = "Raw FFI bindings (bindgen) for the ZWO ASI / EFW / EAF SDK"
keywords = ["zwo", "asi", "efw", "ffi", "astronomy"]
categories = ["external-ffi-bindings", "hardware-support"]
# `links` is a uniqueness marker for the native ZWO SDK libraries this crate
# links (libASICamera2 + libEFWFilter, +libEAFFocuser later). Requires build.rs.
links = "zwo"
# Vendored MIT ZWO SDK headers live under sdk/include/ (ZWO's own MIT notice is
# in sdk/include/license.txt). bindgen reads them at build time. The SDK *binary*
# is NOT vendored — it must be installed on the system (see the workspace README).

[dependencies]

[build-dependencies]
bindgen = "0.72"
