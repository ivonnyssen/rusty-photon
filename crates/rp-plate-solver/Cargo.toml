[package]
name = "rp-plate-solver"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "HTTP client for the plate-solver rp-managed service (used by Rusty Photon's `plate_solve` MCP tool)"
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
base64 = { workspace = true }
humantime-serde = { workspace = true }
reqwest = { workspace = true }
rp-auth = { workspace = true }
rusty-photon-tls = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Optional, only enabled by tests / consumers that want the
# `MockPlateSolveClient` generated by `#[automock]`.
mockall = { workspace = true, optional = true }

[features]
default = []
mock = ["dep:mockall"]

[dev-dependencies]
axum = { workspace = true }
mockall = { workspace = true }
tokio = { workspace = true, features = ["full"] }
